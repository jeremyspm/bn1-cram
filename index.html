piritual connection — it is where ancestors are buried (whakapapa). It provided a sense of connection and belonging, and specific landmarks like mountains and rivers were tapu (sacred). Māori were caretakers/kaitiaki of the land. Its confiscation was therefore a huge loss."}, {"id": "hauora-maori-27", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "Why was language (Te Reo Māori) significant within a Māori worldview?", "tags": ["maori-worldview", "te-reo", "colonisation"], "a": "Language was used to tell stories, share history and connect with the past. Māori words carry greater meaning than English (a source of the Treaty's translation problems). Loss of language, and punishment for speaking it, made people scared to learn or speak it, with ripple effects still seen today. Some tribes have different dialects (e.g. using 'h' instead of 'wh')."}, {"id": "hauora-maori-28", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "structured", "difficulty": "core", "q": "Identify the four categories of determinants of Māori health. (5 marks)", "tags": ["determinants", "inequities"], "points": ["Social determinants (e.g. housing, overcrowding, social isolation, marginalisation).", "Cultural determinants (e.g. loss of identity, negative cultural perceptions, stereotypes and stigma).", "Economic determinants (e.g. lower-paid jobs, lower socio-economic areas, poverty).", "Political determinants (e.g. legislation and breaches of Te Tiriti, systemic/structural issues).", "These determinants stem from colonisation and the breaches of Te Tiriti o Waitangi."], "panic": true}, {"id": "hauora-maori-29", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "structured", "difficulty": "core", "q": "Describe the ongoing health and social inequities experienced by Māori. (5 marks)", "tags": ["inequities", "determinants", "statistics"], "points": ["Māori tend to live in lower socio-economic areas and in lower-paid jobs.", "Māori are over-represented in the prison system (about 12% of the NZ population yet 51% of the prison population; other slides cite ~15% and 52%).", "Māori experience insufficient housing that is mostly overcrowded.", "Māori have a shorter lifespan than non-Māori by at least 7 years, possibly more.", "Māori are less likely to access adequate/timely healthcare and are more likely to be marginalised in the NZ health system."], "panic": true}, {"id": "hauora-maori-30", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "What are the alcohol-related health statistics for Māori cited in the source?", "tags": ["statistics", "alcohol", "determinants"], "a": "Māori men have an alcohol death rate more than twice that of non-Māori. Overall, the alcohol death rate for Māori is disproportionately higher — 34 deaths per 100,000 for Māori compared to 14 per 100,000 for non-Māori. Māori are also more likely to be apprehended for alcohol-related offences and to suffer harmful effects, and Māori women suffer more from others' drinking than any other subgroup by ethnicity and gender."}, {"id": "hauora-maori-31", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "What crime/justice statistics show Māori over-representation in the criminal justice system?", "tags": ["statistics", "justice", "determinants"], "a": "Māori are over-represented at every step: they make up about 37% of those charged by police, 45% of those found guilty, and 52% of those incarcerated, despite being only about 15% of the NZ population. The high conviction rates are partly influenced by Māori being more likely to plead guilty, which may reflect a systemic problem with the availability or quality of legal representation."}, {"id": "hauora-maori-32", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "By how many years is the Māori lifespan shorter than non-Māori, according to the source?", "tags": ["statistics", "inequities"], "a": "Māori have a shorter lifespan compared to non-Māori by at least 7 years, and possibly more."}, {"id": "hauora-maori-33", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "What is Pae Tū: Hauora Māori Strategy?", "tags": ["strategy", "pae-tu", "policy"], "a": "Pae Tū is the Hauora Māori Strategy from the Ministry of Health (MOH, 2023). It sets out five priority areas for improving Māori health."}, {"id": "hauora-maori-34", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "structured", "difficulty": "core", "q": "Identify the five priority areas of Pae Tū: Hauora Māori Strategy (MOH, 2023). (5 marks)", "tags": ["strategy", "pae-tu", "policy"], "points": ["Enabling Māori leadership, decision-making and governance at all levels.", "Strengthening whole-of-government commitment to Māori health.", "Growing the Māori health workforce and sector to match community needs.", "Enabling culturally safe, whānau-centred and preventative primary health care.", "Ensuring accountability for system performance for Māori health."], "panic": true}, {"id": "hauora-maori-35", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "Why is understanding historical processes important for nurses providing care to Māori?", "tags": ["nursing-role", "cultural-safety"], "a": "As tangata whenua, Māori health consumers may hold diverse worldviews about health that differ from providers'. Nurses must understand the historical processes that created the social, economic and political power relationships underpinning Māori health status — including what was promised at Te Tiriti in 1840 versus what has transpired since — because Māori health status has historically been lower than that of the Crown partner."}, {"id": "hauora-maori-36", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "structured", "difficulty": "core", "q": "Describe the role and responsibilities of a registered nurse in relation to Te Tiriti o Waitangi. (5 marks)", "tags": ["nursing-role", "te-tiriti", "ncnz"], "points": ["As registered nurses and Crown agents, RNs are expected to be active Te Tiriti o Waitangi partners.", "They must work to achieve the Pae Ora strategy for Māori health consumers.", "They analyse the Treaty and its relevance to the health of Māori in Aotearoa/New Zealand.", "They demonstrate application of the principles of Te Tiriti o Waitangi to nursing practice.", "They recognise the citizen rights of Māori and their rights to equitable access and participation in health services, facilitating the same access and opportunities as for non-Māori and pursuing equity in health outcomes.", "The Nursing Council of New Zealand (NCNZ), also a Crown agent, is accountable to Māori through regular audit of its activities, including nursing education."]}, {"id": "hauora-maori-37", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "What is cultural safety (kawa whakaruruhau) and who is associated with developing it in NZ nursing?", "tags": ["cultural-safety", "nursing-role", "key-terms"], "a": "Cultural safety (kawa whakaruruhau) is a nursing framework associated with Irihapeti Ramsden. It requires nurses to reflect on their own culture and power and to deliver care in a way that is respectful, safe and acceptable to the client (as defined by the client). For Māori it means recognising citizen rights and rights to equitable access and participation in health services.", "panic": true}, {"id": "hauora-maori-38", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "What is 'deficit thinking' and why is it a problem in Māori health?", "tags": ["cultural-safety", "nursing-role"], "a": "Deficit thinking blames Māori themselves for their poorer health status. The source states it is not an intelligent explanation for Māori health status, nor a basis for a positive relationship with Māori clients. Nurses should instead acknowledge the role of nursing in addressing inequalities and use the Treaty as a practice framework."}, {"id": "hauora-maori-39", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "On how many 'pou' are the NCNZ Competencies for Registered Nurses based?", "tags": ["ncnz", "nursing-role"], "a": "The New Zealand Nursing Council (NCNZ) Competencies for Registered Nurses are based on 6 pou (pillars)."}, {"id": "hauora-maori-40", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "structured", "difficulty": "core", "q": "Identify the five NCNZ principles of Te Tiriti o Waitangi (with their English meanings). (5 marks)", "tags": ["te-tiriti-principles", "ncnz", "core-list"], "points": ["Tino Rangatiratanga (Self-Determination).", "Mana Taurite (Equity).", "Whakamarumarutia (Active Protection).", "Kōwhiringa (Options).", "Pātuitanga (Partnership)."], "panic": true}, {"id": "hauora-maori-41", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "Explain the principle of Tino Rangatiratanga (Self-Determination).", "tags": ["te-tiriti-principles", "tino-rangatiratanga"], "a": "Tino Rangatiratanga is the principle of self-determination, providing for Māori self-determination and mana motuhake. It signifies Māori's right to maintain and strengthen their distinct political, economic, social and cultural characteristics; determine their own priorities and deliver their own programmes; and exercise authority over their lives, lands and resources. Māori determine the tikanga appropriate for them when interacting with the Crown, and it requires the Crown to work with Māori partners in the design, delivery and monitoring of statutory work."}, {"id": "hauora-maori-42", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "Explain the principle of Mana Taurite (Equity).", "tags": ["te-tiriti-principles", "equity"], "a": "Mana Taurite (equity) requires the Crown to commit to achieving equitable outcomes for Māori, recognising that different groups may need different approaches and resources to achieve parity. In health, it means the sector should be equitable and ensure equitable health outcomes for Māori as a key focus and driver."}, {"id": "hauora-maori-43", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "Explain the principle of Whakamarumarutia (Active Protection).", "tags": ["te-tiriti-principles", "active-protection"], "a": "Whakamarumarutia (active protection) emphasises the Crown's responsibility to actively protect Māori interests and ensure equitable outcomes, particularly in health, education and economic development. The health sector should protect and promote health and wellbeing, including through promotional and preventative measures, recognising Māori face unique challenges requiring specific interventions to close the gaps."}, {"id": "hauora-maori-44", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "Explain the principle of Kōwhiringa (Options).", "tags": ["te-tiriti-principles", "options"], "a": "Kōwhiringa (options) requires the Crown to provide for and properly resource kaupapa Māori health and services, and to ensure all health services are provided in a culturally appropriate way that supports hauora Māori models of care. It acknowledges Māori have the right to choose their own path — to live according to their own traditions and culture, to participate in wider society, or to do both."}, {"id": "hauora-maori-45", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "Explain the principle of Pātuitanga (Partnership).", "tags": ["te-tiriti-principles", "partnership"], "a": "Pātuitanga (partnership) emphasises working together in a reciprocal and collaborative manner, fostering shared power and responsibility. In healthcare it means the Council/Crown and iwi/Māori must work together in a strong, enduring relationship to achieve equitable health outcomes for Māori."}, {"id": "hauora-maori-46", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "structured", "difficulty": "detail", "q": "Explain how a registered nurse could apply the five NCNZ Te Tiriti principles to the care of Mere, a Māori woman who wants her whānau involved and access to rongoā Māori alongside her treatment. (5 marks)", "tags": ["te-tiriti-principles", "scenario", "application"], "points": ["Tino Rangatiratanga: support Mere's self-determination by respecting her choice to have whānau involved and to use rongoā Māori, letting her determine the tikanga appropriate for her care.", "Mana Taurite (Equity): recognise she may need different approaches/resources (e.g. facilitating rongoā and whānau involvement) to achieve equitable outcomes.", "Whakamarumarutia (Active Protection): actively protect her health and cultural interests by advocating for and safely integrating rongoā alongside prescribed treatment.", "Kōwhiringa (Options): provide culturally appropriate options, resourcing and supporting access to rongoā Māori and whānau-centred care rather than only Western options.", "Pātuitanga (Partnership): work collaboratively with Mere and her whānau in a reciprocal, shared-power relationship to plan her care."]}, {"id": "hauora-maori-47", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "What is Pae Ora and how does it relate to the nursing role?", "tags": ["pae-ora", "policy", "nursing-role"], "a": "Pae Ora is the Government's strategy/goal for Māori health. Nurses, as Crown agents, must work to achieve the Pae Ora strategy for Māori health consumers; to do so they must understand the historical forces between 1840 and 1975 (when the Waitangi Tribunal was initiated) that explain 'why' Māori health status is as it is."}, {"id": "hauora-maori-48", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "When was the Waitangi Tribunal initiated, according to the source?", "tags": ["history", "dates", "waitangi-tribunal"], "a": "The Waitangi Tribunal was initiated in 1975. Nurses are expected to understand the historical forces that transpired between 1840 and 1975 that contributed to current Māori health status."}, {"id": "hauora-maori-49", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "What colonial attitude toward Māori is captured in the historical quotes in the source?", "tags": ["colonisation", "history", "attitudes"], "a": "Colonial attitudes framed Māori as an 'inferior branch of the human family' — physically, intellectually and morally inferior to Europeans — and assumed 'the Māori are dying out and nothing can save them', casting colonists' duty as merely to 'smooth down their dying pillow'. These attitudes justified assimilation and breaches of Te Tiriti."}, {"id": "hauora-maori-50", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "What was the estimated Māori population versus the Pakeha settler population around 1839?", "tags": ["history", "statistics", "dates"], "a": "By 1839 there were approximately 2,000 Pakeha settlers, while Māori population estimates at that time were up to 400,000."}, {"id": "power-empowerment-01", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "Define power.", "tags": ["definition", "power"], "a": "Power is the ability to influence or control the behaviour of people.", "panic": true}, {"id": "power-empowerment-02", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "What is authority, as distinct from power?", "tags": ["definition", "authority", "power"], "a": "Authority is a term used for power that is perceived as legitimate by society."}, {"id": "power-empowerment-03", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "Define empowerment (in the health-care context).", "tags": ["definition", "empowerment"], "a": "Empowerment grants individuals or groups the ability to make decisions and take actions that affect their own lives or circumstances; it is the process of enabling patients to take an active role in their health and health-care decisions.", "panic": true}, {"id": "power-empowerment-04", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "structured", "difficulty": "core", "q": "Discuss the key differences between power and empowerment.", "tags": ["contrast", "power", "empowerment"], "points": ["Nature of control: power implies control and authority over others, whereas empowerment gives individuals the ability to make decisions and take actions affecting their own lives.", "Source of authority: power's authority is derived from position, wealth, knowledge or force, whereas empowerment's authority is granted through collaboration, acknowledgement and encouragement.", "Centralisation vs distribution: power is often concentrated in a few individuals/entities (centralised), whereas empowerment distributes decision-making and promotes decentralisation and inclusivity.", "Outcome orientation: power focuses on achieving specific goals, sometimes at the expense of others, whereas empowerment focuses on the growth, development and well-being of individuals and communities.", "Dynamic vs static: power dynamics can be relatively static with established hierarchies, whereas empowerment is dynamic, ongoing and continuous.", "Relationship with others: power can create dominance, conflict or resistance, whereas empowerment fosters collaboration, mutual respect and a sense of agency."], "panic": true}, {"id": "power-empowerment-05", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "Identify the three positive/alternative forms of power (beyond 'power over').", "tags": ["forms-of-power", "power-to-with-within"], "a": "Power to (act), power with (collective action / teamwork), and power within (self-worth, dignity).", "panic": true}, {"id": "power-empowerment-06", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "structured", "difficulty": "core", "q": "Power is most often viewed as 'power over'. Describe the alternative, positive forms power can take.", "tags": ["forms-of-power", "power-to-with-within"], "points": ["'Power over' is the dominant/negative view: domination or control of another individual.", "Power to: the power to act.", "Power with: power derived from collective action and teamwork.", "Power within: power grounded in a person's self-worth and dignity.", "These positive forms show power can be constructive and enabling rather than only controlling."]}, {"id": "power-empowerment-07", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "What does 'power over' mean?", "tags": ["forms-of-power", "power-over"], "a": "'Power over' is power seen as domination or control of another individual; it is the most common (and negative) view of power."}, {"id": "power-empowerment-08", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "Identify the three faces (types) of power.", "tags": ["three-faces", "types-of-power"], "a": "Visible power, hidden power, and invisible power.", "panic": true}, {"id": "power-empowerment-09", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "What is visible power?", "tags": ["three-faces", "visible-power"], "a": "Visible power is observable decision-making mechanisms, such as clear winners and losers."}, {"id": "power-empowerment-10", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "What is hidden power?", "tags": ["three-faces", "hidden-power"], "a": "Hidden power is behind-the-scenes agenda-setting: biases and processes that exclude certain people or issues."}, {"id": "power-empowerment-11", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "What is invisible power?", "tags": ["three-faces", "invisible-power"], "a": "Invisible power operates through social conditioning and ideology; these factors influence and shape the very needs and self-perception of individuals."}, {"id": "power-empowerment-12", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "structured", "difficulty": "core", "q": "Describe the three faces (types) of power.", "tags": ["three-faces", "types-of-power"], "points": ["Visible power: observable decision-making mechanisms, such as winners and losers.", "Hidden power: behind-the-scenes agenda-setting, including biases that exclude certain people or issues.", "Invisible power: power exerted through social conditioning and ideology that shapes individuals' needs and self-perception.", "Invisible power is the most subtle yet has the greatest negative impact.", "The lecture links the three faces to cultural safety, prompting reflection on how invisible power (norms, ideology, bias) can unintentionally exclude or disadvantage culturally diverse patients."]}, {"id": "power-empowerment-13", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "Which of the three faces of power is the most subtle yet has the greatest negative impact, and why does this matter for cultural safety?", "tags": ["invisible-power", "cultural-safety"], "a": "Invisible power is the most subtle yet has the greatest negative impact, because it works through social conditioning and ideology that shape people's beliefs and needs unconsciously; the lecture links this to cultural safety, since cultural norms, implicit bias and ideology can disadvantage or exclude patients without anyone noticing."}, {"id": "power-empowerment-14", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "Give two examples of visible power in healthcare.", "tags": ["visible-power", "examples"], "a": "Leadership roles (hospital administrators/medical directors making operational decisions), and policy/regulation (government agencies setting regulations and legislatures passing healthcare laws). Other examples include financial control, clinical decision-making, patient advocacy and public health campaigns."}, {"id": "power-empowerment-15", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "Give two examples of hidden power in healthcare.", "tags": ["hidden-power", "examples"], "a": "Pharmaceutical marketing subtly influencing prescription choices through funding, and healthcare lobbying shaping policies behind the scenes. Other examples include healthcare bureaucracy, research funding influence and institutional culture."}, {"id": "power-empowerment-16", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "Give two examples of invisible power in healthcare.", "tags": ["invisible-power", "examples"], "a": "Cultural norms and values affecting treatment decisions, and implicit (unconscious) bias affecting diagnosis, treatment and communication. Other examples include social hierarchies, economic inequities, health literacy and subtle social pressures."}, {"id": "power-empowerment-17", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "Identify the three spaces / levels of power in everyday life and where each operates.", "tags": ["spaces-of-power", "public-private-intimate"], "a": "Public power (employment, public life), private power (family, relationships, friends), and intimate power (self-esteem, confidence)."}, {"id": "power-empowerment-18", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "structured", "difficulty": "core", "q": "Identify and describe the three spaces of power in everyday life.", "tags": ["spaces-of-power", "public-private-intimate"], "points": ["Public power: operates in the public sphere, e.g. employment and public life.", "Private power: operates in the personal/domestic sphere, e.g. family, relationships and friends.", "Intimate power: operates within the self, e.g. self-esteem and confidence.", "These spaces show power ranges from institutional/public settings down to an individual's inner sense of self."]}, {"id": "power-empowerment-19", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "Which three kinds of power did Max Weber identify as evident in society?", "tags": ["weber", "types-of-power"], "a": "Political power, economic power, and social power.", "panic": true}, {"id": "power-empowerment-20", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "structured", "difficulty": "core", "q": "Max Weber identified three kinds of power in society. Identify and describe them.", "tags": ["weber", "types-of-power"], "points": ["Political power: informal control, formal government policy, influence over public opinion, and influence in political processes.", "Economic power: wealth and income, control of prices, access to credit, and control of wages.", "Social power: access to political-economic power, shaped by how the community evaluates these.", "Weber presented these as the three main kinds of power evident in society.", "In practice these types overlap in real healthcare settings (e.g. a policy decision may be political, economic and social at once)."]}, {"id": "power-empowerment-21", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "According to the source, what are the components/expressions of political power?", "tags": ["political-power", "weber"], "a": "Informal control, formal government policy, influence over public opinion, and influence in political processes."}, {"id": "power-empowerment-22", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "According to the source, what are the components/expressions of economic power?", "tags": ["economic-power", "weber"], "a": "Wealth and income, control of prices, access to credit, and control of wages."}, {"id": "power-empowerment-23", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "According to the source, what defines social power?", "tags": ["social-power", "weber"], "a": "Social power is about access to political-economic power and how the community evaluates these."}, {"id": "power-empowerment-24", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "What is the power relationship between health providers and patients/clients, and why does it matter?", "tags": ["power-in-practice", "provider-patient"], "a": "Health-care professionals hold power (authority, knowledge, control of care) over those they care for, which has a major impact on patients/clients; recognising this power imbalance matters so nurses can practise safely and empower rather than dominate patients."}, {"id": "power-empowerment-25", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "structured", "difficulty": "detail", "q": "Identify the tactics of power and control used in the family (family-violence 'power and control wheel').", "tags": ["power-in-family", "power-and-control"], "points": ["Emotional abuse and economic abuse.", "Sexual abuse.", "Using children.", "Threats and intimidation.", "Asserting male privilege.", "Isolation of the person."]}, {"id": "power-empowerment-26", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "How is empowerment defined by Coulter, Parsons and Askham (2008)?", "tags": ["empowerment", "coulter-parsons-askham", "definition"], "a": "Empowerment is a multi-dimensional strategy that enables individuals to become informed, confident and active participants in their own health care, through improved health literacy, shared decision-making, and self-management support."}, {"id": "power-empowerment-27", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "What is the title, authors, year and publisher of the policy brief on empowerment cited in the lecture?", "tags": ["coulter-parsons-askham", "reference"], "a": "Coulter, A., Parsons, S. & Askham, J. (2008), 'Where are the patients in decision-making about their own care?', Copenhagen: WHO."}, {"id": "power-empowerment-28", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "structured", "difficulty": "core", "q": "Explain the three key components of patient empowerment described by Coulter, Parsons and Askham (2008).", "tags": ["empowerment", "components", "coulter-parsons-askham"], "points": ["Improving health literacy: helping individuals understand, evaluate and use health information to make informed decisions.", "Supporting shared decision-making: encouraging patients to act as partners with clinicians in choosing treatments based on their values and preferences.", "Facilitating self-management: equipping patients with the confidence, knowledge and skills to manage chronic conditions and daily health needs.", "Together these enable patients to become informed, confident and active participants in their own care.", "Empowerment is multi-dimensional, so all three components are pursued together rather than in isolation."], "panic": true}, {"id": "power-empowerment-29", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "What is health literacy in the context of empowerment?", "tags": ["health-literacy", "empowerment", "components"], "a": "Health literacy is helping individuals understand, evaluate and use health information to make informed decisions."}, {"id": "power-empowerment-30", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "What is shared decision-making in the context of empowerment?", "tags": ["shared-decision-making", "empowerment", "components"], "a": "Shared decision-making is encouraging patients to act as partners with clinicians in choosing treatments based on their own values and preferences."}, {"id": "power-empowerment-31", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "What is self-management in the context of empowerment?", "tags": ["self-management", "empowerment", "components"], "a": "Self-management is equipping patients with the confidence, knowledge and skills to manage chronic conditions and their daily health needs."}, {"id": "power-empowerment-32", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "structured", "difficulty": "detail", "q": "Identify and describe the four core components of empowerment (Coulter et al., 2008).", "tags": ["empowerment", "core-components", "coulter-parsons-askham"], "points": ["Confidence and self-efficacy: drawing on Bandura's theory, building a person's belief in their ability to manage health tasks.", "Access to information: empowered patients receive tailored, timely and relevant health information.", "Active participation: patients are encouraged to ask questions, express preferences and make decisions collaboratively.", "System-level support: empowerment is reinforced through policies, professional training, and tools like decision aids and virtual support."]}, {"id": "power-empowerment-33", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "Whose theory underpins the 'confidence and self-efficacy' component of empowerment, and what does it involve?", "tags": ["self-efficacy", "bandura", "empowerment"], "a": "Bandura's theory; empowerment involves building a person's self-efficacy - their belief in their own ability to manage health tasks."}, {"id": "power-empowerment-34", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "Empowered patients are active, self-determining participants, not what?", "tags": ["empowerment", "active-vs-passive"], "a": "Not passive recipients of care; empowerment supports patients to be engaged, active and self-determining rather than passive."}, {"id": "power-empowerment-35", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "What three areas should health care focus on improving to empower patients?", "tags": ["empowerment", "focus-areas"], "a": "Health literacy, self-management, and treatment decision-making."}, {"id": "power-empowerment-36", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "What distinct role do empowered patients play in their own health (in practice)?", "tags": ["patient-empowerment", "in-practice"], "a": "They play a distinct, active role - for example choosing appropriate treatment and managing their chronic illness."}, {"id": "power-empowerment-37", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "Identify the three linked concepts in the engage-empower-support model of patient empowerment.", "tags": ["engage-empower-support", "patient-empowerment"], "a": "Patient engagement (engage), patient empowerment (empower), and patient involvement (support)."}, {"id": "power-empowerment-38", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "structured", "difficulty": "core", "q": "Identify the five ways nurses can empower patients.", "tags": ["how-nurses-empower", "empowerment"], "points": ["Recognise people as a resource or asset.", "Build on people's capabilities.", "Promote reciprocity and mutuality.", "Break down barriers between providers and users.", "Facilitate, NOT deliver (act as a facilitator rather than the sole provider of solutions)."], "panic": true}, {"id": "power-empowerment-39", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "What is meant by 'facilitate NOT deliver' when empowering patients?", "tags": ["facilitate-not-deliver", "how-nurses-empower"], "a": "The nurse works as a facilitator in partnership with the patient rather than being the main source of knowledge or delivering solutions to a passive recipient; the patient is supported to take an active, self-determining role."}, {"id": "power-empowerment-40", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "What is meant by 'promote reciprocity and mutuality' in empowerment?", "tags": ["reciprocity", "how-nurses-empower"], "a": "It means fostering a two-way, mutually respectful relationship where the patient and provider both contribute and benefit, rather than a one-way giving of care."}, {"id": "power-empowerment-41", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "What does 'build on people's capabilities' mean when empowering patients?", "tags": ["capabilities", "how-nurses-empower"], "a": "It means recognising and using the patient's existing strengths, knowledge and abilities as the foundation for care, rather than focusing only on deficits."}, {"id": "power-empowerment-42", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "structured", "difficulty": "detail", "q": "Identify the principles for empowerment practice (Aujoulat et al., 2006).", "tags": ["principles-for-practice", "aujoulat"], "points": ["Adopt a patient-centred approach.", "Shift away from the health-care worker being the main source of knowledge, acting instead as a facilitator working in partnership.", "Recognise that empowerment processes will vary largely from person to person.", "Recognise that individual priorities and values differ, which influences involvement.", "Accept that patients will have varying degrees of involvement."]}, {"id": "power-empowerment-43", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "Which authors described patient empowerment as 'polysemy or cacophony' and set out principles for practice?", "tags": ["aujoulat", "reference"], "a": "Aujoulat, I., et al. (2006), 'Patient empowerment in theory and practice: Polysemy or cacophony?', Patient Education and Counseling."}, {"id": "power-empowerment-44", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "structured", "difficulty": "core", "q": "Identify and describe the characteristics of an effectively empowered patient.", "tags": ["characteristics", "empowered-patient", "effective-empowerment"], "points": ["Engaged: actively participates, attends and prepares for appointments, and has a high level of involvement.", "Knowledgeable: understands their condition, is aware of treatment options, understands the system (benefits and rights) and has resources.", "Collaborative: perceives a partnership, uses shared decision-making, communicates assertively, listens actively and has reasonable trust in the health-care system.", "Committed: committed to the goals/expectations of the treatment approach.", "Tolerant of uncertainty: able to balance risks and benefits through shared decision-making."]}, {"id": "power-empowerment-45", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "core", "q": "Identify the five characteristics of an effectively empowered patient (one word/phrase each).", "tags": ["characteristics", "empowered-patient"], "a": "Engaged, Knowledgeable, Collaborative, Committed, and Tolerant of uncertainty.", "panic": true}, {"id": "power-empowerment-46", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "What does it mean for an empowered patient to be 'engaged'?", "tags": ["engaged", "characteristics"], "a": "The patient actively participates, attends and prepares for appointments, and has a high level of involvement in their care."}, {"id": "power-empowerment-47", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "What does it mean for an empowered patient to be 'knowledgeable'?", "tags": ["knowledgeable", "characteristics"], "a": "The patient understands their condition, is aware of treatment options, and understands the system including their benefits, rights and available resources."}, {"id": "power-empowerment-48", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "What does it mean for an empowered patient to be 'collaborative'?", "tags": ["collaborative", "characteristics"], "a": "The patient perceives a partnership with providers, engages in shared decision-making, uses assertive communication and active listening, and has reasonable trust in health care and the system."}, {"id": "power-empowerment-49", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "What do 'committed' and 'tolerant of uncertainty' mean for an empowered patient?", "tags": ["committed", "tolerant-of-uncertainty", "characteristics"], "a": "Committed means committed to the goals and expectations of the treatment approach; tolerant of uncertainty means able to balance risks and benefits through shared decision-making."}, {"id": "power-empowerment-50", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "structured", "difficulty": "detail", "q": "Identify examples of ways to promote patient engagement and knowledge in effective empowerment.", "tags": ["promoting-engagement", "effective-empowerment"], "points": ["Health-care professionals delivering patient-centred care.", "Patients being given access to their own records.", "Care coordination teams.", "Education from community health-care workers.", "Expert patient programs.", "Advocacy efforts."]}, {"id": "power-empowerment-51", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "How can nurses promote collaboration, commitment and tolerance of uncertainty in empowerment?", "tags": ["promoting-collaboration", "effective-empowerment"], "a": "Promote collaboration through shared decision-making and goal setting/action planning; foster commitment by developing and fulfilling care management plans; and support tolerance of uncertainty through communication combined with all of the above."}, {"id": "power-empowerment-52", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "structured", "difficulty": "core", "q": "Explain how a nurse can empower a newly diagnosed Type 2 diabetes patient (e.g. Mary/Kuia Mere) using empowerment principles.", "tags": ["applied", "how-nurses-empower", "cultural-safety"], "points": ["Improve health literacy by explaining the diagnosis in understandable terms and checking understanding, using interpreters or whanau where needed.", "Use shared decision-making, working in partnership so the patient chooses treatment/lifestyle options based on their values and preferences.", "Support self-management by building the patient's confidence, knowledge and skills to manage the condition day to day.", "Build on the patient's existing capabilities and recognise them (and their whanau) as a resource/asset rather than a passive recipient.", "Facilitate rather than deliver - act as a facilitator, use active listening and assertive communication, and break down barriers between provider and patient.", "Provide culturally safe care, involving whanau and reflecting Te Tiriti o Waitangi principles (self-determination, partnership, equity, active protection)."], "panic": true}, {"id": "power-empowerment-53", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "Which four Te Tiriti o Waitangi principles are applied to empowerment and culturally safe care in the lecture?", "tags": ["te-tiriti", "cultural-safety"], "a": "Self-determination, partnership, equity, and active protection."}, {"id": "power-empowerment-54", "topicSlug": "power-empowerment", "topic": "Power & Empowerment", "type": "recall", "difficulty": "detail", "q": "What transformation is central to empowerment as a change strategy?", "tags": ["empowerment", "change-strategy"], "a": "A transformation of the way individuals see themselves and their future opportunities, achieved through change strategies acting on individual consciousness, social culture and political culture."}, {"id": "caring-01", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "In everyday terms, what does 'caring' involve according to the lecture's opening brainstorm?", "tags": ["definition", "caring"], "a": "Caring involves sharing, kind acts, being helpful, empathising, being compassionate, and looking after others."}, {"id": "caring-02", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "Whose quote about the power of a touch, a smile, a kind word and a listening ear is used to illustrate caring in nursing?", "tags": ["quote", "caring"], "a": "Leo Buscaglia (from The Random Acts of Kindness Foundation), who said even the smallest act of caring has the potential to turn a life around."}, {"id": "caring-03", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "What are the three core dimensions of care in the Fundamentals of Care Framework, and what do they sit within?", "tags": ["framework", "fundamentals-of-care"], "a": "Physical, Psychosocial and Relational care. These sit within a relationship established between nurse and patient, and are shaped by the context and integration of care across the system and policy levels."}, {"id": "caring-04", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "core", "q": "Outline the components of the Fundamentals of Care Framework.", "tags": ["framework", "fundamentals-of-care"], "points": ["Care has three core dimensions: physical, psychosocial and relational.", "These dimensions are delivered within a relationship established between nurse and patient.", "The care relationship is shaped by the context of care and the integration of care.", "The framework operates within a wider system level and policy level.", "It centres on the patient experience, supported by nurse coordination, clinical reasoning and theories."], "panic": true}, {"id": "caring-05", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "According to the lecture, what are the five processes for building positive therapeutic relationships?", "tags": ["therapeutic-relationship", "framework"], "a": "Focus, Know, Trust, Anticipate, and Evaluate."}, {"id": "caring-06", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "core", "q": "Describe the five processes used to build a positive therapeutic relationship with a patient (focus, know, trust, anticipate, evaluate).", "tags": ["therapeutic-relationship", "framework"], "points": ["Focus – give the patient undivided attention on their individual needs so they feel heard.", "Know – knowing the patient through focus allows care to be tailored to their individual needs rather than a one-size-fits-all approach.", "Trust – built through focusing and knowing; making the patient feel heard and safe builds trust.", "Anticipate – by creating trust, knowing and focusing on the patient you can anticipate any areas of possible concern.", "Evaluate – regularly reflecting on and evaluating your care allows more effective holistic care tailored to the patient's needs."], "panic": true}, {"id": "caring-07", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "What is meant by holistic care in nursing?", "tags": ["holistic-care", "definition"], "a": "Holistic care recognises that people are complex and individual, so health and care do not relate only to physical wellbeing but to the whole person (physical, psychosocial, spiritual, cultural etc.).", "panic": true}, {"id": "caring-08", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "Besides communication, what other relational skills are highlighted as fundamentals of care?", "tags": ["therapeutic-relationship", "communication"], "a": "Active listening, collaboration, and partnership with the patient."}, {"id": "caring-09", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "In the Nursing Philosophies table, what was the focus of Florence Nightingale's legacy of caring?", "tags": ["nursing-history", "nightingale", "theories"], "a": "It focuses on the relationship between nursing and the patient's environment."}, {"id": "caring-10", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "What is the key idea of Ernestine Wiedenbach's 'helping art of clinical nursing'?", "tags": ["theories", "nursing-philosophies"], "a": "The helping process meets needs through the art of individualising care, and nurses should identify each patient's 'need-for-help'."}, {"id": "caring-11", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "What is Virginia Henderson best known for in her Definition of Nursing?", "tags": ["theories", "henderson", "nursing-philosophies"], "a": "She derived a definition of nursing, stated that patients require help towards achieving independence, and identified 14 basic human needs on which nursing care is based."}, {"id": "caring-12", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "What is the central idea of Faye G. Abdellah's Typology of Twenty-One Nursing Problems?", "tags": ["theories", "nursing-philosophies"], "a": "The patient's problems determine the nursing care that is provided."}, {"id": "caring-13", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "What are the three components of Lydia E. Hall's model, and what does her model direct nursing care towards?", "tags": ["theories", "care-cure-core", "nursing-philosophies"], "a": "Hall's model has three components: Care, Cure and Core. Nursing care is person-directed towards self-love."}, {"id": "caring-14", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "How does Jean Watson describe caring in her Philosophy and Science of Caring?", "tags": ["theories", "watson", "nursing-philosophies"], "a": "Caring is a universal, social phenomenon that is only effective when practised interpersonally, considering humanistic aspects. Caring is central to the essence of nursing."}, {"id": "caring-15", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "What five stages of skill acquisition did Patricia Benner describe in her Novice to Expert theory?", "tags": ["theories", "benner", "novice-to-expert"], "a": "Novice, advanced beginner, competent, proficient, and expert.", "panic": true}, {"id": "caring-16", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "According to Leininger's Transcultural Theory, what is caring in relation to nursing?", "tags": ["theories", "leininger", "transcultural"], "a": "Caring is the essence of nursing and is a distinguishing characteristic of it. The purpose of care is to assist the individual toward improvement in their condition."}, {"id": "caring-17", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "According to Leininger, caring has what three qualities?", "tags": ["theories", "leininger", "transcultural"], "a": "Caring is nurturing, dependent on the needs of the individual, and must reflect the patient's own culture."}, {"id": "caring-18", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "core", "q": "Explain the key points of Leininger's Transcultural Theory of caring.", "tags": ["theories", "leininger", "transcultural"], "points": ["Caring is the essence of nursing and is a distinguishing characteristic of the profession.", "The purpose of care is to assist the individual toward improvement in their condition.", "Caring is nurturing in nature.", "Caring is dependent on the needs of the individual.", "Caring must reflect the patient's own culture."]}, {"id": "caring-19", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "In Benner's Holistic Theory (Novice to Expert), what does 'caring' mean and what does she equate with excellent nursing practice?", "tags": ["theories", "benner", "holistic-care"], "a": "Benner equates excellent nursing practice with caring, and defines caring as connectedness or involvement. Caring helps patients understand and adjust to illness."}, {"id": "caring-20", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "How does Benner define health, and why does she say treatment must be individualised?", "tags": ["theories", "benner", "holistic-care"], "a": "Benner defines health as a state of being individualised by one's values, personality and lifestyle. Treatment for illness is worthless if it is not applied to the individual."}, {"id": "caring-21", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "In Watson's Theory of Human Caring, does the focus lie on caring or curing, and how does she define caring?", "tags": ["theories", "watson", "definition"], "a": "The focus is on cAring, not cUring. Watson defines caring as the 'protection, enhancement and preservation of the person's humanity' (Nelson & Watson, 2011, p. 6)."}, {"id": "caring-22", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "What are the key features of Watson's Theory of Human Caring?", "tags": ["theories", "watson"], "a": "Focus on caring not curing; 10 carative factors; holistic family/person-centred care; and the relationship has an effect on both the nurse and the patient.", "panic": true}, {"id": "caring-23", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "Why did Watson coin the term 'carative' instead of 'curative'?", "tags": ["theories", "watson", "caring-vs-curing"], "a": "To distinguish nursing from medicine. Curative factors aim at curing the patient of disease, whereas carative factors aim at the caring process that helps the person attain or maintain health or die a peaceful death (Watson, 1985, p.7)."}, {"id": "caring-24", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "core", "q": "Explain the distinction Watson draws between 'curative' and 'carative' factors, and why it matters for nursing.", "tags": ["theories", "watson", "caring-vs-curing"], "points": ["Curative factors aim at curing the patient of disease.", "Carative factors aim at the caring process that helps the person attain or maintain health, or die a peaceful death.", "Watson uses 'carative' rather than 'curative' to distinguish nursing from medicine.", "Nurses use carative factors in the delivery of health care to their clients.", "This reflects nursing's focus on caring rather than curing."], "panic": true}, {"id": "caring-25", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "detail", "q": "Identify Watson's first five carative factors.", "tags": ["theories", "watson", "carative-factors"], "points": ["The formation of a humanistic-altruistic system of values.", "The instillation of faith-hope.", "The cultivation of sensitivity to one's self and to others.", "The development of a helping-trusting relationship.", "The promotion and acceptance of the expression of positive and negative feelings."]}, {"id": "caring-26", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "detail", "q": "Identify Watson's last five (factors 6–10) carative factors.", "tags": ["theories", "watson", "carative-factors"], "points": ["The systematic use of the scientific problem-solving method for decision making.", "The promotion of interpersonal teaching-learning.", "The provision for a supportive, protective and/or corrective mental, physical, sociocultural and spiritual environment.", "Assistance with the gratification of human needs.", "The allowance for existential-phenomenological forces."]}, {"id": "caring-27", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "How many carative factors does Watson's theory contain, and what is their overall purpose?", "tags": ["theories", "watson", "carative-factors"], "a": "There are 10 carative factors. Their purpose is to guide the caring process that helps the person attain or maintain health or die a peaceful death, and nurses apply them in delivering health care to clients."}, {"id": "caring-28", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "What are the five dimensions of caring in Swanson's Theory of Caring?", "tags": ["theories", "swanson", "dimensions"], "a": "Maintaining belief, Knowing, Being with, Doing for, and Enabling."}, {"id": "caring-29", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "core", "q": "Describe Swanson's five dimensions of caring, giving the meaning of each.", "tags": ["theories", "swanson", "dimensions"], "points": ["Maintaining belief – having faith in the patient's capacity to get better, fostering hope and optimism.", "Knowing – actively listening to understand the patient's experiences and needs.", "Being with – offering emotional support, comfort and companionship by staying present with the patient.", "Doing for – providing physical care and assistance to meet the patient's needs.", "Enabling – empowering the patient to engage in their own care and decision-making, promoting independence and autonomy."], "panic": true}, {"id": "caring-30", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "In Swanson's theory, what does 'Being with' mean and give an example.", "tags": ["theories", "swanson", "presence"], "a": "'Being with' means offering emotional support, comfort and companionship by staying present with the patient – for example, staying by a patient's side during a painful procedure, holding their hand and offering words of comfort."}, {"id": "caring-31", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "In Swanson's theory, what does 'Enabling' mean and give an example.", "tags": ["theories", "swanson", "empowerment"], "a": "'Enabling' means empowering the patient to engage in their own care and decision-making, promoting independence and autonomy – for example, teaching a diabetic patient to monitor blood sugar, administer insulin, and follow a healthy diet and exercise regimen."}, {"id": "caring-32", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "What is 'duty of care' in nursing?", "tags": ["duty-of-care", "medico-legal", "definition"], "a": "Duty of care is a medico-legal obligation to take care and to do no harm, either through action or inaction. Legally, all people owe a duty of care to anyone who could foreseeably be harmed by their action or omission of action."}, {"id": "caring-33", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "What specifically is a nurse's duty of care?", "tags": ["duty-of-care", "medico-legal"], "a": "Nurses are obligated to ensure any intervention they carry out will foreseeably do no harm, and to ensure they do not carelessly omit any action or intervention that may lead to harm."}, {"id": "caring-34", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "core", "q": "Explain the concept of duty of care and how it applies to nurses.", "tags": ["duty-of-care", "medico-legal"], "points": ["Duty of care is a medico-legal obligation to take care (do no harm).", "The obligation is to do no harm, either through action or inaction.", "Legally, all people owe a duty of care to anyone who may foreseeably be harmed by their action or omission.", "Nurses are obligated to ensure any intervention they carry out will foreseeably do no harm.", "Nurses must ensure they do not carelessly omit any action or intervention that may lead to harm."], "panic": true}, {"id": "caring-35", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "How is an 'ethic of care' defined (Cooper, 1991)?", "tags": ["ethics-of-care", "definition"], "a": "An ethic of care is concerned with the relationships between people and with a nurse's character and attitude towards others (Cooper, 1991, p. 108)."}, {"id": "caring-36", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "core", "q": "Identify the elements/components of an ethic of care listed in the lecture.", "tags": ["ethics-of-care", "compassion"], "points": ["Empowering patients.", "Advocacy.", "Communication.", "Concern / compassion.", "Competence.", "Comfort."]}, {"id": "caring-37", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "What are the main ways nurses express care in practice (the expressions of care)?", "tags": ["expressions-of-care", "presence", "touch", "listening", "knowing"], "a": "Spiritual care, Presence, Touch, Listening, and Knowing.", "panic": true}, {"id": "caring-38", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "core", "q": "Describe the different ways nurses express care in practice.", "tags": ["expressions-of-care", "presence", "touch", "listening", "knowing"], "points": ["Spiritual – being aware of and honouring the patient's beliefs.", "Presence – being there physically and demonstrating understanding; 'being with' by sharing oneself (therapeutic use of self).", "Touch – skin-to-skin (therapeutic touch), eye contact (nonverbal), and protective touch to prevent injury.", "Listening – taking in patient information and interpreting what has been taken in.", "Knowing – understanding the client and the planned interventions, avoiding assumptions, and focusing on the client."]}, {"id": "caring-39", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "What is the difference between 'being there' and 'being with' as forms of presence?", "tags": ["expressions-of-care", "presence", "contrast"], "a": "'Being there' means being physically present and demonstrating understanding, whereas 'being with' means sharing oneself – the therapeutic use of self."}, {"id": "caring-40", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "What are the three forms/purposes of touch identified as an expression of care?", "tags": ["expressions-of-care", "touch"], "a": "Skin-to-skin therapeutic touch, eye contact (nonverbal touch/connection), and protective touch to prevent injury."}, {"id": "caring-41", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "As an expression of care, what does 'listening' involve?", "tags": ["expressions-of-care", "listening"], "a": "Listening involves taking in patient information and interpreting what has been taken in."}, {"id": "caring-42", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "As an expression of care, what does 'knowing' involve?", "tags": ["expressions-of-care", "knowing"], "a": "Knowing involves understanding the client, understanding the planned interventions, avoiding making assumptions, and staying focused on the client."}, {"id": "caring-43", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "How is 'intimate care' defined?", "tags": ["intimate-care", "definition"], "a": "Intimate care is the care tasks associated with bodily functions, body products and personal hygiene which demand direct or indirect contact with, or exposure of, the sexual parts of the body (Clark, 2006)."}, {"id": "caring-44", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "detail", "q": "Identify tasks that are included under 'intimate care'.", "tags": ["intimate-care"], "points": ["Dressing and undressing.", "Helping someone to use the toilet.", "Changing continence pads.", "Bathing and showering.", "Washing intimate parts of the body.", "Changing sanitary towels and tampons."]}, {"id": "caring-45", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "detail", "q": "Describe implications for practice when providing intimate care (training and skin care).", "tags": ["intimate-care", "practice"], "points": ["Carers should receive training in basic anatomy and hygiene.", "Carers should receive training in how to provide perineal-genital care to men and women.", "Individual assessments should determine appropriate use of detergents, emollients, barrier creams, moisturisers and incontinence pads.", "Water temperature should be tested prior to bathing.", "After washing, soap should be removed and skin dried carefully, paying attention to skin creases such as beneath the breasts."]}, {"id": "caring-46", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "detail", "q": "Discuss the psychological and person-centred considerations when providing intimate care.", "tags": ["intimate-care", "person-centred-care", "considerations"], "points": ["Carers should be mindful of the psychological effects a person may experience due to relying on others for private and intimate tasks.", "Individuals should be assessed to determine how much care they can do independently and how self-care skills can be improved.", "Intimate care should be planned using person-centred approaches, following written, person-centred guidelines.", "Knowledge of likes, dislikes and preferences can be gained through choices inventories and understanding non-verbal communication.", "Intimate care is an opportunity for positive interaction."]}, {"id": "caring-47", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "detail", "q": "Discuss the safety, dignity and policy considerations when providing intimate care.", "tags": ["intimate-care", "safety", "dignity"], "points": ["Policies on privacy and dignity should be clear and specific.", "All staff should be aware of and adhere to procedures for protecting vulnerable adults.", "Female carers should be available to support women with intimate care whenever necessary.", "Policies and procedures should be in place for infection control.", "Risk assessments should be in place, paying attention to mobility problems, sensory disabilities, moving and handling, and epilepsy."]}, {"id": "caring-48", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "detail", "q": "Identify good-practice points for providing intimate and personal continence care in any care setting.", "tags": ["intimate-care", "continence-care", "dignity"], "points": ["Keep service users covered up whenever possible.", "Avoid entering a room while other staff are carrying out intimate care; if unavoidable, knock and wait.", "Discuss intimate issues such as continence care in private (e.g. at handover in an office), being sensitive about language, tone and volume.", "Avoid drawing attention to a person's incontinence or speaking about it unnecessarily or in front of those who don't need to know.", "Enable service users to wear clothing that is easy to remove to promote independence, and allow time to toilet in private.", "Allow choices as much as possible and recognise that non-verbal behaviour may be meaningful communication."]}, {"id": "caring-49", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "What single skill is emphasised as central to providing intimate care appropriately?", "tags": ["intimate-care", "communication"], "a": "Communication – including sensitivity to language, tone and volume, and attention to non-verbal communication."}, {"id": "caring-50", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "What are the key principles of person-centred care?", "tags": ["person-centred-care", "principles"], "a": "Respect; Choice and empowerment; Access and support; Patient involvement in health policy; and Information."}, {"id": "caring-51", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "core", "q": "Explain the key principles of person-centred care (Australian Commission on Safety and Quality in Health Care).", "tags": ["person-centred-care", "principles"], "points": ["Respect – treating patients, consumers, carers and families with dignity and respect.", "Choice and empowerment – encouraging and supporting participation in decision-making by patients, consumers, carers and families.", "Access and support – ensuring access to necessary information, resources and services.", "Patient involvement in health policy – fostering collaboration in program and policy development, and in health service design, delivery and evaluation.", "Information – communicating and sharing information with patients, consumers, carers and families."], "panic": true}, {"id": "caring-52", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "What does 'choice and empowerment' mean as a principle of person-centred care?", "tags": ["person-centred-care", "empowerment"], "a": "Encouraging and supporting participation in decision-making by patients, consumers, carers and families."}, {"id": "caring-53", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "What are the key features of family (whanau)-centred care shown in the lecture?", "tags": ["family-centred-care", "whanau", "principles"], "a": "Collaboration, Information, Support, Participation encouraged, and respect for the family's Cultural background – with the family placed at the centre."}, {"id": "caring-54", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "structured", "difficulty": "core", "q": "Describe when family-centred care is evident, according to kidshealth.org.nz.", "tags": ["family-centred-care", "whanau"], "points": ["Families receive the information and support they need and request throughout the course of the child's or young person's treatment.", "Each family's beliefs, traditions and ways of coping are respected.", "Families are invited to share their knowledge of the child, ask the questions they need, and help identify the goals for the child's care.", "Families participate actively in all of the child's care and become full members of the care team.", "Parents are encouraged and supported to stay with their child and accompany them during procedures.", "Families are supported to allow increasing confidentiality between the child and health professionals as the child matures."]}, {"id": "caring-55", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "What is the difference in central figure between person-centred care and family-centred care?", "tags": ["contrast", "person-centred-care", "family-centred-care"], "a": "In person-centred care the individual person is at the centre; in family (whanau)-centred care the family is at the centre, with parents/carers actively participating and becoming full members of the care team."}, {"id": "caring-56", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "core", "q": "What overarching claim about caring is shared by Watson, Benner and Leininger?", "tags": ["theories", "caring", "synthesis"], "a": "That caring is central to – or the essence of – nursing: Watson calls caring central to the essence of nursing, Benner equates excellent practice with caring, and Leininger calls caring the essence and distinguishing characteristic of nursing.", "panic": true}, {"id": "caring-57", "topicSlug": "caring", "topic": "Caring in Nursing", "type": "recall", "difficulty": "detail", "q": "What single reference text underpins this 'Caring in Nursing' lecture?", "tags": ["reference"], "a": "Crisp, J., Douglas, C., Rebeiro, G., & Waters, D. (Eds.). (2021). Potter & Perry's Fundamentals of Nursing (6th ed., Australia and New Zealand). Elsevier Australia."}, {"id": "intersectorial-01", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "core", "q": "Define intersectorial collaboration (ISC).", "tags": ["definition", "core"], "a": "A recognised relationship between part or parts of different sectors of society which has been formed to take action on an issue to achieve health outcomes (or intermediate health outcomes) in a way that is more effective, efficient or sustainable than what might be achieved by the health sector acting alone.", "panic": true}, {"id": "intersectorial-02", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "core", "q": "According to the ISC definition, what three features characterise the relationship between the collaborating parties?", "tags": ["definition", "features", "core"], "a": "Joint decision making among inter-dependent parties; joint ownership of decisions; and collective responsibility for outcomes."}, {"id": "intersectorial-03", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "structured", "difficulty": "core", "q": "Explain what intersectorial collaboration is and identify its defining characteristics as a way of working across sectors.", "tags": ["definition", "core"], "points": ["It is a recognised relationship between parts of different sectors of society, formed to take action on an issue.", "Its purpose is to achieve health outcomes or intermediate health outcomes.", "It aims to be more effective, efficient or sustainable than the health sector acting alone.", "It involves joint decision making among inter-dependent parties.", "It involves joint ownership of decisions.", "It involves collective responsibility for outcomes."], "panic": true}, {"id": "intersectorial-04", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "core", "q": "Why is collaboration across sectors necessary rather than the health sector acting alone?", "tags": ["rationale", "determinants", "core"], "a": "The determinants of the health of populations and communities are diverse, complex and multi-factorial, and are therefore frequently beyond the capacity of the health sector to influence on its own; ISC also reduces barriers between sectors and uses resources efficiently, reducing duplication."}, {"id": "intersectorial-05", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "core", "q": "What two efficiency aims does ISC pursue in the way it uses resources across sectors?", "tags": ["rationale", "efficiency", "core"], "a": "It aims to reduce barriers between sectors and to use resources in an efficient manner, thereby reducing duplication."}, {"id": "intersectorial-06", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "structured", "difficulty": "core", "q": "Identify the key sectors in New Zealand that participate in intersectorial collaboration for health.", "tags": ["sectors", "nz-examples", "core"], "points": ["Ministry for Social Development (WINZ / former CYFS).", "Education sector.", "Housing New Zealand (now Kāinga Ora).", "Retailers and the food industry.", "Employers.", "The leisure industry and sports bodies (SPARC / Sport NZ)."], "panic": true}, {"id": "intersectorial-07", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "Which social-development agencies were named as ISC partners in the slides?", "tags": ["sectors", "msd", "detail"], "a": "The Ministry for Social Development, including WINZ (Work and Income) and the former CYFS (Child, Youth and Family Services)."}, {"id": "intersectorial-08", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "What is the current name of Housing New Zealand, and why is it an ISC partner?", "tags": ["sectors", "housing", "detail"], "a": "Housing New Zealand is now Kāinga Ora. It is an ISC partner because housing quality (warmth, dampness, crowding) is a key social determinant of health it can directly address."}, {"id": "intersectorial-09", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "Which sports/leisure body was named as an ISC partner in the NZ sectors list?", "tags": ["sectors", "sport", "detail"], "a": "SPARC (Sport and Recreation New Zealand), now Sport NZ, together with the wider leisure industry."}, {"id": "intersectorial-10", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "structured", "difficulty": "core", "q": "Identify the features that make intersectorial collaboration effective (what needs to be in place for collaboration to work well).", "tags": ["enablers", "effective-collaboration", "core"], "points": ["There is a common purpose most effectively accomplished through a joint approach.", "Relevant responsibility is given to the most appropriate agency with regard to health outcomes.", "The funding and contracting environment supports collaborative action.", "The workforce is skilled in initiating and facilitating collaborative action.", "Power, resources, information and responsibility are shared across members.", "Members respect the values and cultures of the other parties, with trust built through transparency of decision-making and open dialogue."], "panic": true}, {"id": "intersectorial-11", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "core", "q": "In effective collaboration, what four things are shared across the members?", "tags": ["enablers", "effective-collaboration", "core"], "a": "Power, resources, information and responsibility are shared across all members of the collaboration."}, {"id": "intersectorial-12", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "How is trust and confidence built within an effective collaboration?", "tags": ["enablers", "trust", "detail"], "a": "Trust and confidence are built through transparency of decision-making."}, {"id": "intersectorial-13", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "What is the aim of maintaining open dialogue in a collaboration?", "tags": ["enablers", "communication", "detail"], "a": "To reach agreement on a common language, joint values, shared responsibilities and agreed action plans."}, {"id": "intersectorial-14", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "structured", "difficulty": "core", "q": "Identify the factors that impact negatively on intersectorial collaboration (i.e. the barriers).", "tags": ["barriers", "core"], "points": ["Lack of long-term funding.", "Lack of capacity from some of the partners.", "Lack of leadership and coordination.", "Poor communication.", "Poor community engagement.", "Differing outcome measurements, agendas or priorities, and inability to agree on a common purpose or define professional boundaries."], "panic": true}, {"id": "intersectorial-15", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "Which barrier concerns partners having different measures of success or aims?", "tags": ["barriers", "detail"], "a": "Differing outcome measurements, agendas or priorities, including an inability to agree on a common purpose or to define professional boundaries."}, {"id": "intersectorial-16", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "structured", "difficulty": "detail", "q": "A collaboration is failing to progress. Explain how the barriers to intersectorial collaboration could account for this, and contrast eac
