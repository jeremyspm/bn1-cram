<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0e1420"/>
<title>BN1 722.553 — Active Recall Cram</title>
<style>
:root{
  --bg:#0e1420; --bg2:#141c2b; --card:#182133; --card2:#1e2941;
  --line:#27324a; --line2:#33405c;
  --tx:#e8eef7; --tx2:#9fb0c8; --tx3:#6d7f9c;
  --acc:#4f9dff; --acc2:#2f6fd0;
  --good:#39d98a; --hard:#ffce54; --miss:#ff6b6b;
  --gGood:#123a2a; --gHard:#3a3413; --gMiss:#3a1a1a;
  --shadow:0 10px 40px rgba(0,0,0,.45);
  --r:16px; --maxw:760px;
}
html[data-theme="light"]{
  --bg:#eef2f8; --bg2:#e3e9f3; --card:#ffffff; --card2:#f4f7fc;
  --line:#dbe3ef; --line2:#c7d3e6;
  --tx:#16202f; --tx2:#4a5a72; --tx3:#7d8ca5;
  --acc:#1f6fe0; --acc2:#1657b8;
  --good:#128a55; --hard:#a9791a; --miss:#c53b3b;
  --gGood:#dcf7ea; --gHard:#faf0d2; --gMiss:#fbe0e0;
  --shadow:0 8px 30px rgba(30,50,90,.14);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--tx); font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased; min-height:100%;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.wrap{max-width:var(--maxw);margin:0 auto;padding:14px 16px 120px}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;background:none}
.hidden{display:none !important}
kbd{font:600 11px/1 ui-monospace,Menlo,Consolas,monospace;background:var(--card2);border:1px solid var(--line2);border-radius:5px;padding:2px 5px;color:var(--tx2)}

/* Header */
header{display:flex;align-items:center;gap:10px;margin:6px 0 12px;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;line-height:1.15;margin-right:auto}
.brand b{font-size:15px;letter-spacing:.2px}
.brand span{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.2px}
.iconbtn{width:38px;height:38px;border-radius:10px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--tx2);transition:.15s}
.iconbtn:hover{border-color:var(--line2);color:var(--tx)}

/* Progress bar */
.prog{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:12px}
.prog .row{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--tx2);margin-bottom:8px;flex-wrap:wrap}
.prog .row b{color:var(--tx);font-variant-numeric:tabular-nums}
.pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:20px;background:var(--card2);border:1px solid var(--line);font-size:11.5px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.bar{height:9px;border-radius:6px;background:var(--card2);overflow:hidden;display:flex}
.bar i{height:100%;display:block;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.bar .m{background:linear-gradient(90deg,var(--good),#2fb673)}
.bar .l{background:linear-gradient(90deg,var(--hard),#e0a92e)}

/* Controls */
.controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px;flex-wrap:wrap}
.seg button{padding:7px 12px;border-radius:8px;font-size:12.5px;color:var(--tx2);font-weight:600;white-space:nowrap;transition:.12s}
.seg button.on{background:var(--acc);color:#fff}
.seg button:not(.on):hover{color:var(--tx);background:var(--card2)}

/* PANIC hero button + active bar */
@keyframes panicPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,45,45,.55),0 10px 30px rgba(255,40,40,.35)}
  50%{box-shadow:0 0 0 15px rgba(255,45,45,0),0 12px 42px rgba(255,40,40,.5)}
}
@keyframes sheen{0%{transform:translateX(-120%)}60%,100%{transform:translateX(220%)}}
.panic-hero{position:relative;width:100%;margin:2px 0 14px;border:none;border-radius:16px;padding:22px 18px;text-align:center;color:#fff;overflow:hidden;cursor:pointer;
  background:linear-gradient(160deg,#ff4646,#d10f0f 62%,#9c0000);
  box-shadow:0 0 0 0 rgba(255,45,45,.5),0 10px 30px rgba(255,40,40,.35);
  animation:panicPulse 1.9s infinite;transition:transform .1s}
.panic-hero::after{content:"";position:absolute;top:0;left:0;width:40%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.28),transparent);transform:translateX(-120%);animation:sheen 4.2s infinite}
.panic-hero:hover{transform:translateY(-1px)}
.panic-hero:active{transform:translateY(1px) scale(.997)}
.panic-hero .big{position:relative;display:block;font-size:22px;font-weight:900;letter-spacing:.4px;line-height:1.12;text-shadow:0 1px 3px rgba(0,0,0,.35)}
.panic-hero .sub{position:relative;display:block;margin-top:7px;font-size:12.5px;font-weight:700;opacity:.94;letter-spacing:.2px}
.panic-hero .siren{font-size:21px;vertical-align:-3px}
@media(max-width:520px){.panic-hero{padding:18px 14px}.panic-hero .big{font-size:17.5px}}
@media(prefers-reduced-motion:reduce){.panic-hero{animation:none}.panic-hero::after{animation:none;display:none}}
.panic-bar{width:100%;margin:2px 0 14px;border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:9px;
  background:linear-gradient(90deg,rgba(255,59,59,.18),rgba(255,59,59,.05));border:1px solid rgba(255,59,59,.42);color:#ff9a9a;font-weight:800;font-size:13px}
.panic-bar .siren{font-size:16px}
.panic-bar b{color:#fff;font-variant-numeric:tabular-nums}
.panic-bar .ex{margin-left:auto;padding:6px 13px;border-radius:8px;background:rgba(255,59,59,.2);border:1px solid rgba(255,59,59,.42);color:#ffbcbc;font-weight:700;font-size:12px}
.panic-bar .ex:hover{background:rgba(255,59,59,.34);color:#fff}
.sheet.panic{border-color:rgba(255,59,59,.55);box-shadow:0 0 44px rgba(255,40,40,.28)}
.sheet.panic h3{color:#ff6b6b}
.bigstart{width:100%;margin-top:16px;padding:16px;border-radius:12px;border:none;color:#fff;font-size:17px;font-weight:900;letter-spacing:.5px;cursor:pointer;
  background:linear-gradient(160deg,#ff4646,#c40d0d);box-shadow:0 8px 24px rgba(255,40,40,.42)}
.bigstart:hover{filter:brightness(1.08)}

/* Card */
.stage{min-height:340px;display:flex;flex-direction:column}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:22px 22px 20px;display:flex;flex-direction:column;position:relative;animation:pop .28s cubic-bezier(.2,.9,.3,1.2)}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:none}}
.cmeta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tag{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:6px}
.tag.topic{background:var(--card2);border:1px solid var(--line2);color:var(--tx2)}
.tag.type5{background:rgba(79,157,255,.14);color:var(--acc);border:1px solid rgba(79,157,255,.3)}
.tag.core{background:rgba(57,217,138,.13);color:var(--good);border:1px solid rgba(57,217,138,.3)}
.tag.box{margin-left:auto;background:var(--card2);border:1px solid var(--line);color:var(--tx3)}
.q{font-size:20px;font-weight:650;line-height:1.4;letter-spacing:-.2px;margin:2px 0 6px}
.marks{font-size:12.5px;color:var(--tx3);margin-bottom:6px}
.prompt-hint{font-size:12.5px;color:var(--tx3);margin-top:14px;font-style:italic}

.answer{margin-top:16px;border-top:1px dashed var(--line2);padding-top:16px;animation:pop .22s ease}
.answer .lab{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-bottom:8px}
.answer .txt{font-size:16.5px;line-height:1.6;color:var(--tx)}
.points{list-style:none;margin:4px 0 0;padding:0;display:flex;flex-direction:column;gap:8px}
.points li{display:flex;gap:10px;align-items:flex-start;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14.5px;line-height:1.45;transition:.15s}
.points li .n{flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:var(--bg2);border:1px solid var(--line2);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--tx2);margin-top:1px}
.points li.got{background:var(--gGood);border-color:rgba(57,217,138,.4)}
.points li.got .n{background:var(--good);color:#04120b;border-color:var(--good)}
.points li .chk{margin-left:auto;flex:0 0 auto;font-size:12px;color:var(--tx3);align-self:center;user-select:none}
.recall-hint{font-size:12px;color:var(--tx3);margin:10px 0 2px}

/* Action buttons */
.actions{margin-top:18px;display:flex;flex-direction:column;gap:10px}
.reveal{width:100%;padding:15px;border-radius:12px;background:var(--acc);color:#fff;font-size:15.5px;font-weight:700;letter-spacing:.2px;transition:.14s;box-shadow:0 6px 18px rgba(79,157,255,.28)}
.reveal:hover{background:var(--acc2)}
.grades{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.grade{padding:14px 8px;border-radius:12px;font-weight:700;font-size:14px;border:1.5px solid var(--line2);background:var(--card2);color:var(--tx);display:flex;flex-direction:column;align-items:center;gap:2px;transition:.13s}
.grade small{font-weight:600;font-size:10.5px;opacity:.7}
.grade .num{position:absolute}
.grade.g1:hover{border-color:var(--miss);background:var(--gMiss);color:var(--miss)}
.grade.g2:hover{border-color:var(--hard);background:var(--gHard);color:var(--hard)}
.grade.g3:hover{border-color:var(--good);background:var(--gGood);color:var(--good)}
.grade b{font-size:15px}
.gk{font-size:10px;opacity:.6;font-weight:600}

/* Empty / done state */
.done{text-align:center;padding:50px 20px;background:var(--card);border:1px solid var(--line);border-radius:var(--r)}
.done .big{font-size:46px;margin-bottom:10px}
.done h2{margin:.2em 0;font-size:22px}
.done p{color:var(--tx2);max-width:440px;margin:6px auto 18px}
.btn{display:inline-block;padding:11px 18px;border-radius:11px;background:var(--acc);color:#fff;font-weight:700;font-size:14px}
.btn.ghost{background:var(--card2);border:1px solid var(--line2);color:var(--tx)}

/* Footer hint */
.foot{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(0deg,var(--bg) 65%,transparent);padding:10px 16px calc(10px + env(safe-area-inset-bottom));text-align:center;font-size:11.5px;color:var(--tx3)}
.foot .keys{display:inline-flex;gap:12px;flex-wrap:wrap;justify-content:center}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(6,10,18,.66);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;padding:24px 14px;z-index:50;overflow:auto;animation:pop .2s ease}
.sheet{background:var(--bg2);border:1px solid var(--line2);border-radius:16px;max-width:600px;width:100%;padding:20px 20px 22px;box-shadow:var(--shadow);margin:auto}
.sheet h3{margin:0 0 4px;font-size:18px}
.sheet .sub{color:var(--tx3);font-size:12.5px;margin-bottom:16px}
.sheet h4{margin:18px 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3)}
.topicgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:520px){.topicgrid{grid-template-columns:1fr}.q{font-size:18px}.wrap{padding:12px 12px 120px}}
.tchip{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;background:var(--card);border:1px solid var(--line);font-size:13px;text-align:left;transition:.12s}
.tchip:hover{border-color:var(--line2)}
.tchip.on{border-color:var(--acc);background:rgba(79,157,255,.08)}
.tchip .cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line2);flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.tchip.on .cb{background:var(--acc);border-color:var(--acc)}
.tchip .nm{flex:1;line-height:1.25}
.tchip .ct{font-size:11px;color:var(--tx3);font-variant-numeric:tabular-nums}
.tchip .mini{height:4px;border-radius:3px;background:var(--card2);margin-top:4px;overflow:hidden}
.tchip .mini i{display:block;height:100%;background:var(--good)}
.rowbtns{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.linkbtn{font-size:12.5px;color:var(--acc);font-weight:600;padding:6px 8px;border-radius:8px}
.linkbtn:hover{background:var(--card)}
.linkbtn.danger{color:var(--miss)}
.explain{font-size:13.5px;color:var(--tx2);line-height:1.6}
.explain b{color:var(--tx)}
.explain ul{margin:8px 0;padding-left:18px}
.explain li{margin:4px 0}
.plan{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.plan div{display:flex;gap:10px;font-size:13px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 11px}
.plan span{color:var(--acc);font-weight:700;flex:0 0 62px;font-variant-numeric:tabular-nums}
.closex{float:right;font-size:22px;color:var(--tx3);line-height:1;margin:-4px -4px 0}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line2);color:var(--tx);padding:9px 16px;border-radius:20px;font-size:13px;box-shadow:var(--shadow);z-index:60;animation:pop .2s ease}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <b>BN1 · 722.553 Foundations</b>
      <span id="methodLbl">Active Recall Engine</span>
    </div>
    <button class="iconbtn" id="planBtn" title="12-hour cram plan &amp; how to use">?</button>
    <button class="iconbtn" id="topicBtn" title="Topics &amp; settings">☰</button>
    <button class="iconbtn" id="themeBtn" title="Toggle theme">◐</button>
  </header>

  <button class="panic-hero" id="panicHero" title="Start the 3-hour pass blitz">
    <span class="big"><span class="siren">🚨</span> I'M PANICKING — HELP ME PASS THIS RIGHT NOW</span>
    <span class="sub">3-hour pass-or-die blitz · only the <span id="panicN">0</span> highest-yield cards · tap to start</span>
  </button>
  <div class="panic-bar hidden" id="panicBar">
    <span class="siren">🚨</span><span>PANIC BLITZ</span>
    <b id="panicBarStat">0/0 locked in</b>
    <button class="ex" id="panicExit">Exit blitz</button>
  </div>

  <div class="prog">
    <div class="row">
      <span class="pill"><i class="dot" style="background:var(--good)"></i><b id="pMaster">0</b>&nbsp;mastered</span>
      <span class="pill"><i class="dot" style="background:var(--hard)"></i><b id="pLearn">0</b>&nbsp;learning</span>
      <span class="pill"><i class="dot" style="background:var(--tx3)"></i><b id="pNew">0</b>&nbsp;new</span>
      <span style="margin-left:auto;color:var(--tx3)"><b id="pPct" style="color:var(--tx)">0%</b> of <b id="pTotal">0</b> in scope</span>
    </div>
    <div class="bar"><i class="m" id="barM" style="width:0"></i><i class="l" id="barL" style="width:0"></i></div>
  </div>

  <div class="controls">
    <div class="seg" id="modeSeg">
      <button data-mode="smart" class="on">Smart mix</button>
      <button data-mode="core">Core blitz</button>
      <button data-mode="fivemark">5-mark drill</button>
      <button data-mode="weak">Weak spots</button>
    </div>
  </div>

  <div class="stage" id="stage"></div>
</div>

<div class="foot">
  <div class="keys">
    <span><kbd>Space</kbd> reveal</span>
    <span><kbd>1</kbd> missed</span>
    <span><kbd>2</kbd> hard</span>
    <span><kbd>3</kbd> got it</span>
    <span><kbd>T</kbd> topics</span>
  </div>
</div>

ols and customs, and we celebrate culture through art, music, literature, drama and social gatherings. It is made up of people with a collective heritage."}, {"id": "culture-diversity-05", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "What does it mean that culture is shared?", "tags": ["shared", "culture"], "a": "Behaviours and values are shared by cultural groups, and norms are shared through interaction and socialisation. This guides our behaviour according to what is acceptable in specific groups and provides an identity for all members of that group."}, {"id": "culture-diversity-06", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "What does it mean that culture is dynamic?", "tags": ["dynamic", "culture"], "a": "Culture is dynamic because it is associated with adaptation to the environment – as the environment changes, so does the cultural group, in order to improve and survive. Cultures may vary, but humans cannot exist without culture. Although practices and beliefs adapt over time, they remain constant if they are identifying (meeting) needs."}, {"id": "culture-diversity-07", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "Culture transcends generations – what does this mean?", "tags": ["transcends-generations", "learned"], "a": "Culture is transmitted (passed) from one generation to the next; it is learned through life experiences within one’s cultural group rather than being biologically inherited."}, {"id": "culture-diversity-08", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "structured", "difficulty": "core", "q": "Discuss culture as being learned, dynamic and transcending generations. (5 marks)", "tags": ["culture", "learned", "dynamic", "transcends-generations"], "points": ["Culture is LEARNED (not innate) – it is learned through life experiences within one’s cultural group.", "Everything humans perceive, know, think, value and feel is learned through participating in a cultural system.", "Culture is DYNAMIC – it is associated with adaptation to the environment; as the environment changes the cultural group changes in order to improve and survive.", "Although practices and beliefs adapt over time, they remain constant if they are still identifying (meeting) needs.", "Culture TRANSCENDS GENERATIONS – it is transmitted from one generation to another.", "Cultures may vary, but humans cannot exist without culture."], "panic": true}, {"id": "culture-diversity-09", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "What is material culture? Give examples.", "tags": ["material-culture", "cultural-components"], "a": "Material culture is any physical substance that is changed or used by people – e.g. infrastructure, furniture, tools and art."}, {"id": "culture-diversity-10", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "What is non-material culture? Give examples.", "tags": ["non-material-culture", "cultural-components"], "a": "Non-material culture is the intangible elements of culture – e.g. words, beliefs and habits, customs and ideas."}, {"id": "culture-diversity-11", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "structured", "difficulty": "core", "q": "Explain the difference between material and non-material culture, giving examples of each. (5 marks)", "tags": ["material-culture", "non-material-culture", "contrast"], "points": ["Material culture is any physical (tangible) substance that is changed or used by people.", "Examples of material culture include infrastructure, furniture, tools and art.", "Non-material culture is made up of the intangible elements of a culture.", "Examples of non-material culture include words, beliefs and habits, customs and ideas.", "Together, the material and non-material components make up a culture.", "The key distinction is tangible/physical (material) versus intangible/conceptual (non-material)."], "panic": true}, {"id": "culture-diversity-12", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "What are norms?", "tags": ["norms", "definition"], "a": "Norms are shared rules or expectations of behaviour, shared through interaction and socialisation, that guide our behaviour according to what is acceptable in a specific group."}, {"id": "culture-diversity-13", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "What are mores?", "tags": ["mores", "definition"], "a": "Mores are the major rules of conduct within a culture – they are morally significant and essential."}, {"id": "culture-diversity-14", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "What are laws (in the norms/mores/laws framework)?", "tags": ["laws", "definition"], "a": "Laws are formally enacted norms – they are enforced by police and codified in documents."}, {"id": "culture-diversity-15", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "structured", "difficulty": "core", "q": "Explain the difference between norms, mores and laws. (5 marks)", "tags": ["norms", "mores", "laws", "contrast"], "points": ["Norms are shared rules/expectations of behaviour, learned through interaction and socialisation, that guide what is acceptable in a group.", "Mores are the MAJOR rules of conduct within a culture.", "Mores are morally significant and essential to the culture.", "Laws are formally enacted norms.", "Laws are enforced by police.", "Laws are codified (written down) in documents."], "panic": true}, {"id": "culture-diversity-16", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "What is a sub-culture?", "tags": ["sub-culture", "definition"], "a": "A sub-culture is a group of people with a distinct set of behaviours and beliefs that differentiate them from the larger cultural group.", "panic": true}, {"id": "culture-diversity-17", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "What is a minority group?", "tags": ["minority-group", "definition"], "a": "A minority group is a group that has a smaller population than the controlling majority, distinguished by markers such as ethnicity, race, gender, occupation or any other socio-cultural marker.", "panic": true}, {"id": "culture-diversity-18", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "structured", "difficulty": "detail", "q": "Identify the socio-cultural markers that can distinguish a minority group or sub-culture. (5 marks)", "tags": ["minority-group", "sub-culture", "markers"], "points": ["Ethnicity can distinguish a minority group.", "Race can distinguish a minority group.", "Gender can distinguish a minority group.", "Occupation can distinguish a minority group.", "Any other socio-cultural marker can distinguish a minority group.", "A minority group is defined as a group with a smaller population than the controlling majority."]}, {"id": "culture-diversity-19", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "What is ethnocentrism?", "tags": ["ethnocentrism", "definition", "key-term"], "a": "Ethnocentrism is judging another culture by the standards and values of one’s own culture, treating one’s own culture as the norm or as superior. (Listed as a key term in the lecture; the definition given here is the standard, well-established one.)", "panic": true}, {"id": "culture-diversity-20", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "How does race differ from ethnicity? (biology vs culture)", "tags": ["race", "ethnicity", "contrast"], "a": "Race is based on biology and physical characteristics (e.g. brown and white), is unchangeable, and rests on assumptions. Ethnicity is based on culture, ancestry and origin, involves learned cultural behaviours, and can be altered or mimicked. The terms are often used interchangeably but are NOT the same."}, {"id": "culture-diversity-21", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "structured", "difficulty": "core", "q": "Explain the difference between race and ethnicity. (5 marks)", "tags": ["race", "ethnicity", "contrast"], "points": ["Race is based on biology / physical characteristics (e.g. skin colour – brown and white).", "Race is unchangeable and is often based on assumptions.", "Ethnicity is based on culture, ancestry and origin.", "Ethnicity involves learned cultural behaviours that can be altered or mimicked.", "The two terms are often used interchangeably but they are NOT the same.", "No true biological race exists; race should be placed on a continuum."], "panic": true}, {"id": "culture-diversity-22", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "How is race described in the lecture?", "tags": ["race", "definition"], "a": "Race is an externally imposed social categorisation and stratification based on physical characteristics such as skin pigment, hair texture, body stature and facial features. It is often used interchangeably with ethnicity (but is not the same), no true biological race exists, and it should be placed on a continuum."}, {"id": "culture-diversity-23", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "structured", "difficulty": "detail", "q": "Identify the physical characteristics on which the concept of race is based. (5 marks)", "tags": ["race", "physical-characteristics"], "points": ["Skin pigment is a physical characteristic used to categorise race.", "Hair texture is a physical characteristic used to categorise race.", "Body stature is a physical characteristic used to categorise race.", "Facial features are a physical characteristic used to categorise race.", "Race is an externally imposed social categorisation and stratification.", "No true biological race exists – race should be placed on a continuum."]}, {"id": "culture-diversity-24", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "What is ethnicity?", "tags": ["ethnicity", "definition"], "a": "Ethnicity refers to distinct cultural norms and values, with identification largely based on common heritage. People belong either by birth or by adoption of the characteristics, and members share unique common behaviour patterns and social and cultural beliefs."}, {"id": "culture-diversity-25", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "structured", "difficulty": "detail", "q": "Identify the factors that help differentiate between ethnic groups. (5 marks)", "tags": ["ethnicity", "factors"], "points": ["Language differentiates between ethnic groups.", "Religion differentiates between ethnic groups.", "Dress differentiates between ethnic groups.", "Ancestry differentiates between ethnic groups.", "History differentiates between ethnic groups."]}, {"id": "culture-diversity-26", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "detail", "q": "By what means can a person belong to an ethnic group?", "tags": ["ethnicity", "belonging"], "a": "A person can belong to an ethnic group either by birth or by adoption of the characteristics; members share distinct cultural norms and values and unique common behaviour patterns, based largely on common heritage."}, {"id": "culture-diversity-27", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "What is cultural identity?", "tags": ["cultural-identity", "definition"], "a": "Cultural identity is an individual’s sense of belonging to a particular culture or group, shaped by shared characteristics such as language, traditions, beliefs, values and norms. It relates to social categories including nationality, ethnicity and religion, and is influenced by factors such as ancestry, social class and locality, contributing to how individuals perceive themselves and their connection to their community."}, {"id": "culture-diversity-28", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "Who are the indigenous population of New Zealand?", "tags": ["nz-population", "maori"], "a": "Māori are the indigenous population of New Zealand. New Zealand also has a large migrant population, bringing a wide range of different ethnicities."}, {"id": "culture-diversity-29", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "detail", "q": "In the 2023 Census, how many people identified as Māori (number and percentage)?", "tags": ["nz-population", "census-2023", "statistic", "maori"], "a": "887,493 people (17.8 percent) identified as Māori in the 2023 Census (StatsNZ)."}, {"id": "culture-diversity-30", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "detail", "q": "In the 2023 Census, how many people identified as Asian, as Pacific peoples, and as MELAA?", "tags": ["nz-population", "census-2023", "statistic", "melaa"], "a": "Asian: 861,576 people (17.3 percent); Pacific peoples: 442,632 people (8.9 percent); MELAA (Middle Eastern/Latin American/African): 92,760 people (1.9 percent) (2023 Census, StatsNZ)."}, {"id": "culture-diversity-31", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "structured", "difficulty": "detail", "q": "Identify the key ethnic-group figures from the 2023 New Zealand Census. (5 marks)", "tags": ["nz-population", "census-2023", "statistic"], "points": ["Māori – 887,493 people (17.8 percent).", "Asian – 861,576 people (17.3 percent).", "Pacific peoples – 442,632 people (8.9 percent).", "MELAA (Middle Eastern/Latin American/African) – 92,760 people (1.9 percent).", "Asian and Māori had the largest numeric increases from 2018–2023 (up 153,978 and 111,657 respectively).", "Māori are the indigenous population; New Zealand also has a large migrant population."]}, {"id": "culture-diversity-32", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "detail", "q": "What was New Zealand’s annual net migration for 2022–2023?", "tags": ["nz-population", "migration", "statistic"], "a": "For 2022–2023, annual net migration was a gain of 65,400 (±1,900), compared with a net loss of 19,300 (±100) the prior period. Immigrant arrivals were 161,900 (±1,800), up 199 percent, and migrant departures were 96,500 (±1,200), up 31 percent."}, {"id": "culture-diversity-33", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "Even though members share a culture, what is true of individuals within that culture?", "tags": ["individuals-unique", "culture"], "a": "Individuals are unique. Although a cultural group shares behaviours, values and norms, each person also has their own name, nationality, ethnic and cultural identity, racial identity, age, gender and language, so care must be individualised rather than assumed from group membership."}, {"id": "culture-diversity-34", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "detail", "q": "What aspects make up ‘who you are’ according to the lecture’s self-identity prompt?", "tags": ["identity", "individuals-unique"], "a": "Name, nationality, ethnic identity, ascribed ethnic group, cultural identity, racial identity, age, gender and language."}, {"id": "culture-diversity-35", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "core", "q": "Which course learning outcome does this lecture support?", "tags": ["learning-outcome", "cultural-safety"], "a": "Course learning outcome 1: Demonstrate an understanding of the concept of cultural safety as it relates to nursing practice (NZNC)."}, {"id": "culture-diversity-36", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "structured", "difficulty": "detail", "q": "Identify the key cultural/diversity terms nursing students are expected to know for this topic. (5 marks)", "tags": ["key-terms", "vocabulary"], "points": ["Culture; Culturally Congruent Care; Cultural Competence; Cultural Safety.", "Cultural Stereotyping, Imposition and Assimilation.", "Ethnocentrism.", "Prejudice & Discrimination; Racism.", "Race & Ethnicity; Minority Groups & Sub-cultures.", "Norms, Mores & Laws; Health Care Communication."], "panic": true}, {"id": "culture-diversity-37", "topicSlug": "culture-diversity", "topic": "Culture & Diversity", "type": "recall", "difficulty": "detail", "q": "Is culture always relative to ethnicity?", "tags": ["culture", "ethnicity"], "a": "No. The lecture poses this as a question to challenge students: culture is not always tied to ethnicity – sub-cultures and minority groups can be based on other markers such as gender, occupation or any socio-cultural marker, and individuals within an ethnic group are unique."}, {"id": "cultural-safety-01", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "According to the NCNZ (2026), what is the definition of cultural safety?", "tags": ["definition", "NCNZ", "core"], "a": "Cultural safety is the effective nursing practice of a person or family/whanau from another culture, and is determined by that person or family/whanau. The nurse delivering the service will have undertaken a process of reflection on their own cultural identity and will recognise the impact their personal culture has on their professional practice.", "panic": true}, {"id": "cultural-safety-02", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "Who determines whether nursing care is culturally safe, and how is it measured?", "tags": ["who-defines", "recipient", "core"], "a": "It is determined by the person or family/whanau receiving the care, not the nurse. Cultural safety is measured by the recipient of nursing care."}, {"id": "cultural-safety-03", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "What is unsafe cultural practice?", "tags": ["unsafe-practice", "definition", "core"], "a": "Any action that diminishes, demeans or disempowers the cultural identity and wellbeing of people."}, {"id": "cultural-safety-04", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "Is cultural safety just about treating people equally?", "tags": ["equity", "core", "not-the-same"], "a": "No. Cultural safety is more than treating people equally; it means treating people in accordance with their cultural sensitivities, not treating everyone the same.", "panic": true}, {"id": "cultural-safety-05", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "Who developed the concept of cultural safety (kawa whakaruruhau) in nursing?", "tags": ["Ramsden", "origins", "core"], "a": "Irihapeti Ramsden (1946-2004), a Maori nurse, nurse educator and theorist.", "panic": true}, {"id": "cultural-safety-06", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "When did the concept of cultural safety (kawa whakaruruhau) begin, and how was it first suggested?", "tags": ["origins", "date", "detail"], "a": "It began 1988-1991. The concept was suggested by a student at Hui Waimanawa in 1988, who asked why - given healthcare professionals must be competent in areas such as legislation, ethics, clinical practice and knowledge - cultural safety was not also required."}, {"id": "cultural-safety-07", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "What experience of Maori nursing students led to the development of kawa whakaruruhau?", "tags": ["origins", "detail"], "a": "Maori nursing students expressed not feeling safe in nursing education and felt it was not preparing them to deliver culturally safe care. Out of this, kawa whakaruruhau (cultural safety) began."}, {"id": "cultural-safety-08", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "What did Irihapeti Ramsden's first publication in 1989 include?", "tags": ["Ramsden", "date", "detail"], "a": "A process for nurse educators to implement bicultural values in their courses."}, {"id": "cultural-safety-09", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "What ruling did the Nursing Council make in 1991 regarding the State Nursing Examination?", "tags": ["date", "Nursing-Council", "detail"], "a": "The Nursing Council ruled that 20% of the State Nursing Examination would contain questions related to Cultural Safety."}, {"id": "cultural-safety-10", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "In what year were Irihapeti Ramsden's Guidelines for Cultural Safety approved?", "tags": ["date", "guidelines", "detail"], "a": "1992. Ramsden was commissioned to write the Guidelines for Cultural Safety, which were subsequently approved in 1992."}, {"id": "cultural-safety-11", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "What key shift in the focus of cultural safety occurred in 1996?", "tags": ["date", "broadening", "detail"], "a": "A shift from the cultural safety of Maori specifically to a much broader focus on the cultural safety of all people who differ from nurses."}, {"id": "cultural-safety-12", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "How did Ramsden (1995) describe kawa whakaruruhau in relation to the wider professions?", "tags": ["Ramsden", "quote", "detail"], "a": "Although identified and initially shaped by the indigenous people of this country, kawa whakaruruhau - a process for protection - is 'the gift that Maori offer nursing, midwifery and all those who are different'."}, {"id": "cultural-safety-13", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "What are the three stages in the process leading to cultural safety, and who measures the final stage?", "tags": ["process", "three-stages", "core"], "a": "1. Cultural awareness, 2. Cultural sensitivity, 3. Cultural safety. Cultural safety is measured by the recipient of nursing care."}, {"id": "cultural-safety-14", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "structured", "difficulty": "core", "q": "Explain the difference between cultural awareness, cultural sensitivity and cultural safety in nursing practice.", "tags": ["contrast", "process", "core"], "points": ["The three form a progressive process, moving from cultural awareness to cultural sensitivity to cultural safety.", "Cultural awareness is the first step - becoming aware that cultural differences exist between people and cultures.", "Cultural sensitivity is the next step - being sensitive and respectful of the differences between and within cultures.", "Cultural safety extends beyond both cultural awareness and cultural sensitivity.", "Cultural safety is determined and measured by the recipient of the nursing care, not by the nurse.", "Unsafe practice is any action that diminishes, demeans or disempowers a person's cultural identity and wellbeing."], "panic": true}, {"id": "cultural-safety-15", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "What is kawa whakaruruhau, and what do the terms 'kawa' and 'whakaruruhau' mean?", "tags": ["kawa-whakaruruhau", "definition", "te-reo", "core"], "a": "Kawa whakaruruhau is cultural safety within a Maori context - a foundational concept in Maori health and nursing about creating and maintaining culturally safe environments for tangata whaiora. 'Kawa' refers to protocols or guiding principles that shape culturally appropriate engagement; 'whakaruruhau' means to shelter, protect or safeguard.", "panic": true}, {"id": "cultural-safety-16", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "What does kawa whakaruruhau centre, and what does it require of nurses?", "tags": ["kawa-whakaruruhau", "self-reflection", "detail"], "a": "It centres the experiences and aspirations of Maori and requires nurses to engage in sustained critical self-reflection, both professionally and personally - examining their own cultural positioning, the dynamics of power within all relationships, and the structural conditions that shape Maori experiences of care."}, {"id": "cultural-safety-17", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "What does the NCNZ require of all nurses in relation to cultural safety and their practising certificate?", "tags": ["NCNZ", "competence", "core"], "a": "All nurses must now demonstrate cultural safety to obtain their practising certificate."}, {"id": "cultural-safety-18", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "How did Dr Irihapeti Ramsden describe what cultural safety is about (in 'Moving On: A Graduation Address')?", "tags": ["Ramsden", "quote", "detail"], "a": "'Cultural safety is about the people who use our services feeling safe - not just being told they are safe.'"}, {"id": "cultural-safety-19", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "Culture is an 'umbrella term'. Besides ethnicity, what groups does the broad definition of cultural safety include?", "tags": ["umbrella-term", "list", "core"], "a": "Age or generation; gender / gender identity; sexual orientation; occupation and socioeconomic status; indigenous status, ethnic origin or migrant experience; religious or spiritual belief; and disability.", "panic": true}, {"id": "cultural-safety-20", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "structured", "difficulty": "core", "q": "Discuss the role of power in the nurse-patient relationship as it relates to cultural safety.", "tags": ["power", "core", "nurse-patient-relationship"], "points": ["Cultural safety requires nurses to be able to examine and critique healthcare structures and the power dynamics within healthcare.", "Power dynamics in healthcare can disadvantage some people and take away their power.", "Cultural safety recognises the nursing profession as inadvertent bearers of power.", "Cultural safety enables a safe, appropriate and acceptable service that is defined and determined by the recipient, with engagement in partnership.", "Cultural imposition is the tendency for powerful/dominant groups (including healthcare professionals) to impose their beliefs, practices, language and values on others.", "Unsafe practice is any action that demeans, diminishes or disempowers a person's cultural identity and wellbeing."], "panic": true}, {"id": "cultural-safety-21", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "structured", "difficulty": "core", "q": "Describe the key principles of cultural safety as set out by the NCNZ (2026).", "tags": ["principles", "NCNZ", "core"], "points": ["Cultural safety requires nurses to examine themselves and the potential impact of their own culture on nursing interactions and healthcare service delivery.", "Cultural safety requires a critical consciousness - ongoing self-reflection and self-awareness, awareness of limitations in cultural knowledge, and openness to learning from others.", "Cultural safety is a commitment by nurses to acknowledge and address their own biases, attitudes, assumptions, stereotypes and prejudices, including examining internalised racism and perceived privileges.", "Cultural safety enables a safe, appropriate and acceptable service defined and determined by the recipient, with engagement in partnership.", "Cultural safety is a commitment to challenging the cultural bias of colleagues or systemic biases within health services that contribute to poor health outcomes for marginalised cultures."], "panic": true}, {"id": "cultural-safety-22", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "What is 'critical consciousness' in the context of cultural safety?", "tags": ["critical-consciousness", "self-reflection", "detail"], "a": "A state where nurses engage in ongoing self-reflection and self-awareness, are aware of the limitations in their cultural knowledge, are open to learning from other people, and recognise when their actions might not be acceptable."}, {"id": "cultural-safety-23", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "structured", "difficulty": "core", "q": "Identify the key points on cultural safety made by the NCNZ (2026).", "tags": ["key-points", "NCNZ", "core"], "points": ["Cultural safety focuses on the individual's and whanau experience to define and improve the quality of care.", "Cultural safety recognises the nursing profession as inadvertent bearers of power.", "Cultural safety requires nurses to reflect on how their own biases and attitudes impact their relationships with individuals/whanau and other healthcare professionals.", "Cultural safety extends beyond cultural awareness and cultural sensitivity.", "Cultural competence may contribute to delivering healthcare but is not enough to improve health outcomes."]}, {"id": "cultural-safety-24", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "Why is cultural competence, on its own, considered not enough to improve health outcomes?", "tags": ["competence", "contrast", "core"], "a": "Cultural competence may contribute to delivering healthcare but is not enough by itself to improve health outcomes; cultural safety - which extends beyond cultural awareness and sensitivity and is defined by the recipient - is required."}, {"id": "cultural-safety-25", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "What is culturally congruent care?", "tags": ["culturally-congruent-care", "definition", "detail"], "a": "Healthcare services that honour and integrate the cultural beliefs, values and traditions of patients, acknowledging and accommodating diverse belief systems across races, ethnicities, religions and social classes to provide respectful, inclusive care that enhances the healthcare experience."}, {"id": "cultural-safety-26", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "structured", "difficulty": "detail", "q": "Describe the characteristics of culturally congruent care.", "tags": ["culturally-congruent-care", "list", "detail"], "points": ["Appreciates cultural diversity.", "Is aware of the individual patient's cultural values and beliefs.", "Is sensitive to differences between and within different cultures.", "Requires the nurse to have skilled cultural knowledge when interacting with patients from different cultures.", "The nurse is 'culturally humble' rather than making generalisations, and does not impose their value system on the patient.", "The nurse is open to a new way of seeing the world through the culture of their patient."]}, {"id": "cultural-safety-27", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "What does it mean for a nurse to be 'culturally humble'?", "tags": ["cultural-humility", "detail"], "a": "Rather than making generalisations about a culture, the culturally humble nurse does not impose their own value system on the patient and remains open to a new way of seeing the world through the patient's culture."}, {"id": "cultural-safety-28", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "What is cultural competence?", "tags": ["competence", "definition", "core"], "a": "A measure of our ability to provide care to patients with diverse values, beliefs and behaviours - tailored treatment that considers social, cultural and linguistic needs, truly understanding the patient's perspective and providing care that incorporates that perspective."}, {"id": "cultural-safety-29", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "What three needs does culturally competent, tailored treatment consider?", "tags": ["competence", "list", "detail"], "a": "1. Social needs, 2. Cultural needs, 3. Linguistic needs."}, {"id": "cultural-safety-30", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "structured", "difficulty": "detail", "q": "Explain why effective communication is needed in healthcare.", "tags": ["communication", "list", "detail"], "points": ["Greater involvement of clients in their healthcare.", "Higher levels of client satisfaction.", "Better health outcomes.", "Creates an environment of mutual respect.", "Greater engagement with teaching and treatment.", "Establishes feelings of trust in treatment."]}, {"id": "cultural-safety-31", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "What factors complicate communication within healthcare?", "tags": ["communication", "barriers", "detail"], "a": "There are cultural differences between health systems, healthcare professionals and patients. Language, national origin, gender and religion also complicate communication within healthcare."}, {"id": "cultural-safety-32", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "What is cultural stereotyping and why is it problematic in healthcare?", "tags": ["stereotyping", "stigmatisation", "core"], "a": "Stereotypes are convenient shortcuts to communication used when there is a perceived lack of time and energy to gain an accurate view of a patient's needs and problems. They cause us to view people in limited ways, can stigmatise people, and reduce their access to healthcare."}, {"id": "cultural-safety-33", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "How can nurses reduce stereotyping?", "tags": ["stereotyping", "self-awareness", "core"], "a": "By being aware of our own ideas, values and beliefs and how they influence our behaviour. There is more to people than the social roles and groups to which they belong."}, {"id": "cultural-safety-34", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "Contrast prejudice and discrimination.", "tags": ["prejudice", "discrimination", "contrast", "core"], "a": "Prejudice is a negative judgement or opinion formed about a group. Discrimination is treating people less favourably because of the cultural/ethnic group they belong to. Discrimination is prejudice in action.", "panic": true}, {"id": "cultural-safety-35", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "What does the lecture say about who holds prejudice?", "tags": ["prejudice", "detail"], "a": "Many of us truly believe we are not prejudiced, but research suggests we all hold some form of prejudice."}, {"id": "cultural-safety-36", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "What is ethnocentrism?", "tags": ["ethnocentrism", "definition", "core"], "a": "Favouring the groups we belong to and tending to think of them as superior. It is related to limited interaction with other cultures and the perception that our own world view (our values and beliefs) are the only acceptable ones.", "panic": true}, {"id": "cultural-safety-37", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "Contrast ethnocentrism and egocentrism.", "tags": ["ethnocentrism", "egocentrism", "contrast", "detail"], "a": "Ethnocentrism is favouring the groups we belong to and thinking of them as superior. Egocentrism is the belief that we (as an individual) are superior to others."}, {"id": "cultural-safety-38", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "What is cultural imposition?", "tags": ["cultural-imposition", "power", "core"], "a": "The tendency for powerful/dominant groups to impose their beliefs, practices, language and values on others. Healthcare professionals are one such dominant group."}, {"id": "cultural-safety-39", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "What is cultural assimilation?", "tags": ["assimilation", "definition", "core"], "a": "When minority groups living within the dominant group lose the cultural characteristics that shape their identity. Patients are expected to reject their own ways (e.g. language) to fit into the host culture, while the dominant group's ways remain unchanged."}, {"id": "cultural-safety-40", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "Contrast multiculturalism and assimilation.", "tags": ["multiculturalism", "assimilation", "contrast", "core"], "a": "Multiculturalism is the view that cultural diversity within a society is positive and desirable. Assimilation is when the dominant culture expects the subordinate culture to take on the dominant culture and abandon their own."}, {"id": "cultural-safety-41", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "structured", "difficulty": "detail", "q": "Identify six forms of systemic discrimination ('isms') from the lecture and briefly describe each.", "tags": ["isms", "list", "detail"], "points": ["Ableism - systemic discrimination against alter-abled or 'disabled' people.", "Ageism - systemic discrimination against persons of an older age group (adultism is the equivalent against young people and children).", "Sexism - systemic prejudice, stereotyping or discrimination against women on the basis of gender.", "Racism - systemic discrimination or prejudice based on race, based on the idea that whiteness is superior.", "Classism - systemic prejudice and discrimination based on social or economic class.", "Heterosexism - systemic prejudiced attitudes or discriminatory practices against homosexuals and Queer-identified people."]}, {"id": "cultural-safety-42", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "In the ISMS list, what is ableism?", "tags": ["isms", "ableism", "detail"], "a": "Systemic and systematic discrimination against alter-abled or 'disabled' people."}, {"id": "cultural-safety-43", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "In the ISMS list, what are ageism and adultism?", "tags": ["isms", "ageism", "adultism", "detail"], "a": "Ageism is systemic and systematic discrimination against persons of an older age group. Adultism is systemic prejudice and discrimination against young people and children."}, {"id": "cultural-safety-44", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "In the ISMS list, what is classism?", "tags": ["isms", "classism", "detail"], "a": "Systemic and systematic prejudice and discrimination based on social or economic class."}, {"id": "cultural-safety-45", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "In the ISMS list, what are cisgenderism/transphobia and heterosexism?", "tags": ["isms", "transphobia", "heterosexism", "detail"], "a": "Cisgenderism/transphobia is systemic and systematic discrimination against transgender people. Heterosexism is systemic prejudiced attitudes or discriminatory practices against homosexuals and Queer-identified people."}, {"id": "cultural-safety-46", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "In the ISMS list, how are colorism/shadeism and racism distinguished?", "tags": ["isms", "colorism", "racism", "contrast", "detail"], "a": "Racism is systemic discrimination based on race - the idea that whiteness is superior and therefore has the right to dominate another race or races. Colorism/shadeism is systemic prejudice or discrimination where people are treated differently based on the social meanings attached to favouring lighter skin colour - distinct from racism, but derived from white supremacy."}, {"id": "cultural-safety-47", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "What is racism (as defined on the dedicated 'What is racism?' slide)?", "tags": ["racism", "definition", "core"], "a": "Prejudice, antagonism and discrimination of people of a different race, based on the belief that one's own race is superior."}, {"id": "cultural-safety-48", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "What is colonialism, and what attitudes did colonisers hold?", "tags": ["colonialism", "definition", "core"], "a": "Colonialism is the political, social, economic and cultural domination of a territory and its people for an extended period of time. Historically, colonisers held extremely ethnocentric attitudes of racial supremacy."}, {"id": "cultural-safety-49", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "structured", "difficulty": "detail", "q": "Identify areas in which racial and ethnic inequalities can be seen.", "tags": ["inequalities", "list", "detail"], "points": ["Educational attainment.", "Income and wealth.", "Residence and residential segregation.", "Political representation.", "The criminal justice system.", "Health and wellness."]}, {"id": "cultural-safety-50", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "structured", "difficulty": "detail", "q": "According to the 1992 Cultural Safety Guidelines, what must nurses understand about colonisation and the barriers to Maori health?", "tags": ["guidelines", "colonisation", "barriers", "detail"], "points": ["Nurses must understand the process of colonisation and its impact on Maori health.", "That impact includes social, cultural and economic poverty.", "Recognition must be given to the barriers that exist for Maori in accessing health services.", "One barrier is a monocultural healthcare system.", "Another barrier is negative attitudes.", "Poverty is a barrier, including lack of transport to get to health services."]}, {"id": "cultural-safety-51", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "structured", "difficulty": "detail", "q": "Describe the impact of culture and language on healthcare access and delivery in multicultural New Zealand.", "tags": ["impact-of-culture", "language", "list", "detail"], "points": ["New Zealand is multicultural, multi-ethnic and multiracial, and patients have different views on healthcare based on their culture.", "Culture influences a person's beliefs about illness.", "Language shapes knowledge about finding healthcare, making appointments, communicating personal details, filling out forms and sharing medical history.", "Communicating with health professionals may be seen as difficult, and the burden of good communication skills is usually placed on the newcomer.", "Health professionals have a role to minimise misunderstanding caused by language differences."]}, {"id": "cultural-safety-52", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "What is inclusive language?", "tags": ["inclusive-language", "definition", "detail"], "a": "Language that is free from obscenity; not sexist, racist or biased; that avoids stereotyping; and avoids being discriminatory or offensive. It avoids sarcasm, blasphemy, obscenity and derogatory language."}, {"id": "cultural-safety-53", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "structured", "difficulty": "core", "q": "Discuss the nurse's responsibilities in relation to cultural safety, prejudice and racism.", "tags": ["nursing-responsibility", "list", "core"], "points": ["Recognise that we have all been socialised to believe myths and misconceptions, and none of us remain untouched by discriminatory messages in society.", "Be honest with yourself about your own prejudices and biases, and practise not getting defensive when discriminatory attitudes are pointed out.", "Use language and behaviour that is non-biased and inclusive of all people regardless of race, ethnicity, sex, disability, sexual orientation, class, age or religion.", "When you hear a racial statement, state how you feel and firmly address the hurtful attitude while supporting the dignity of the person who said it, and provide accurate information to challenge stereotypes.", "Take responsibility for educating yourself about your own and others' cultures, and do not expect people from different backgrounds to always educate you or explain racism/sexism to you.", "Be non-judgmental but know the bottom line: issues of human dignity, justice and safety are non-negotiable."]}, {"id": "cultural-safety-54", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "core", "q": "In relation to cultural safety, what is stated to be 'non-negotiable'?", "tags": ["nursing-responsibility", "non-negotiable", "core"], "a": "Issues of human dignity, justice and safety are non-negotiable."}, {"id": "cultural-safety-55", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "recall", "difficulty": "detail", "q": "According to the lecture, what should nurses NOT expect of people from different backgrounds?", "tags": ["nursing-responsibility", "detail"], "a": "Nurses should not expect people from different backgrounds to always educate them about their culture, history, or to explain racism or sexism to them; nurses must take responsibility for educating themselves."}, {"id": "cultural-safety-56", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "structured", "difficulty": "detail", "q": "A Muslim woman scheduled for a procedure requests a female nurse and time for prayer, but the nurse dismisses the request citing staffing shortages. Explain the cultural safety issues and a safer approach.", "tags": ["scenario", "religion", "gender", "detail"], "points": ["This is a cultural safety breach - dismissing the request diminishes and disempowers the patient's cultural and religious identity.", "Religious beliefs and gender preferences directly impact the patient's comfort, dignity and willingness to engage in care.", "Whether care is culturally safe is determined by the recipient, so the patient's needs must be accommodated where possible, not overridden by staffing convenience.", "Dismissing cultural/religious needs can reduce trust, satisfaction and engagement, and may worsen health outcomes.", "A culturally safe approach accommodates the request for a female nurse and time for prayer, and engages the patient in partnership."]}, {"id": "cultural-safety-57", "topicSlug": "cultural-safety", "topic": "Cultural Safety", "type": "structured", "difficulty": "detail", "q": "A Maori teenager with diabetes is labelled 'non-compliant' after missing appointments, and the nurse does not explore the underlying reasons. Discuss the cultural safety concerns and a safer approach.", "tags": ["scenario", "ethnicity", "stereotyping", "detail"], "points": ["Labelling the patient 'non-compliant' is stereotyping/stigmatisation that can reduce their access to and engagement with healthcare.", "It reflects the nurse's bias rather than an accurate view of the patient's needs, and fails to examine underlying reasons such as barriers to access.", "Race, ethnicity and education intersect, and colonisation and a monocultural system create barriers for Maori accessing services.", "A culturally safe nurse reflects on their own biases and attitudes rather than blaming the patient.", "A safer approach explores the reasons for missed appointments and engages in partnership with the young person and whanau."]}, {"id": "hauora-maori-01", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "What does 'hauora' mean and what does the topic 'Hauora Māori' refer to?", "tags": ["concepts", "definitions"], "a": "Hauora means health and wellbeing. Hauora Māori refers to Māori health and wellbeing, viewed through a Māori worldview that includes physical, mental, spiritual and whānau dimensions rather than a purely physical/Western definition of health.", "panic": true}, {"id": "hauora-maori-02", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "When and by whom was Te Tiriti o Waitangi first signed?", "tags": ["te-tiriti", "history", "dates"], "a": "It was signed on 6 February 1840. Captain William Hobson, representing Queen Victoria, signed the Māori version, and eventually more than 500 rangatira (chiefs) also signed.", "panic": true}, {"id": "hauora-maori-03", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "Between whom is Te Tiriti o Waitangi an agreement?", "tags": ["te-tiriti", "history"], "a": "It is an agreement between the British Crown (Queen Victoria), represented by William Hobson, and the iwi (tribes) and hapū (sub-tribes) of Aotearoa, represented by rangatira (chiefs)."}, {"id": "hauora-maori-04", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "What is a treaty?", "tags": ["te-tiriti", "definitions"], "a": "A treaty is a legally binding agreement or contract in writing between two or more political authorities (states or sovereigns), formally signed by duly authorised representatives and usually ratified by the law-making authority of the state."}, {"id": "hauora-maori-05", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "What was He Whakaputanga o te Rangatiratanga o Nu Tireni (the Declaration of Independence) and when was it signed?", "tags": ["history", "dates", "te-tiriti"], "a": "Signed on 28 October 1835, it was the Declaration of Independence of the United Tribes of New Zealand. James Busby convinced 34 rangatira to sign it; it recognised the sovereignty of the independent tribes of New Zealand and was formally recognised by Britain in 1836."}, {"id": "hauora-maori-06", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "What key clause did He Whakaputanga (the 1835 Declaration of Independence) contain about legislative authority?", "tags": ["history", "te-tiriti", "dates"], "a": "It made clear that 'no separate legislative authority' would be allowed in the country unless the rangatira appointed it so 'in congress assembled'. It was drafted amid Busby's concerns about other nations (particularly the French) taking sovereignty, and Britain formally recognised New Zealand's sovereign independence in 1836."}, {"id": "hauora-maori-07", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "Who was James Busby and what role did he play before Te Tiriti?", "tags": ["history", "te-tiriti"], "a": "James Busby was appointed British Resident in 1833 and set up residence at Waitangi. Māori saw him as a partner to help formalise international relations; he assisted rangatira to select a national flag (so Māori ships could access Australian ports and be protected from piracy) and helped organise the 1835 Declaration of Independence. He had no real power — a civilian who could not arrest anyone, and his requests to Britain for troops or warships were turned down."}, {"id": "hauora-maori-08", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "Why did the British want a treaty with Māori?", "tags": ["history", "te-tiriti"], "a": "To control lawless settlers and enable Britain to govern its own subjects; to formalise international relations; to enable peaceful (negotiated) acquisition of land; and in response to speculative land purchases, New Zealand Company intentions, and fears of other nations (e.g. the French) claiming sovereignty. Lord Normanby sent Captain William Hobson to acquire sovereignty by negotiating a treaty."}, {"id": "hauora-maori-09", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "structured", "difficulty": "core", "q": "Describe what Te Tiriti o Waitangi recognised, guaranteed and enabled when signed in 1840. (5 marks)", "tags": ["te-tiriti", "history"], "points": ["It was signed on 6 February 1840 by Captain William Hobson (for Queen Victoria) and eventually more than 500 rangatira.", "It recognised the rights of tangata whenua (people of the land) as set out in the earlier Declaration of Independence.", "It allowed the Crown governorship (kawanatanga) to control settler behaviour and govern Pakeha living without British law.", "It guaranteed Māori continuing authority and tino rangatiratanga over their lands, villages and everything they treasured, including language and cultural customs.", "It enabled the peaceful acquisition of land for settlement purposes.", "It accorded Māori similar rights to those of British people."], "panic": true}, {"id": "hauora-maori-10", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "What does 'kawanatanga' mean in the context of Te Tiriti?", "tags": ["te-tiriti", "definitions", "key-terms"], "a": "Kawanatanga means governorship/governance. Under Te Tiriti it referred to the Crown being allowed governorship to control settler behaviour and to govern Pakeha who were living without British law.", "panic": true}, {"id": "hauora-maori-11", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "What does 'tino rangatiratanga' mean and what did Te Tiriti guarantee about it?", "tags": ["te-tiriti", "definitions", "key-terms"], "a": "Tino rangatiratanga means self-determination / full chieftainship and authority. Te Tiriti guaranteed Māori continuing authority and tino rangatiratanga over their lands, villages and everything they treasured, including their language and cultural customs.", "panic": true}, {"id": "hauora-maori-12", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "According to the source, why were the differences in translation of Te Tiriti significant?", "tags": ["te-tiriti", "history", "dates"], "a": "The translator Henry Williams knew that if he had used the words 'rangatiratanga' or 'mana' in Article 1 the chiefs would not have signed it. The chiefs specifically confirmed rangatiratanga in Article 2. This mismatch (Māori words carrying greater meaning than English) is where the Treaty had problems. Hobson made a proclamation of sovereignty over the North Island on 21 May 1840."}, {"id": "hauora-maori-13", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "structured", "difficulty": "detail", "q": "Identify five pieces of legislation or events (with dates) that breached Te Tiriti o Waitangi. (5 marks)", "tags": ["te-tiriti", "history", "breaches", "dates"], "points": ["1846: Native Land Purchase Act (and the 1846 New Zealand Government Act).", "1852: New Zealand Constitution Act.", "1867: Native Schools Act.", "1877: the Treaty was declared a 'simple nullity'.", "1907: Tohunga Suppression Act.", "1909: Native Health Act (and the 2004 Seabed and Foreshore Act)."]}, {"id": "hauora-maori-14", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "What happened to the Treaty in 1877?", "tags": ["te-tiriti", "history", "breaches", "dates"], "a": "In 1877 the Treaty was considered a 'simple nullity' by the courts, effectively declaring it legally void at that time."}, {"id": "hauora-maori-15", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "What did the 1907 Tohunga Suppression Act do?", "tags": ["te-tiriti", "history", "breaches", "dates"], "a": "The 1907 Tohunga Suppression Act suppressed the practice of tohunga (traditional Māori healers/experts). It was a breach of Te Tiriti that undermined traditional Māori healing and knowledge."}, {"id": "hauora-maori-16", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "structured", "difficulty": "core", "q": "Identify the main things Māori lost as an effect of Te Tiriti and its breaches. (5 marks)", "tags": ["te-tiriti", "effects", "colonisation"], "points": ["Their land (through confiscation and speculative purchase).", "Their sovereignty / tino rangatiratanga (authority over their own affairs).", "Their language and culture (loss of Te Reo Māori, and of traditional beliefs, values and philosophy).", "Their lives and the lives of their elders, women and children.", "Traditional social structures broke down, causing loss of identity.", "Assimilation policies (including urbanisation) caused social isolation and dislocation from whānau, hapū and iwi support."]}, {"id": "hauora-maori-17", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "According to the source, what would recognition of tino rangatiratanga in policy include?", "tags": ["te-tiriti", "tino-rangatiratanga"], "a": "The ability to exercise authority over one's own affairs, including: preservation of a resource base (land and natural resources for food, recreation and rongoā); active protection of taonga (material and cultural); and self-management, including running one's own health programmes."}, {"id": "hauora-maori-18", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "Define colonisation.", "tags": ["colonisation", "definitions"], "a": "Colonisation is the action or process of settling among and establishing control over the indigenous people of an area — a process by which a central system of power dominates the surrounding land and its components, and whereby power and resources are obtained from the indigenous inhabitants and redistributed to the newcomers.", "panic": true}, {"id": "hauora-maori-19", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "How does colonisation link to current Māori health inequities?", "tags": ["colonisation", "determinants", "inequities"], "a": "Although historic, the early processes of colonisation determined the current political, social, economic and health inequalities that Māori experience today. The Treaty being breached is why Māori continue to suffer poorer health, die younger, and have lower employment and educational achievement, with disproportionate numbers in jail, homeless or in poverty."}, {"id": "hauora-maori-20", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "structured", "difficulty": "core", "q": "Identify and describe the tools of colonisation used against Māori. (5 marks)", "tags": ["colonisation", "tools-of-colonisation"], "points": ["Media — shaped cultural perceptions of Māori and used propaganda to entice settlers, showing negative rather than positive aspects of the culture.", "Government — was allowed to create laws to push the colonial agenda and justify breaches of Te Tiriti.", "Education — enforced assimilation, shaped the narrative of history and worldview, and punished the speaking of Te Reo Māori.", "Alcohol — contributed to domestic violence, crime and other forms of abuse.", "Religion — offered an alternative to Māori cultural beliefs (e.g. shifting utu/revenge to the missionary message of forgiveness).", "Land — confiscation of land and, with it, identity."], "panic": true}, {"id": "hauora-maori-21", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "detail", "q": "What was the purpose of the tools of colonisation?", "tags": ["colonisation", "tools-of-colonisation"], "a": "The tools (media, government, education, alcohol, religion, land) were used to execute the agenda of assimilation and colonisation. They created a clearer path to full control and were used to justify breaches of Te Tiriti o Waitangi."}, {"id": "hauora-maori-22", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "What does 'whānau' mean and how does it differ from the Western understanding of family?", "tags": ["key-terms", "definitions", "whanau-hapu-iwi"], "a": "Whānau means family — including extended family and people you have accepted, traditionally those who lived with you (and even visitors). Unlike the Western worldview, where family is primarily by blood relation or marriage, whānau is more like those who live in or close to your household. Colonisation narrowed its definition to only the immediate family."}, {"id": "hauora-maori-23", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "What does 'hapū' mean?", "tags": ["key-terms", "definitions", "whanau-hapu-iwi"], "a": "Hapū means sub-tribe — your extended whānau, similar to those who live in the same community/town/city. They were the people who would come to your aid in war, and they extended the boundary of your land with similar interests."}, {"id": "hauora-maori-24", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "What does 'iwi' mean?", "tags": ["key-terms", "definitions", "whanau-hapu-iwi"], "a": "Iwi means tribe — determined by which waka (canoe) you were aligned with. In Māori history, ancestors migrated on one of 7 waka around Aotearoa. The greater your iwi, the more revered you were."}, {"id": "hauora-maori-25", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "structured", "difficulty": "detail", "q": "Explain how colonisation affected the Māori concepts of whānau, hapū and iwi. (5 marks)", "tags": ["colonisation", "whanau-hapu-iwi", "effects"], "points": ["The definition of whānau was narrowed to mean only your immediate family rather than extended kin and community.", "Communal living, living off the land, and the village being responsible for children were replaced by a Western understanding based on purchase and commerce.", "Māori tikanga of sharing and trading was displaced by Western ideas of individual ownership and commerce.", "Land determined status, so when it was confiscated Māori were forced to adopt something unfamiliar.", "The loss of land, resources and identity dislocated people from their whānau, hapū and iwi support structures."]}, {"id": "hauora-maori-26", "topicSlug": "hauora-maori", "topic": "Hauora Māori", "type": "recall", "difficulty": "core", "q": "Why was land (whenua) so important within a Māori worldview?", "tags": ["maori-worldview", "whenua", "colonisation"], "a": "Land was considered part of Māori identity, with a s
