efs that shelter the family for life; culture is dynamic and sits on a continuum from traditional to more Westernised, and may include traditional healing.", "The four pou (posts) are Spiritual, Physical, Mental, and Other, connecting culture and family and constantly interlinked with each other.", "The 'Other' pou covers aspects that impact wellbeing such as gender, sexuality/sexual orientation, age, and socio-economic status.", "The capsule contains three external variables: Environment, Time, and Context, which may impact wellbeing and must be considered."], "panic": true}, {"id": "health-illness-29", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "In the Fonofale model, what do the three external variables of the capsule represent?", "tags": ["models", "fonofale", "pacific"], "a": "Environment (relationships to one's environment); Time (an actual or specific time in history that has impacted Pacific people); and Context (where/how/what and how this impacts specific people, including country of residence, legal, political and socioeconomic contexts)."}, {"id": "health-illness-30", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "Who introduced the Biopsychosocial model, when, and why?", "tags": ["models", "biopsychosocial", "Engel"], "a": "It was introduced by psychiatrist George Engel in the 1970s as a response to the limitations of the biomedical model. It is a holistic framework viewing health and illness as the result of the complex interplay between biological, psychological, and social factors.", "panic": true}, {"id": "health-illness-31", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "core", "q": "Describe the three core components of the Biopsychosocial model and the nurse's role in each.", "tags": ["models", "biopsychosocial", "nursing-role"], "points": ["Biological: genetics, physical health, neurochemistry, and medical conditions; nurse administers medications, monitors vitals, and manages chronic conditions.", "Psychological: emotions, thoughts, behaviours, coping mechanisms, and mental health; nurse provides emotional support, refers to counselling, and teaches coping strategies.", "Social: relationships, culture, socioeconomic status, environment, and access to care; nurse connects patients with community resources and advocates for access to care.", "Health is complex and impacted by more than just disease, requiring multidimensional treatment.", "The nurse's role is to coordinate care across all three domains so the patient's needs are met holistically."], "panic": true}, {"id": "health-illness-32", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "core", "q": "Describe the Social Model of health.", "tags": ["models", "social-model"], "points": ["It is interested in the environmental and social causes of ill health.", "It tends to be prevention focused.", "It recognises that health is more than just being free of disease.", "It acknowledges that many social influences impact on health.", "It recognises factors such as stress, lifestyle, housing, employment and education and how they impact on health."]}, {"id": "health-illness-33", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "core", "q": "Compare the Biomedical Model and the Social Model of health.", "tags": ["models", "biomedical", "social-model", "contrast"], "points": ["The biomedical model focuses on biological and physical causes of illness; the social model focuses on environmental and social causes of ill health.", "The biomedical model relies on objective data and views people as physiological systems; the social model recognises social influences such as stress, lifestyle, housing, employment and education.", "The biomedical model focuses on diagnosis, treatment and cure; the social model is prevention focused.", "The biomedical model largely excludes psychological, social and environmental factors; the social model recognises health is more than being free of disease.", "The biomedical model views people as physiological systems (cases/diagnoses); the social model recognises the many social influences that impact on health."], "panic": true}, {"id": "health-illness-34", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "Define illness.", "tags": ["illness", "definitions"], "a": "Illness is a highly personal state in which physical, emotional, intellectual, social, developmental or spiritual functioning is diminished, where the person feels unhealthy or ill. Illness is often associated with disease but can occur independently of it."}, {"id": "health-illness-35", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "Define disease, and what is the causation of a disease called?", "tags": ["disease", "definitions", "etiology"], "a": "Disease is an alteration in body functions resulting in a reduction of capacities or a shortening of the normal life span. The causation of a disease is called its etiology."}, {"id": "health-illness-36", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "core", "q": "Explain the difference between illness and disease.", "tags": ["illness", "disease", "contrast"], "points": ["Illness is a highly personal, subjective state where the person feels unhealthy and functioning is diminished.", "Illness affects physical, emotional, intellectual, social, developmental or spiritual functioning.", "Disease is an alteration in body functions resulting in reduced capacities or a shortened normal life span.", "Disease is objective, and its causation is called its etiology.", "Illness is often associated with disease but can occur independently of it (a person can feel ill without disease, or have disease without feeling ill)."], "panic": true}, {"id": "health-illness-37", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "Contrast acute and chronic illness/disease.", "tags": ["acute-chronic", "classification", "contrast"], "a": "Acute illness is typically characterised by severe symptoms of relatively short duration. Chronic illness lasts for an extended period, usually 6 months or longer, and often for a person's life.", "panic": true}, {"id": "health-illness-38", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "core", "q": "Identify and describe Suchman's (1965) five stages of illness.", "tags": ["illness", "Suchman", "stages"], "points": ["Stage 1 - symptom experiences (the person recognises something is wrong).", "Stage 2 - assumption of the sick role, with confirmation from family and friends.", "Stage 3 - medical care contact.", "Stage 4 - dependent client role.", "Stage 5 - recovery or rehabilitation."], "panic": true}, {"id": "health-illness-39", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "detail", "q": "Identify the effects of illness on the client (patient).", "tags": ["illness", "impact"], "points": ["Behavioural and emotional changes.", "Loss of autonomy.", "Self-concept and body image changes.", "Lifestyle changes."]}, {"id": "health-illness-40", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "detail", "q": "Identify the ways illness can impact the family.", "tags": ["illness", "impact", "family"], "points": ["Role changes and task reassignments.", "Increased demands on time.", "Anxiety about outcomes.", "Conflict about unaccustomed responsibilities.", "Financial problems.", "Loneliness from separation and pending loss, and change in social customs."]}, {"id": "health-illness-41", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "On what factors does the impact of illness on the family depend?", "tags": ["illness", "impact", "family"], "a": "It depends on which member of the family is ill, the seriousness and length of the illness, and the cultural and social customs the family follows."}, {"id": "health-illness-42", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "Define the Social Determinants of Health.", "tags": ["determinants", "definitions", "SDOH"], "a": "The conditions in which people are born, grow, live, work, and age. These factors significantly influence health outcomes and contribute to health inequities across populations (referenced to the NZ Health Strategy 2000).", "panic": true}, {"id": "health-illness-43", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "core", "q": "Identify and briefly explain six key social determinants of health.", "tags": ["determinants", "SDOH"], "points": ["Income and social status: higher income leads to better access to healthcare, housing, and nutritious food.", "Employment and working conditions: safe, stable jobs support health, while unemployment causes stress and poor health.", "Education and literacy: education improves health literacy, job opportunities, and ability to navigate healthcare.", "Childhood experiences: early trauma or poverty can affect long-term health and development.", "Physical environment: clean water, safe housing and pollution-free surroundings are essential for good health.", "Race/racism and discrimination: systemic inequities and bias lead to poorer outcomes for marginalised groups."]}, {"id": "health-illness-44", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "detail", "q": "Identify additional social determinants of health beyond income, employment, education and environment.", "tags": ["determinants", "SDOH"], "points": ["Social support networks: strong relationships and community connections promote resilience and wellbeing.", "Healthy behaviours: access to resources influences diet, exercise, substance use and other lifestyle choices.", "Access to health services: availability and affordability of care directly impact health outcomes.", "Biology and genetic endowment: genetic predispositions interact with social conditions to shape health risks.", "Gender: gender roles and norms can influence access to care and health experiences.", "Culture: cultural beliefs affect health practices, treatment decisions and trust in healthcare providers."]}, {"id": "health-illness-45", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "core", "q": "Identify and describe the five key domains that shape health outcomes (SDOH framework).", "tags": ["determinants", "SDOH", "domains"], "points": ["Economic Stability: financial security is a cornerstone of health; stable employment and income allow people to afford food, housing and care.", "Education Access and Quality: quality education equips people with knowledge, skills, better employment and health literacy; disparities perpetuate poverty cycles.", "Health Care Access and Quality: timely access to quality services is vital; barriers like lack of insurance, transport or provider shortages lead to untreated conditions.", "Neighbourhood and Built Environment: safe housing, clean air, parks and healthy food promote wellbeing, whereas pollution, crime and food deserts cause chronic problems.", "Social and Community Context: strong social networks provide support and belonging, while isolation and discrimination cause stress and adverse outcomes."], "panic": true}, {"id": "health-illness-46", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "What are the three health outcomes that social determinants of health influence?", "tags": ["determinants", "SDOH"], "a": "Access to health care, the quality of that care, and the ability to maintain good health."}, {"id": "health-illness-47", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "core", "q": "Identify the five action areas of the Ottawa Charter (WHO, 1986) for tackling the broader determinants of health.", "tags": ["determinants", "Ottawa-Charter", "health-promotion", "WHO"], "points": ["Build healthy public policy.", "Create supportive environments for health.", "Strengthen community action for health.", "Develop personal skills.", "Reorient health services."], "panic": true}, {"id": "health-illness-48", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "detail", "q": "Identify what a person needs to be healthy (feedback list of health requirements).", "tags": ["determinants", "requirements-for-health"], "points": ["Warm, dry, clean housing and clean air and clean water.", "Good nutritious food and an adequate income.", "Social and family connections.", "Access to information/health literacy and access to health services.", "An education/literacy and good working conditions.", "Peace and a sense of control over life's circumstances."]}, {"id": "health-illness-49", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "detail", "q": "Identify external and internal factors that influence health.", "tags": ["determinants", "factors", "internal-external"], "points": ["External - Environment (physical surroundings).", "External - Standards of living, reflecting occupation, income and education.", "External - Family and cultural beliefs, and social support networks (family, friends, confidant) and job satisfaction.", "Internal - Biologic dimension: genetic makeup, sex, age, and developmental level.", "Internal - Psychological dimension: emotional factors, mind-body interactions and self-concept.", "Internal - Cognitive dimension: lifestyle choices and spiritual and religious beliefs."]}, {"id": "health-illness-50", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "detail", "q": "Identify infrastructure that is important for promoting community health and wellness.", "tags": ["determinants", "community-health", "infrastructure"], "points": ["Sewage system and solid waste disposal.", "Services such as electricity and water, and a safe food supply.", "Pest control and animal management, and good air quality.", "Drainage, roads and footpaths, and a transport system.", "Appropriate housing, safe environments, and public facilities such as toilets.", "Recreation facilities and community involvement."]}, {"id": "health-illness-51", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "According to the summary of social determinants, why do poorer people have shorter lives even in rich countries, and what shapes the social environment?", "tags": ["determinants", "poverty", "summary"], "a": "Our health is very sensitive to our social environment, so even in rich countries poorer people experience shorter lives. The social determinants of health are factors in the social environment that influence health, and policy plays an important role in shaping that social environment."}, {"id": "health-illness-52", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "According to the summary, what determines health outcomes and whose action is required to address the social determinants of health?", "tags": ["determinants", "globalisation", "summary"], "a": "Where people live and their social situation determine their health outcomes, and political, social and economic forces shape a community's destiny. Action on the social determinants must involve the whole of government, civil society and local communities, business, global fora and international agencies."}, {"id": "health-illness-53", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "Name the three approaches to health maintenance identified in this teaching.", "tags": ["health-maintenance", "health-promotion"], "a": "Health promotion, health protection, and disease prevention."}, {"id": "health-illness-54", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "What are the six lesson outcomes / learning objectives for the Health and Illness topic?", "tags": ["learning-outcomes", "overview"], "a": "1) Define health, wellness and wellbeing (holistic model); 2) Understand the differences between illness and disease; 3) Develop an understanding of models of health and illness; 4) Understand the determinants of health; 5) Discuss health disparity and inequity, health maintenance, promotion, and the prevention of illness; 6) Understand the levels of prevention. The overall learning outcome (LO3) is to discuss the concepts of health and illness and explain the principles of primary health care in the Aotearoa New Zealand context."}, {"id": "nz-health-system-01", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "core", "q": "What type of model is the New Zealand healthcare system, and how is it primarily funded?", "tags": ["structure", "funding", "public-private"], "a": "It is a mixed public-private model designed to provide universal access to essential health services, funded primarily through taxation (public funding).", "panic": true}, {"id": "nz-health-system-02", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "core", "q": "What does it mean that New Zealand's health system provides 'universal access'?", "tags": ["structure", "universal-access", "equity"], "a": "Because the system is primarily publicly funded, most healthcare services are free or heavily subsidised for residents, so everyone can access essential health services regardless of ability to pay."}, {"id": "nz-health-system-03", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "structured", "difficulty": "core", "q": "List the essential health services to which New Zealand's publicly funded system provides universal access, and note a key feature of each.", "tags": ["structure", "services", "primary-care"], "points": ["GP (General Practitioner) visits: GPs are the first point of contact; visits are subsidised with only a small co-payment, making primary care affordable.", "Hospital services: public hospitals provide a wide range of services from emergency care to elective surgery, free of charge for residents, so critical care is available without financial strain.", "Specialist care: a GP referral is required to see a specialist; public hospital consultations are covered but wait times vary with urgency.", "Maternity care: comprehensive free care during pregnancy, childbirth and the postnatal period, with midwives playing a significant role."]}, {"id": "nz-health-system-04", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "core", "q": "In the NZ health system, who is the first point of contact for healthcare and how are their visits funded?", "tags": ["primary-care", "GP", "funding"], "a": "General Practitioners (GPs) are the first point of contact. Visits are subsidised so there may only be a small co-payment, making primary care affordable for all."}, {"id": "nz-health-system-05", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "How does a patient in NZ access specialist care, and how is it funded in the public system?", "tags": ["secondary-care", "specialist", "referral"], "a": "A referral from a GP is required to see a specialist; consultations in public hospitals are covered by the public system, though wait times vary based on urgency."}, {"id": "nz-health-system-06", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "What maternity services does the NZ public health system provide, and who plays a significant role in delivering them?", "tags": ["maternity", "midwives", "services"], "a": "Comprehensive maternity care is free, including care during pregnancy, childbirth and the postnatal period, with midwives playing a significant role."}, {"id": "nz-health-system-07", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "core", "q": "What is Te Whatu Ora / Health New Zealand and what did it do to the former regional boards?", "tags": ["structure", "te-whatu-ora", "health-nz"], "a": "Te Whatu Ora (Health New Zealand) is the centralised national health authority. It unifies the former regional boards to streamline service delivery nationally."}, {"id": "nz-health-system-08", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "core", "q": "What happened to the District Health Boards (DHBs) after the 2022 health reform?", "tags": ["structure", "2022-reform", "DHB"], "a": "After the 2022 reform all DHBs were disestablished, and Health NZ (Te Whatu Ora) became the single operational authority."}, {"id": "nz-health-system-09", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "core", "q": "Following the 2022 reform, what is Health NZ (Te Whatu Ora) responsible for?", "tags": ["structure", "health-nz", "roles"], "a": "As the single operational authority it is responsible for hospitals, primary care integration, and workforce planning nationwide."}, {"id": "nz-health-system-10", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "structured", "difficulty": "core", "q": "Describe how governance of the New Zealand health system changed after the 2022 reform.", "tags": ["structure", "2022-reform", "governance"], "points": ["All District Health Boards (DHBs) were disestablished.", "Health NZ (Te Whatu Ora) became the single national operational authority, unifying the former regional boards.", "Health NZ is responsible for hospitals, primary care integration, and workforce planning nationwide.", "The Ministry of Health retained a policy and regulatory (stewardship) role while Health NZ handles service delivery.", "This centralised governance streamlines service delivery nationally."], "panic": true}, {"id": "nz-health-system-11", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "core", "q": "After the 2022 reform, how is responsibility split between the Ministry of Health and Health NZ (Te Whatu Ora)?", "tags": ["structure", "ministry-of-health", "health-nz", "contrast"], "a": "The Ministry of Health retained a policy and regulatory role (stewardship), while Health NZ (Te Whatu Ora) handles operational service delivery.", "panic": true}, {"id": "nz-health-system-12", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "core", "q": "What is the name and year of the Act that reformed the NZ health system, and what does 'Pae Ora' mean?", "tags": ["legislation", "pae-ora", "2022"], "a": "The Pae Ora (Healthy Futures) Act 2022. 'Pae Ora' means healthy futures.", "panic": true}, {"id": "nz-health-system-13", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "structured", "difficulty": "core", "q": "State the purposes of the Pae Ora (Healthy Futures) Act 2022.", "tags": ["legislation", "pae-ora", "equity", "purpose"], "points": ["To protect, promote and improve the health of all New Zealanders.", "To achieve equity by reducing health disparities among New Zealand's population groups, in particular for Maori.", "To build towards pae ora (healthy futures) for all New Zealanders.", "To establish a set of health system principles that give common expectations across the health system."], "panic": true}, {"id": "nz-health-system-14", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "structured", "difficulty": "core", "q": "State the health system principles established by the Pae Ora (Healthy Futures) Act 2022 (the principles require the health system to...).", "tags": ["legislation", "pae-ora", "principles", "equity"], "points": ["Be equitable.", "Engage with Maori, population groups and others to reflect their needs and aspirations.", "Provide opportunities for Maori to exercise decision-making authority.", "Provide choice of quality services to Maori and other population groups.", "Protect and promote people's health and wellbeing."]}, {"id": "nz-health-system-15", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "According to the source, how does the Pae Ora (Healthy Futures) Act relate to Te Tiriti o Waitangi?", "tags": ["legislation", "pae-ora", "te-tiriti", "equity"], "a": "The Pae Ora Act embeds Te Tiriti o Waitangi principles, ensuring Maori health equity is a legal requirement, and supports equity and partnership with Maori across all health settings."}, {"id": "nz-health-system-16", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "core", "q": "What is Te Aka Whai Ora, why was it established, and what happened to it?", "tags": ["structure", "te-aka-whai-ora", "maori-health", "equity"], "a": "Te Aka Whai Ora was the Maori Health Authority, established to ensure equity for Maori health outcomes. It was disestablished by the government in 2024.", "panic": true}, {"id": "nz-health-system-17", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "After Te Aka Whai Ora (the Maori Health Authority) was disestablished in 2024, how are Maori health interests still protected?", "tags": ["structure", "maori-health", "equity"], "a": "Even though the Maori Health Authority no longer exists, several mechanisms remain in place to ensure Maori perspectives and equity obligations continue to be embedded in the health system (for example the Pae Ora Act's equity purpose and health system principles)."}, {"id": "nz-health-system-18", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "core", "q": "What is the role of the Ministry of Health in the NZ health system?", "tags": ["structure", "ministry-of-health", "roles", "policy"], "a": "The Ministry of Health leads policy, regulation and stewardship across the health system, and oversees fund distribution aligned with national health strategies and priorities."}, {"id": "nz-health-system-19", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "core", "q": "What is Pharmac and what does it do?", "tags": ["structure", "pharmac", "pharmaceuticals"], "a": "Pharmac manages drug schedules and negotiates prices for affordable access to pharmaceuticals in New Zealand."}, {"id": "nz-health-system-20", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "core", "q": "What is the Accident Compensation Corporation (ACC) and what does it do?", "tags": ["structure", "ACC", "injury"], "a": "ACC provides financial and ongoing support for people injured in accidents in New Zealand."}, {"id": "nz-health-system-21", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "core", "q": "Name the three bodies grouped under 'Policy and Regulation' in the source and give the role of each.", "tags": ["structure", "roles", "ministry-of-health", "pharmac", "ACC"], "a": "Ministry of Health: leads policy, regulation and stewardship across the health system. Pharmac: manages drug schedules and negotiates prices for affordable access to pharmaceuticals. Accident Compensation Corporation (ACC): provides financial and ongoing support for people injured in accidents in New Zealand.", "panic": true}, {"id": "nz-health-system-22", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "core", "q": "How is New Zealand's health funding provided and administered, and what is 'Vote Health'?", "tags": ["funding", "vote-health", "ministry-of-health"], "a": "Health funding is primarily public and funded through taxation. It is managed through Vote Health by the Ministry of Health, which oversees fund distribution aligned with national health strategies and priorities.", "panic": true}, {"id": "nz-health-system-23", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "According to the source, what is the goal of the NZ health system's funding decisions ('Equitable Access to Care')?", "tags": ["funding", "equity", "access"], "a": "Funding decisions promote fair (equitable) access to health services for all New Zealanders."}, {"id": "nz-health-system-24", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "How does centralised administration support the use of public health funds?", "tags": ["funding", "transparency", "accountability"], "a": "Centralised administration ensures transparency and accountability, so that public health funds are used properly."}, {"id": "nz-health-system-25", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "What did Budget 2025 allocate for hospital and primary care services, and for infrastructure?", "tags": ["funding", "budget-2025", "statistics"], "a": "Budget 2025 allocated NZ$5.5 billion for hospital and primary care services nationwide and over NZ$1 billion for infrastructure (hospital redevelopment and facility enhancements)."}, {"id": "nz-health-system-26", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "How much did Budget 2025 allocate specifically for urgent and after-hours care, and why?", "tags": ["funding", "budget-2025", "urgent-care", "statistics"], "a": "Budget 2025 allocated NZ$447 million for urgent and after-hours care, improving access to primary care and reducing ED pressure to improve patient flow."}, {"id": "nz-health-system-27", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "structured", "difficulty": "detail", "q": "Identify the areas of targeted service funding in the NZ health budget and explain the intended benefit of each.", "tags": ["funding", "targeted-funding", "services"], "points": ["Urgent care expansion: increases urgent and after-hours care to ease emergency department pressures and improve access.", "Support for aged care: enhances funding for residential and community-based services for the elderly population.", "Mental health services: expands community and specialist mental health services to meet increasing demand and improve outcomes.", "Cancer treatment funding: supports access to advanced therapies and faster diagnosis, improving survival rates."]}, {"id": "nz-health-system-28", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "How is infrastructure funding managed and released in the NZ health system?", "tags": ["funding", "infrastructure", "process"], "a": "Infrastructure funds require approved business cases and are managed through contingency allocations."}, {"id": "nz-health-system-29", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "structured", "difficulty": "detail", "q": "Describe the components of the NZ health policy framework as outlined in the source.", "tags": ["policy", "framework", "equity"], "points": ["Foundational Health Act: the Pae Ora Act supports equity and partnership with Maori across all health settings.", "Strategic health priorities: government priorities focus on healthcare access, wait-time reduction, and mental health support.", "Performance targets: the Health Delivery Plan sets targets such as emergency wait times and cancer treatment deadlines.", "Health equity focus: policies aim to improve quality and address systemic inequities across populations."]}, {"id": "nz-health-system-30", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "What is the Health Delivery Plan and what does it set?", "tags": ["policy", "health-delivery-plan", "targets"], "a": "The Health Delivery Plan sets performance targets for the health system, such as emergency wait times and cancer treatment deadlines."}, {"id": "nz-health-system-31", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "structured", "difficulty": "detail", "q": "Identify the 'spheres of influence' that shape the NZ health system and describe the role of each.", "tags": ["spheres-of-influence", "governance", "iwi"], "points": ["Government leadership: government ministers set strategic direction and allocate healthcare resources nationally.", "Sole commissioner role: a sole commissioner oversees operational and financial performance after board replacement.", "Community and iwi involvement: local communities and iwi engage in regional decision-making for tailored healthcare delivery.", "Professional advocacy: professional bodies and unions advocate for workforce conditions and influence policy decisions."]}, {"id": "nz-health-system-32", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "What is the 'sole commissioner' role in the current NZ health governance structure?", "tags": ["governance", "sole-commissioner", "spheres-of-influence"], "a": "A sole commissioner oversees the operational and financial performance of Health NZ after the board was replaced."}, {"id": "nz-health-system-33", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "Give the source's example of professional advocacy influencing the NZ health system.", "tags": ["spheres-of-influence", "advocacy", "workforce"], "a": "The Association of Salaried Medical Specialists (ASMS) lobbying for better staffing ratios shows how workforce advocacy influences government decisions on funding and service delivery priorities."}, {"id": "nz-health-system-34", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "In the systems-mapping model, how do funding, policy and influence interrelate?", "tags": ["systems-mapping", "policy", "funding", "influence"], "a": "They are interdependent: policy cannot operate without funding, and influence shapes both. For example, increased mental health funding drives new Health Delivery Plan targets (funding to policy), the Pae Ora Act empowers iwi to co-design services (policy to influence), and professional lobbying for pay equity can shift budget allocations (influence to funding)."}, {"id": "nz-health-system-35", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "In the source's mental health scenario, how might Maori communities influence service design, and what is the equity implication?", "tags": ["equity", "kaupapa-maori", "cultural-safety", "mental-health"], "a": "Maori communities may push for kaupapa Maori mental health services to ensure culturally appropriate and culturally safe care, with iwi and unions advocating for these services and workforce support."}, {"id": "nz-health-system-36", "topicSlug": "nz-health-system", "topic": "NZ Healthcare System & Primary Care", "type": "recall", "difficulty": "detail", "q": "According to the source's reflective learning, which component most influences health outcomes and why?", "tags": ["policy", "equity", "reflection"], "a": "Policy has the greatest influence because it sets the framework for equity and service delivery; without Pae Ora, funding alone would not guarantee Maori health improvements."}, {"id": "legal-ethical-01", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "core", "q": "List the six legal concepts related to nursing practice covered in this topic.", "tags": ["legal-concepts", "overview"], "points": ["Duty (duty of care)", "Confidentiality", "Informed consent", "Standards of care", "Drugs (safe and legal handling/administration of drugs)", "Negligence and malpractice"]}, {"id": "legal-ethical-02", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "Under section 151 of the Crimes Act 1961, what legal duty is owed to a vulnerable adult who cannot provide themselves with necessaries?", "tags": ["duty", "crimes-act", "section-151"], "a": "Anyone who has actual care or charge of a vulnerable adult who is unable to provide himself or herself with necessaries is under a legal duty (a) to provide that person with necessaries and (b) to take reasonable steps to protect that person from injury."}, {"id": "legal-ethical-03", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "Under Crimes Act 1961 s.151, when is a person held criminally responsible for omitting necessaries?", "tags": ["duty", "crimes-act", "section-151", "liability"], "a": "They are criminally responsible if the necessaries are omitted without lawful excuse and, as a result, death is caused, life is endangered, or health is permanently injured by the omission."}, {"id": "legal-ethical-04", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "What duty does section 155 of the Crimes Act 1961 impose, and why is it relevant to nurses and midwives?", "tags": ["duty", "crimes-act", "section-155"], "a": "Everyone who undertakes (except in case of necessity) to administer surgical or medical treatment, or to do any other lawful act that is or may be dangerous to life, is under a legal duty to have and use reasonable knowledge, skill and care, and is criminally responsible for the consequences of failing to discharge that duty. It is relevant because nurses and midwives must have and use reasonable knowledge, skill and care."}, {"id": "legal-ethical-05", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "core", "q": "Contrast the duties imposed on nurses by section 151 and section 155 of the Crimes Act 1961.", "tags": ["duty", "crimes-act", "contrast"], "points": ["Section 151 applies to anyone with actual care or charge of a vulnerable adult who cannot provide for themselves.", "Section 151 requires providing necessaries AND taking reasonable steps to protect the person from injury.", "Section 155 applies to anyone who undertakes to administer surgical/medical treatment or a lawful act dangerous to life.", "Section 155 requires having and using reasonable knowledge, skill and care in performing that act.", "Section 155 excludes cases of necessity (emergency), whereas s.151 does not.", "Under both sections the practitioner is criminally responsible for the consequences of failing (without lawful excuse) to discharge the duty."], "panic": true}, {"id": "legal-ethical-06", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "In the residential care dehydration scenario (understaffed facility, dependent resident not helped to drink, becomes severely dehydrated), which Crimes Act duty is most clearly breached?", "tags": ["duty", "crimes-act", "scenario", "section-151"], "a": "Section 151 - the duty to provide necessaries (fluids) and take reasonable steps to protect a vulnerable adult from injury; the omission caused severe dehydration requiring hospitalisation."}, {"id": "legal-ethical-07", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "How does legal duty of care connect to professional accountability for a nurse?", "tags": ["duty", "accountability"], "a": "Breaching a legal duty (e.g. under Crimes Act s.151/155) is also a breach of professional standards, so a nurse can face both criminal/legal liability and professional accountability through the Nursing Council for the same omission or error."}, {"id": "legal-ethical-08", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "Define confidentiality as a core nursing obligation.", "tags": ["confidentiality", "definition"], "a": "In nursing practice, personal information divulged by patients and their health information is not revealed to anyone not directly involved in their care; the nurse holds personal information in confidence and uses judgement in sharing it."}, {"id": "legal-ethical-09", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "Which two professional sources are quoted as the foundation of the nursing confidentiality obligation?", "tags": ["confidentiality", "codes"], "a": "The Florence Nightingale Pledge (1893) and the International (ICN) Code of Ethics for Nurses."}, {"id": "legal-ethical-10", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "core", "q": "Explain why confidentiality is a fundamental nursing obligation and what it protects.", "tags": ["confidentiality", "trust"], "points": ["Nurses must protect all personal, health, and whānau information.", "Information is shared only when it supports safe, appropriate care.", "Confidentiality is a professional, legal, and cultural obligation.", "Confidentiality builds and maintains trust in the nurse-client relationship.", "It safeguards the physical, emotional and social rights of clients.", "It is required by nursing codes of ethics (e.g. ICN, NZNO)."]}, {"id": "legal-ethical-11", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "A young adult's whānau asks the nurse for diagnosis and treatment details, but the patient wants the information kept private. What is the correct nursing response?", "tags": ["confidentiality", "scenario", "autonomy"], "a": "The nurse acknowledges the whānau's concern but explains she cannot share personal health information without the patient's consent, and offers to facilitate a conversation between the patient and whānau if the patient is ready - upholding confidentiality and individual autonomy while respecting whānau involvement."}, {"id": "legal-ethical-12", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "Why is casually discussing a patient's diagnosis with a colleague in a hospital corridor an ethical breach?", "tags": ["confidentiality", "scenario", "breach"], "a": "It can be overheard and identify the patient, violating the Nursing Code of Ethics and the trust in the nurse-client relationship, failing to safeguard the patient's emotional and social rights, and contradicting the discretion required by the Nightingale Pledge and ICN Code; it can lead to a formal complaint and disciplinary review."}, {"id": "legal-ethical-13", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "core", "q": "Under Right 6 of the Code of Rights, list the information a consumer is entitled to receive for informed consent.", "tags": ["informed-consent", "code-of-rights", "right-6"], "points": ["An explanation of his or her condition.", "An explanation of the options available, including expected risks, side effects, benefits and costs of each option.", "Advice of the estimated time within which the services will be provided.", "Notification of any proposed participation in teaching or research (including whether ethical approval was required and received).", "Any other information required by legal, professional, ethical and other relevant standards.", "The results of tests and the results of procedures."], "panic": true}, {"id": "legal-ethical-14", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "What is the overarching entitlement stated in Right 6 of the Code of Rights?", "tags": ["informed-consent", "code-of-rights", "right-6"], "a": "The right to the information that a reasonable consumer, in that consumer's circumstances, would expect to receive."}, {"id": "legal-ethical-15", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "What does Right 5 of the Code of Rights require regarding communication for informed consent?", "tags": ["informed-consent", "code-of-rights", "right-5", "interpreter"], "a": "Information must be conveyed to the patient in a form, language and manner the patient understands; where necessary and reasonably practicable this includes arranging a competent interpreter, and ensuring the environment allows open, honest and effective communication."}, {"id": "legal-ethical-16", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "What does Right 4(5) of the Code of Rights require, and why does it matter for informed consent?", "tags": ["informed-consent", "code-of-rights", "right-4-5", "continuity"], "a": "Right 4(5) gives patients the right to co-operation among providers to ensure quality and continuity of services; good communication between all parties is essential to the informed consent process."}, {"id": "legal-ethical-17", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "For a Samoan-speaking patient who nods politely but appears hesitant and confused during a consent discussion, what should the nurse do and which right applies?", "tags": ["informed-consent", "interpreter", "scenario", "right-5"], "a": "Recognise the language barrier and arrange a competent interpreter before proceeding with consent - applying Right 5 (information in a language and manner the patient understands) to ensure true understanding before consent."}, {"id": "legal-ethical-18", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "detail", "q": "List the key things a nurse should explain to a patient before a procedure (e.g. a colonoscopy) to obtain informed consent.", "tags": ["informed-consent", "scenario", "procedure"], "points": ["The purpose of the procedure.", "The risks (e.g. bleeding, perforation).", "Possible alternatives (e.g. CT colonography).", "What to expect during recovery.", "Who will be performing the procedure.", "The patient's right to decline or ask questions, checking understanding using plain language."]}, {"id": "legal-ethical-19", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "Informed consent is a process, not a form. What three conditions must valid consent meet according to this teaching?", "tags": ["informed-consent", "elements", "voluntary", "competence"], "a": "Consent must be given by a competent patient, be free and voluntary (not coerced), and be informed - based on information conveyed in a form/language the patient genuinely understands, with a competent interpreter where necessary.", "panic": true}, {"id": "legal-ethical-20", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "core", "q": "List the eight principles of the Nursing Council Code of Conduct.", "tags": ["code-of-conduct", "principles"], "points": ["Principle 1: Respect the dignity and individuality of health consumers.", "Principle 2: Respect the cultural needs and values of health consumers.", "Principle 3: Work in partnership with health consumers to promote and protect their well-being.", "Principle 4: Maintain health consumer trust by providing safe and competent care.", "Principle 5: Respect health consumers' privacy and confidentiality.", "Principle 6: Work respectfully with colleagues to best meet health consumers' needs.", "Principle 7: Act with integrity to justify health consumers' trust.", "Principle 8: Maintain public trust and confidence in the nursing profession."], "panic": true}, {"id": "legal-ethical-21", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "Give a student-nurse example of applying Code of Conduct Principle 7 (act with integrity).", "tags": ["code-of-conduct", "principle-7", "student"], "a": "Refraining from plagiarising in assignments or tests, which demonstrates the integrity needed to justify health consumers' trust."}, {"id": "legal-ethical-22", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "How can a student nurse apply Code of Conduct Principle 5 (privacy and confidentiality) in study life?", "tags": ["code-of-conduct", "principle-5", "student"], "a": "By not sharing test information with other students, respecting privacy and confidentiality just as they would protect a health consumer's information."}, {"id": "legal-ethical-23", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "Under which two statutory provisions may charges arise for illegal removal, possession, use or supply of drugs by a nurse?", "tags": ["drugs", "misuse-of-drugs-act", "crimes-act", "section-220"], "a": "Section 11(1) of the Misuse of Drugs Act 1975 and Section 220 of the Crimes Act 1961."}, {"id": "legal-ethical-24", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "What are 'controlled drugs' under the Misuse of Drugs Act 1975?", "tags": ["drugs", "controlled-drugs", "misuse-of-drugs-act"], "a": "Any substance, preparation, mixture or article specified in Schedules 1, 2 or 3 of the Misuse of Drugs Act 1975, classified into Classes A, B and C (and including controlled drug analogues).", "panic": true}, {"id": "legal-ethical-25", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "detail", "q": "Explain the classification of controlled drugs into Classes A, B and C, with examples.", "tags": ["drugs", "controlled-drugs", "classes"], "points": ["Classes A and B carry greater risk of addiction and serious harm.", "Class A/B examples include heroin, cocaine, methamphetamine, morphine, fentanyl, oxycodone and pethidine.", "Class C covers lower-risk drugs such as cannabis, codeine derivatives and other sedative-type drugs.", "The classification reflects the substance's addiction potential and risk to health.", "Controlled drug analogues are also included as controlled drugs."]}, {"id": "legal-ethical-26", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "detail", "q": "Describe the requirements for keeping controlled drug records under the Misuse of Drugs Regulations 1977.", "tags": ["drugs", "misuse-of-drugs-regulations", "documentation"], "points": ["Regulation 28 governs the custody of controlled drugs.", "Regulation 45 details how controlled drug registers, hospital records and ward books must be kept.", "Entries recording disposal are made immediately following administration of the controlled drug.", "Each ward book is the responsibility of the person in charge, with entries signed by both the person receiving and the person issuing the drug.", "Entries of receipts must correspond to entries of disposals in the main register and ward book.", "Once per week the ward book is checked against the balance on hand and an authorised person (e.g. Charge Nurse/Chief Pharmacist) signs to confirm the count is correct."]}, {"id": "legal-ethical-27", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "What is the purpose of the Health and Disability Commissioner Act 1994?", "tags": ["hdc-act", "consumer-rights"], "a": "To promote and protect the rights of health consumers and disability services consumers and, to that end, to facilitate the fair, simple, speedy and efficient resolution of complaints about infringements of those rights.", "panic": true}, {"id": "legal-ethical-28", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "What office does the Health and Disability Commissioner Act 1994 establish, and what does it do?", "tags": ["hdc-act", "code-of-rights", "commissioner"], "a": "It establishes the office of the Health & Disability Commissioner, which investigates breaches of the Code of Health and Disability Services Consumers' Rights (the Code of Rights)."}, {"id": "legal-ethical-29", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "Who is protected by the Code of Rights?", "tags": ["code-of-rights", "coverage"], "a": "Everyone using a health or disability service in New Zealand has the protection of the Code of Rights."}, {"id": "legal-ethical-30", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "What does the Care of Children Act 2004 say about consent to treatment and the age of consent?", "tags": ["care-of-children-act", "consent", "competence", "age"], "a": "There is no age of consent under the Code of Rights; under section 36 of the Care of Children Act 2004, young people over the age of 16 can consent to or refuse treatment, but a healthcare practitioner can overturn this right if there are reasonable grounds to believe the person is not competent."}, {"id": "legal-ethical-31", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "How is documentation defined in nursing (Crisp & Taylor, 2009)?", "tags": ["documentation", "definition"], "a": "Documentation is anything written or printed that is used to provide evidence that is legal and official."}, {"id": "legal-ethical-32", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "detail", "q": "Explain the purposes and importance of documentation in nursing practice.", "tags": ["documentation", "purpose"], "points": ["Communicates the client's health information.", "Allows for continuity of care.", "Demonstrates accountability.", "Facilitates quality assurance.", "Assists with research and funding.", "Provides legal and official evidence and is an essential, integral part of providing care."]}, {"id": "legal-ethical-33", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "detail", "q": "Describe the principles of good nursing documentation.", "tags": ["documentation", "guidelines"], "points": ["Accurate, brief and complete; legibly and objectively written.", "Write the facts - what you heard, saw or did, and chart only for yourself.", "Maintain confidentiality and conform to legal and employer guidelines.", "Correct errors by drawing a single line through them (do not obliterate), promptly.", "Be professional - avoid criticisms or defamatory statements about a client, whānau or colleagues.", "Begin each entry with date and time, use only approved abbreviations, and keep information complete, current and logically organised."]}, {"id": "legal-ethical-34", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "How should errors in nursing documentation be corrected?", "tags": ["documentation", "errors"], "a": "By drawing a single line through the incorrect entry (leaving it legible) and correcting it promptly - never obliterating or erasing it."}, {"id": "legal-ethical-35", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "What is a Problem-Oriented Medical Record (POMR) and how is it organised?", "tags": ["documentation", "pomr"], "a": "A POMR consists of a database, problem list, nursing care plan and progress notes; data is organised by problem or diagnosis, with multidisciplinary contributions to a single list of client problems. Problems are struck off with the date of resolution when resolved, and new ones added as needed."}, {"id": "legal-ethical-36", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "detail", "q": "State what each letter of the SOAPIE format for writing client notes stands for.", "tags": ["documentation", "soapie"], "points": ["S - Subjective data: what the client says.", "O - Objective data: what can be measured, e.g. vital signs.", "A - Assessment: diagnosis based on the data.", "P - Plan: what the nurse will do.", "I - Intervention: the action the nurse will take.", "E - Evaluation: the effectiveness of the action taken."]}, {"id": "legal-ethical-37", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "To whom is a nurse accountable and legally liable for their actions?", "tags": ["accountability", "liability", "nursing-council"], "a": "Every health professional is responsible, accountable and legally liable for their own actions - accountable to the client/public through the Nursing Council (which is accountable to government for professional standards), for the standards of their own practice, to other health professionals, and to their employer."}, {"id": "legal-ethical-38", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "What is the purpose of the Health Practitioners Competence Assurance Act (HPCAA) 2003?", "tags": ["hpcaa", "competence"], "a": "To protect the health and safety of members of the public by providing mechanisms to ensure that health practitioners are competent and fit to practise their professions.", "panic": true}, {"id": "legal-ethical-39", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "Under the HPCAA 2003, what is the Nursing Council's role and how is 'scope of practice' defined?", "tags": ["hpcaa", "nursing-council", "scope-of-practice"], "a": "The Nursing Council is the responsible authority for regulating the profession of nursing. Scope of practice (s11) refers to the areas of professional practice authorised by the Nursing Council under the HPCAA."}, {"id": "legal-ethical-40", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "How does the Nursing Council define 'competence'?", "tags": ["competence", "nursing-council", "definition"], "a": "As the combination of skills, values and abilities that underpin effective performance as a nurse."}, {"id": "legal-ethical-41", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "detail", "q": "Describe the Health Practitioners Disciplinary Tribunal and its composition.", "tags": ["disciplinary-tribunal", "accountability"], "points": ["It is an independent tribunal that hears charges of professional misconduct instead of the Nursing Council.", "The chairperson/deputy chairperson must be a lawyer.", "It is supported by a panel of (usually four) members.", "Three panel members are professional peers of the health practitioner under review.", "One panel member is a layperson."]}, {"id": "legal-ethical-42", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "How is ethics defined (Mosby)?", "tags": ["ethics", "definition"], "a": "The study of the code of moral principles derived from a system of values and beliefs and concerned with rights and obligations.", "panic": true}, {"id": "legal-ethical-43", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "core", "q": "Explain the three ethical theories introduced in this topic: deontological, teleological, and virtue ethics.", "tags": ["ethics", "theories", "deontology", "teleology", "virtue-ethics"], "points": ["Deontological ethics: duty is based on moral value; one is bound by duty and, acting out of duty, acts justly regardless of the outcome.", "Teleological ethics (utilitarianism): the collective good takes precedence over the individual - the greatest good for the greatest number ('the greater good').", "Virtue ethics: based on honesty and kindness and good moral character.", "Virtue ethics asks 'what sort of person one ought to be and what sort of life one ought to live' - the person before the action.", "Virtue ethics emphasises truthfulness and integrity."], "panic": true}, {"id": "legal-ethical-44", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "Contrast deontological and teleological (utilitarian) ethical theories.", "tags": ["ethics", "theories", "contrast", "deontology", "teleology"], "a": "Deontological ethics judges an act by duty and moral value - acting out of duty is just regardless of outcome. Teleological (utilitarian) ethics judges by outcomes - the collective good/greater good takes precedence over the individual.", "panic": true}, {"id": "legal-ethical-45", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "core", "q": "List the ethical principles set out in the NZNO ethical principles (NZNO, 2019).", "tags": ["ethics", "nzno", "principles"], "points": ["Autonomy (self-determination) and Beneficence (doing good).", "Non-Maleficence (doing no harm).", "Justice (privacy) and Confidentiality.", "Veracity (truthfulness).", "Fidelity (faithfulness).", "Guardianship of the environment and its resources, and being professional."], "panic": true}, {"id": "legal-ethical-46", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "Define the ethical principle of autonomy.", "tags": ["ethics", "autonomy", "definition"], "a": "Autonomy is self-determination - respecting the client's right to make their own informed decisions about their care.", "panic": true}, {"id": "legal-ethical-47", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "Define beneficence and non-maleficence, and contrast them.", "tags": ["ethics", "beneficence", "non-maleficence", "contrast"], "a": "Beneficence means doing good (acting in the client's best interests); non-maleficence means doing no harm (avoiding harm to the client). Beneficence is the positive duty to benefit; non-maleficence is the duty to avoid causing harm.", "panic": true}, {"id": "legal-ethical-48", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "Define the ethical principles of veracity and fidelity.", "tags": ["ethics", "veracity", "fidelity", "definition"], "a": "Veracity means truthfulness (being honest with the client); fidelity means faithfulness (keeping promises and being loyal and trustworthy to the client)."}, {"id": "legal-ethical-49", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "In the NZNO ethical principles, what is the principle of justice paired with, and what does justice mean?", "tags": ["ethics", "justice", "definition", "nzno"], "a": "In the NZNO list justice is paired with privacy (and listed alongside confidentiality); justice means fairness - treating clients equitably and ensuring fair distribution of care and resources."}, {"id": "legal-ethical-50", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "core", "q": "List the seven types of values that influence ethical decision-making.", "tags": ["values", "types"], "points": ["Professional values.", "Personal values.", "Moral values.", "Religious values.", "Spiritual values.", "Cultural values and political values."]}, {"id": "legal-ethical-51", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "What is an ethical dilemma?", "tags": ["ethics", "dilemma", "definition"], "a": "A situation in which a difficult choice has to be made between two different things you could do; a process is needed to manage the challenging professional/ethical issue."}, {"id": "legal-ethical-52", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "core", "q": "List the steps of the ethical decision-making framework for resolving an ethical dilemma.", "tags": ["ethics", "decision-making", "framework"], "points": ["Recognition of the dilemma.", "Gather relevant factual information.", "Clarify the personal context of the ethical dilemma.", "Identify and clarify the ethical concepts (principles) involved.", "Construct and evaluate arguments for each issue.", "Take action."], "panic": true}, {"id": "legal-ethical-53", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "In the ethical decision-making framework, what is the first step and what does it involve?", "tags": ["ethics", "decision-making", "recognition"], "a": "Recognition of the dilemma - identifying that an ethical problem exists and asking 'what is the right thing to do here?' before gathering facts."}, {"id": "legal-ethical-54", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "core", "q": "List the four elements of the ICN Code of Ethics.", "tags": ["icn", "code-of-ethics", "elements"], "points": ["Element 1: Nurses and People.", "Element 2: Nurses and Practice.", "Element 3: Nurses and the Profession.", "Element 4: Nurses and Co-workers."]}, {"id": "legal-ethical-55", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "detail", "q": "List the four fundamental responsibilities of nurses according to the International Council of Nurses (ICN).", "tags": ["icn", "responsibilities"], "points": ["To promote health (and wellbeing).", "To prevent illness.", "To restore health.", "To alleviate suffering."]}, {"id": "legal-ethical-56", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "Under 'Nurses and People' in the ICN Code, what are the nurse's key duties?", "tags": ["icn", "nurses-and-people"], "a": "The nurse's primary responsibility is to people requiring nursing care; the nurse promotes an environment respecting human rights, values, customs and spiritual beliefs, ensures the individual receives sufficient information for consent, holds personal information in confidence, and shares responsibility for action to meet the health and social needs of the public, especially vulnerable populations."}, {"id": "legal-ethical-57", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "What does the ICN 'Respect for human rights' element require of nurses?", "tags": ["icn", "human-rights"], "a": "Respectful care irrespective of culture, race, age, colour, creed, disability or illness, gender, sexual orientation, nationality, politics or social status - including cultural rights, the right to life and choice, and the right to be treated with dignity and respect."}, {"id": "legal-ethical-58", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "core", "q": "Describe the continuum of professional behaviour and the concept of professional boundaries.", "tags": ["professional-boundaries", "continuum", "therapeutic-relationship"], "points": ["Professional behaviour lies on a continuum from under-involved to over-involved.", "The therapeutic relationship is the balanced midpoint of the continuum.", "Being under-involved risks neglect and failure to meet the client's needs.", "Being over-involved crosses professional boundaries and can compromise objectivity.", "Nurses must maintain professional boundaries by staying within the therapeutic relationship."], "panic": true}, {"id": "legal-ethical-59", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "core", "q": "On the continuum of professional behaviour, what are the two extremes and the ideal middle?", "tags": ["professional-boundaries", "continuum"], "a": "The extremes are under-involved and over-involved; the ideal middle is the therapeutic relationship."}, {"id": "legal-ethical-60", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "structured", "difficulty": "detail", "q": "List the legal issues and areas of legal liability in nursing practice discussed in this topic.", "tags": ["legal-issues", "liability"], "points": ["Standards of care and careful, accurate documentation.", "Obtaining consent and the client's right to receive information.", "The client's right to refuse treatment and to die with dignity.", "Brain death and organ donation, and Do Not Resuscitate (DNR) orders.", "Short staffing and community nursing.", "Professional development and risk management."]}, {"id": "legal-ethical-61", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "In the Graham scenario (52-year-old with intellectual disability needing surgery for a subdural bleed, parents decline a blood transfusion as Jehovah's Witnesses), what are the core legal and ethical dilemmas?", "tags": ["scenario", "consent", "autonomy", "competence"], "a": "It raises tension between respecting autonomy/beliefs and the duty to preserve life (beneficence/non-maleficence). Key questions are whether Graham is competent to consent himself, whether the parents can lawfully refuse life-saving treatment on his behalf, and how to act in his best interests - illustrating the need to work through the ethical decision-making framework."}, {"id": "legal-ethical-62", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "A patient asks the nurse if his obstruction is cancer, but a decision has been made not to tell him the whole story. Which ethical principle creates the conflict?", "tags": ["scenario", "veracity", "ethics"], "a": "Veracity (truthfulness) - the nurse feels obliged to answer honestly, but this conflicts with the team's decision to withhold the truth; saying she will get the Charge Nurse may increase the patient's suspicion while still withholding the truth."}, {"id": "legal-ethical-63", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "A colleague with documented unsafe practice asks you for a character reference for a new job. What ethical/professional considerations apply?", "tags": ["scenario", "professional", "patient-safety", "veracity"], "a": "The duty to safeguard future patients (non-maleficence and the ICN duty to take action to protect people when a co-worker endangers health) and veracity/integrity mean you should not give a misleading reference; concerns about unsafe practice must be raised through proper channels rather than concealed."}, {"id": "legal-ethical-64", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "An incontinent elderly man asks to be left alone because he 'just wants to die' when you are asked to shower him. Which ethical principles are in tension?", "tags": ["scenario", "autonomy", "dignity", "ethics"], "a": "Autonomy (respecting his wishes) is in tension with beneficence and non-maleficence (maintaining his hygiene, dignity and health), requiring a compassionate response that explores his wishes while upholding his dignity and safety."}, {"id": "legal-ethical-65", "topicSlug": "legal-ethical", "topic": "Legal & Ethical Frameworks", "type": "recall", "difficulty": "detail", "q": "Which regulatory and professional bodies are the key NZ nursing reference sources named in this topic?", "tags": ["bodies", "ncnz", "nzno", "icn", "hdc"], "a": "The Nursing Council of New Zealand (NCNZ), the Health & Disability Commissioner (HDC), the Human Rights Commission (HRC), the New Zealand Nurses Organisation (NZNO), and the International Council of Nurses (ICN)."}, {"id": "power-note-01", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "What is 'documentation' in the clinical setting?", "tags": ["definition", "purpose", "legal"], "a": "Documentation refers to the patient's written clinical record. The clinical record is a legal document."}, {"id": "power-note-02", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Is the patient's clinical record a legal document, and what follows from that?", "tags": ["legal", "purpose"], "a": "Yes. The clinical record is a legal document and may be presented in a Court of Law."}, {"id": "power-note-03", "topicSlug": "power-note", "topic": "Documentation", "type": "structured", "difficulty": "core", "q": "List six of the responsibilities associated with documenting in the patient's clinical record.", "tags": ["responsibilities", "core"], "points": ["What is written.", "Legibility.", "Terminology and abbreviations used.", "What is NOT written.", "How it is written, including the colour of ink used.", "Entries are dated, timed and signed."]}, {"id": "power-note-04", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Complete the key documentation principle: 'If you do not write it down...'", "tags": ["principle", "legal", "core"], "a": "...it didn't happen. If care is not documented it is considered not done, regardless of what you claim to have done verbally.", "panic": true}, {"id": "power-note-05", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Which Act (2003) deals with safety and covers the need for clear and accurate documentation?", "tags": ["legislation", "act", "core"], "a": "The HPCA Act (Health Practitioners Competence Assurance Act) 2003.", "panic": true}, {"id": "power-note-06", "topicSlug": "power-note", "topic": "Documentation", "type": "structured", "difficulty": "core", "q": "Identify the three Nursing Council competency domains related to documentation (by number and name).", "tags": ["nursing-council", "competencies", "core"], "points": ["Domain 1 - Professional responsibility.", "Domain 2 - Management of nursing care.", "Domain 4 - Interprofessional health care and quality improvement."], "panic": true}, {"id": "power-note-07", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Which Nursing Council domain is 'Professional responsibility'?", "tags": ["nursing-council", "competencies"], "a": "Domain 1."}, {"id": "power-note-08", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Which Nursing Council domain is 'Management of nursing care'?", "tags": ["nursing-council", "competencies"], "a": "Domain 2."}, {"id": "power-note-09", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Which Nursing Council domain is 'Interprofessional health care and quality improvement'?", "tags": ["nursing-council", "competencies"], "a": "Domain 4."}, {"id": "power-note-10", "topicSlug": "power-note", "topic": "Documentation", "type": "structured", "difficulty": "core", "q": "Define the six legal and ethical terms relevant to documentation: confidentiality, privacy, litigation, negligence, malpractice and legal liability.", "tags": ["legal-ethical", "terminology", "core"], "points": ["Confidentiality - covered by the Code of Rights.", "Privacy - governed by the Privacy Act 1993.", "Litigation - legal proceedings in court.", "Negligence - failure to provide the level of care required to prevent harm.", "Malpractice - improper or unethical conduct.", "Legal liability - a legal obligation."], "panic": true}, {"id": "power-note-11", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Under which Act is 'privacy' governed in relation to documentation?", "tags": ["legal-ethical", "act", "core"], "a": "The Privacy Act 1993.", "panic": true}, {"id": "power-note-12", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Which document covers 'confidentiality' in the legal/ethical terminology of documentation?", "tags": ["legal-ethical"], "a": "The Code of Rights."}, {"id": "power-note-13", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Define 'negligence' in a documentation/legal context.", "tags": ["legal-ethical", "definition"], "a": "Negligence is the failure to provide the level of care required to prevent harm."}, {"id": "power-note-14", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Contrast 'negligence' and 'malpractice'.", "tags": ["legal-ethical", "contrast"], "a": "Negligence is failing to provide the level of care required to prevent harm; malpractice is improper or unethical conduct."}, {"id": "power-note-15", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Define 'litigation'.", "tags": ["legal-ethical", "definition"], "a": "Litigation is legal proceedings in court."}, {"id": "power-note-16", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Whose
