h with the enabler that would resolve it.", "tags": ["barriers", "enablers", "contrast", "detail"], "points": ["Poor communication is a barrier, whereas open dialogue and transparent decision-making enable trust and agreement.", "Lack of leadership and coordination is a barrier, whereas a skilled workforce and a joint approach enable effective collaborative action.", "Lack of long-term funding is a barrier, whereas a funding and contracting environment that supports collaborative action is an enabler.", "Differing agendas or priorities are a barrier, whereas agreeing on a common purpose and common language is an enabler.", "Poor community engagement is a barrier, whereas respecting the values and cultures of the parties is an enabler.", "Inability to define professional boundaries is a barrier, whereas giving relevant responsibility to the most appropriate agency resolves it."]}, {"id": "intersectorial-17", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "core", "q": "How does intersectorial collaboration connect to primary health care (per CMDHB, 2006)?", "tags": ["primary-health-care", "cmdhb", "core"], "a": "The success of primary health care in improving health outcomes is heavily influenced by other agencies that can have a determining contribution to people's health status (CMDHB, 2006); PHC therefore depends on collaboration with sectors beyond health."}, {"id": "intersectorial-18", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "Complete the CMDHB (2006) statement about primary health care and other agencies.", "tags": ["primary-health-care", "quote", "detail"], "a": "\"The success of primary health care in positively reducing health outcomes is heavily influenced by other agencies that can have a determining contribution to people's health status\" (CMDHB, 2006)."}, {"id": "intersectorial-19", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "core", "q": "How does the Ministry of Social Development (MSD) demonstrate ISC through Whānau Ora?", "tags": ["example", "msd", "whanau-ora", "core"], "a": "MSD works with health providers and Whānau Ora navigators to support families with complex needs. A family struggling with housing, income and child health may receive coordinated support from MSD (benefits and employment), health services (GP, immunisations) and social workers, reducing hospital admissions and improving long-term wellbeing."}, {"id": "intersectorial-20", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "core", "q": "How does Housing New Zealand / Kāinga Ora demonstrate ISC through the Healthy Homes Initiative?", "tags": ["example", "housing", "healthy-homes", "core"], "a": "Kāinga Ora partners with public health units and NGOs to identify families in cold, damp or overcrowded homes. Health professionals (nurses, GPs) refer patients with respiratory illness, and the initiative provides insulation, heating, curtains and housing advocacy, directly addressing a key social determinant of health."}, {"id": "intersectorial-21", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "core", "q": "How does the education sector demonstrate ISC through School-Based Health Services (SBHS)?", "tags": ["example", "education", "sbhs", "core"], "a": "Nurses are placed in low-decile secondary schools to provide free, accessible health care. They collaborate with teachers, counsellors and community health providers to support students' physical and mental health, reducing absenteeism, improving learning outcomes, and identifying issues such as mental distress or family violence early."}, {"id": "intersectorial-22", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "core", "q": "How does the retail/food industry demonstrate ISC through the Healthy Food in Schools Programme?", "tags": ["example", "food", "schools", "core"], "a": "The Ministry of Health and Ministry of Education work with food suppliers to provide nutritious lunches in schools, supporting child development, reducing hunger-related health issues, and promoting healthy eating habits."}, {"id": "intersectorial-23", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "core", "q": "How does the leisure/sports sector demonstrate ISC through the Green Prescription (GRx)?", "tags": ["example", "sport", "green-prescription", "core"], "a": "GPs and nurses refer patients to physical activity programmes run by Sport NZ and local councils. Patients receive support to exercise as part of managing chronic conditions such as diabetes or depression, improving physical and mental health while reducing reliance on medication."}, {"id": "intersectorial-24", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "In the Green Prescription example, which chronic conditions are given as reasons for referral?", "tags": ["example", "green-prescription", "detail"], "a": "Chronic conditions such as diabetes and depression are managed through the Green Prescription physical-activity referral."}, {"id": "intersectorial-25", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "In the School-Based Health Services example, which three benefits result from the collaboration?", "tags": ["example", "sbhs", "detail"], "a": "It reduces absenteeism, improves learning outcomes, and enables early identification of issues such as mental distress or family violence."}, {"id": "intersectorial-26", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "core", "q": "In the South Auckland rheumatic fever case study, how disproportionately are Pacific children affected?", "tags": ["case-study", "rheumatic-fever", "statistic", "core"], "a": "Pacific children in South Auckland are up to 80 times more likely to be hospitalised with rheumatic fever than non-Pacific children."}, {"id": "intersectorial-27", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "What is the underlying cause of rheumatic fever described in the case study?", "tags": ["case-study", "rheumatic-fever", "pathophysiology", "detail"], "a": "Rheumatic fever is an autoimmune disease that stems from untreated Group A Streptococcus infections and can lead to lifelong heart damage."}, {"id": "intersectorial-28", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "structured", "difficulty": "core", "q": "Using the South Auckland rheumatic fever case study, identify the sectors involved in the intersectorial collaboration and the contribution of each.", "tags": ["case-study", "rheumatic-fever", "sectors", "core"], "points": ["Health sector: Te Whatu Ora, Pacific health providers (e.g. The Fono, Moana Connect) and primary care teams deliver screening, treatment and education.", "Education sector: schools help identify at-risk children and host sore-throat clinics.", "Community sector: churches and Pacific leaders engage families using culturally grounded models like Fa'afaletui.", "Social services: MSD and NGOs support families with housing, income and access to care.", "Research and academia: University of Auckland researchers partnered with communities to co-design interventions tailored to Pacific values and needs.", "Together these sectors provide a coordinated, culturally responsive response no single sector could deliver alone."], "panic": true}, {"id": "intersectorial-29", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "Which culturally grounded model, and which Pacific health providers, feature in the rheumatic fever case study?", "tags": ["case-study", "cultural-model", "providers", "detail"], "a": "Churches and Pacific leaders engaged families using the Fa'afaletui model; the named Pacific health providers were The Fono and Moana Connect (alongside Te Whatu Ora and primary care teams)."}, {"id": "intersectorial-30", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "structured", "difficulty": "detail", "q": "Describe the key strategies used in the co-design of the South Auckland rheumatic fever prevention programme.", "tags": ["case-study", "strategies", "co-design", "detail"], "points": ["Community workshops: focus groups explored Pacific experiences and barriers to care.", "Culturally responsive messaging: social media and church-based outreach improved awareness.", "Access points: screening locations were increased in schools, churches and community centres.", "Empowerment: Pacific families helped shape the intervention, ensuring relevance and trust.", "The approach was community-led and co-designed rather than imposed by services.", "Together these strategies strengthened trust and improved early detection and treatment."]}, {"id": "intersectorial-31", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "What were the main outcomes and impacts of the rheumatic fever co-design collaboration?", "tags": ["case-study", "outcomes", "detail"], "a": "Strengthened trust between health providers and Pacific communities; improved early detection and treatment of strep throat; and a model for culturally informed, community-led health equity initiatives."}, {"id": "intersectorial-32", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "core", "q": "What is the nurse's role in intersectorial collaboration?", "tags": ["nurse-role", "advocacy", "core"], "a": "Nurses advocate for and facilitate intersectorial collaboration: they refer patients to other sectors (e.g. Healthy Homes, Green Prescription), work within cross-sector programmes such as School-Based Health Services, coordinate care with agencies like MSD, and identify the social determinants affecting a patient so collaborative needs can be met.", "panic": true}, {"id": "intersectorial-33", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "structured", "difficulty": "core", "q": "Sophia, a 5-year-old, has had multiple hospital admissions for upper respiratory tract infections. She lives in South Auckland with her mother and 3 siblings (aged 1, 9 and 12), with 13 people in a 4-bedroom home; her mother works full time with no remaining sick leave; Sophia was born at 27 weeks and has missed multiple outpatient ENT appointments. Identify the social determinants of health affecting Sophia and the sectors that could collaborate to help.", "tags": ["scenario", "social-determinants", "core"], "points": ["Housing / overcrowding: 13 people in a 4-bedroom home increases infection risk — housing sector (Kāinga Ora, Healthy Homes Initiative) could assist.", "Income and employment: mother works full time with no remaining sick leave, limiting time for appointments — MSD/WINZ and employers could provide support.", "Access to health care: multiple missed outpatient ENT appointments indicate barriers to access — primary care and Pacific/community health providers could improve access points.", "Biological vulnerability: born at 27 weeks gestation (extreme prematurity) increases respiratory vulnerability — paediatric and health-sector follow-up needed.", "Locality/equity: living in South Auckland, an area of known health inequity — community and social-service collaboration is required.", "Family circumstances: sole caregiver with 3 dependent children plus extended family — social services and Whānau Ora navigators could coordinate wraparound support."], "panic": true}, {"id": "intersectorial-34", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "In Sophia's scenario, why is the fact that she was born at 27 weeks gestation significant?", "tags": ["scenario", "biological-determinant", "detail"], "a": "Birth at 27 weeks is extreme prematurity, a biological risk factor making her more vulnerable to recurrent respiratory infections and requiring ongoing health follow-up."}, {"id": "intersectorial-35", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "In Sophia's scenario, which social factors help explain the missed ENT appointments?", "tags": ["scenario", "access", "detail"], "a": "The mother works full time with no remaining sick leave, the household is large and overcrowded (13 people in a 4-bedroom home with 3 siblings and extended family), and they live in South Auckland — time pressure, caregiving load and access barriers all contribute."}, {"id": "intersectorial-36", "topicSlug": "intersectorial", "topic": "Intersectorial Collaboration", "type": "recall", "difficulty": "detail", "q": "Which learning outcomes did this lecture set for intersectorial collaboration?", "tags": ["learning-outcomes", "detail"], "a": "Define ISC and its role in improving health outcomes; recognise the importance of collaboration across sectors beyond health; identify key social determinants of health and their influence on patient care; discuss barriers and enablers in the NZ context; reflect on the nurse's role in advocating for and facilitating ISC; and analyse a real-world scenario to determine collaborative needs and sector involvement."}, {"id": "impairment-disability-01", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "core", "q": "Define impairment.", "tags": ["definition", "impairment"], "a": "An illness or injury which causes, or is likely to cause, a loss or difference of function either physically or cognitively."}, {"id": "impairment-disability-02", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "core", "q": "By what three means can impairment be acquired?", "tags": ["impairment", "causes"], "a": "Illness, injury, and congenital conditions."}, {"id": "impairment-disability-03", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "core", "q": "In terms of duration, what three patterns can impairment take?", "tags": ["impairment", "duration"], "a": "Impairment can be temporary, intermittent, or permanent."}, {"id": "impairment-disability-04", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "structured", "difficulty": "core", "q": "List the five types (categories) of impairment.", "tags": ["impairment", "types", "list"], "points": ["Physical impairment.", "Psychiatric impairment.", "Intellectual impairment.", "Sensory impairment.", "Neurological impairment."], "panic": true}, {"id": "impairment-disability-05", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "core", "q": "Define disability as taught in this lecture.", "tags": ["definition", "disability", "social-model"], "a": "Disability relates to the person with an impairment and their interaction with the environment; it occurs when people are excluded from places and from taking part in activities that most citizens take for granted.", "panic": true}, {"id": "impairment-disability-06", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "core", "q": "According to the lecture, where does the 'problem' of disability lie?", "tags": ["disability", "social-model", "society"], "a": "People do not have a disability; the problem lies with society. Disability arises from barriers in society, specifically infrastructure and systems that are not inclusive of diverse needs and abilities."}, {"id": "impairment-disability-07", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "core", "q": "What is the key difference between impairment and disability?", "tags": ["contrast", "impairment", "disability"], "a": "Impairment is the loss or difference of physical or cognitive function caused by illness, injury or a congenital condition (it belongs to the person). Disability is what happens when a person with an impairment interacts with an environment whose barriers exclude them; the disability arises from the environment, not the impairment itself.", "panic": true}, {"id": "impairment-disability-08", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "Disability due to non-inclusive environments can stem from which two broad sources named in the source?", "tags": ["disability", "barriers", "environment"], "a": "Infrastructure and systems, when these are not inclusive of diverse needs and abilities."}, {"id": "impairment-disability-09", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "core", "q": "In 2023, what proportion and number of people living in New Zealand households were identified as disabled?", "tags": ["statistics", "prevalence", "nz"], "a": "An estimated 17 percent, a total of 851,000 people (StatsNZ, 2023).", "panic": true}, {"id": "impairment-disability-10", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "Which population groups had higher disability rates than non-Maori, non-Pacific peoples in the 2023 data?", "tags": ["statistics", "equity", "maori", "pacific"], "a": "Maori and Pacific peoples had higher disability rates than non-Maori, non-Pacific peoples."}, {"id": "impairment-disability-11", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "In the 2023 data, roughly how many disabled people had more than one type of impairment?", "tags": ["statistics", "impairment", "prevalence"], "a": "Just over half of all disabled people had more than one type of impairment."}, {"id": "impairment-disability-12", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "How many New Zealanders live with a disability caused by psychological and/or psychiatric conditions?", "tags": ["statistics", "psychiatric", "prevalence"], "a": "An estimated 242,000 people, which is 5% of New Zealanders."}, {"id": "impairment-disability-13", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "What was the most common type of impairment for children (0-14 years) versus for adults?", "tags": ["statistics", "children", "adults", "contrast"], "a": "For children, a learning difficulty was the most common type of impairment; for adults, physical limitations were the most common type."}, {"id": "impairment-disability-14", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "How does disability prevalence change with age in the 2023 NZ data?", "tags": ["statistics", "age", "prevalence"], "a": "Prevalence rises with age: 10% of children (0-14), 12% of adults 15-44, 17% of adults 45-64, and 35% of adults 65 and over (370,000 people). People aged 65+ were much more likely to be disabled."}, {"id": "impairment-disability-15", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "How did disability rates compare for the LGBTIQ+ (Rainbow) population versus the non-LGBTIQ+ population?", "tags": ["statistics", "rainbow", "equity"], "a": "People in the LGBTIQ+ (Rainbow) population were more likely to be disabled (29 percent) than those in the non-LGBTIQ+ population (17 percent)."}, {"id": "impairment-disability-16", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "structured", "difficulty": "core", "q": "Describe the medical model of disability, identifying five features of how it views disabled people.", "tags": ["medical-model", "list"], "points": ["It sees disabled people as passive receivers of service.", "It focuses on the impairment rather than on the needs of the person.", "It emphasises dependence and supports segregation of disabled people.", "Decisions about education, accommodation and employment are made by non-disabled professionals.", "Disabled people are expected to adapt to the world as it is, and it is associated with pity, fear and patronising attitudes."]}, {"id": "impairment-disability-17", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "structured", "difficulty": "core", "q": "Describe the social model of disability, identifying its key recognitions and the types of barrier it names.", "tags": ["social-model", "barriers", "list"], "points": ["It recognises that some people have impairments which affect how they function.", "It recognises that disabled people have the same wants, needs and aspirations as non-impaired people.", "It holds that people are disabled by the barriers in society that do not take their needs into account.", "Physical barriers exist, for example buildings without lifts.", "Organisational barriers exist, for example information not available in large print.", "Attitudinal barriers exist within aspects of society, for example negative attitudes and poor understanding."]}, {"id": "impairment-disability-18", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "structured", "difficulty": "core", "q": "Contrast the medical model and the social model of disability across their key attributes.", "tags": ["contrast", "medical-model", "social-model", "high-yield"], "points": ["Locus of the problem: the medical model locates the problem in the person's impairment, whereas the social model locates it in society's barriers.", "View of the disabled person: the medical model sees them as passive receivers of service who must adapt to the world, whereas the social model sees them as people with the same wants, needs and aspirations who have the right to determine their own lives.", "Focus: the medical model focuses on the impairment and emphasises dependence and segregation, whereas the social model focuses on removing barriers to full participation.", "Who decides: in the medical model non-disabled professionals decide about education, accommodation and employment, whereas the social model supports self-determination by the disabled person.", "The 'cure': the medical model expects the disabled person to adapt, whereas the social model says the cure lies in restructuring society.", "Associated attitudes: the medical model is associated with pity, fear and patronising attitudes, whereas the social model promotes equal rights and inclusion."], "panic": true}, {"id": "impairment-disability-19", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "core", "q": "According to the social-model view, where does the 'cure' to the problem of disability lie, and what should we focus on?", "tags": ["social-model", "cure", "society"], "a": "The cure lies in restructuring society, not in fixing the person. We should look beyond the person's impairment and focus on all the factors that affect their ability to be a full and equal participant in society."}, {"id": "impairment-disability-20", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "core", "q": "What rights do people with impairment have according to the social-model view?", "tags": ["rights", "self-determination", "participation"], "a": "They have the same right to determine their own life choices, and to be full and equal participants in society; the focus should move beyond their impairment to the factors affecting their participation."}, {"id": "impairment-disability-21", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "core", "q": "What is identified as the main barrier faced by disabled people at all levels of daily life?", "tags": ["barriers", "attitudes", "stigma"], "a": "Attitudes are the main barrier at all levels of daily life, specifically stigma, prejudice and discrimination.", "panic": true}, {"id": "impairment-disability-22", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "Roughly what proportion of people in NZ have a long-term impairment, and what do they commonly face?", "tags": ["statistics", "barriers", "prevalence"], "a": "1 in 5 people in NZ have a long-term impairment, and many face lifelong barriers to full participation in NZ society."}, {"id": "impairment-disability-23", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "In June 1999, what was the main complaint made to the Human Rights Commission?", "tags": ["barriers", "discrimination", "history"], "a": "In June 1999, disability discrimination was the main complaint to the Human Rights Commission."}, {"id": "impairment-disability-24", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "How can attitudes and behaviours combine to create insurmountable barriers?", "tags": ["barriers", "attitudes", "systems"], "a": "Sometimes the combination of attitudes and behaviours creates insurmountable barriers; whole systems and behaviours can become a barrier, much in the way that institutionalised racism operates."}, {"id": "impairment-disability-25", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "structured", "difficulty": "detail", "q": "Discuss the barriers disabled people face across the lifespan.", "tags": ["barriers", "lifespan", "list"], "points": ["It is hard to get the best start in life; emotional, physical and financial pressures are demanding on the whole family.", "Disabled people are much less likely to have qualifications.", "They are much less likely to be employed, despite equal employment opportunities.", "They often experience reduced housing options.", "Older disabled people can be denied opportunities to remain independent."]}, {"id": "impairment-disability-26", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "structured", "difficulty": "detail", "q": "Discuss the barriers disabled people face in everyday life.", "tags": ["barriers", "everyday-life", "list"], "points": ["Poor access to public facilities and buildings.", "Poor access to public transport, and car modifications are expensive.", "Access to services is relative to socio-economic circumstances.", "Poor literacy compounds communication barriers.", "They are often shut out of social networks."]}, {"id": "impairment-disability-27", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "structured", "difficulty": "detail", "q": "Discuss the financial/economic barriers disabled people face.", "tags": ["barriers", "income", "equity", "list"], "points": ["They are more likely to have lower incomes and fewer financial and family resources.", "The earning potential of families with disabled children is impacted by the children's needs.", "Disabled women are more likely to have lower incomes than non-disabled women.", "Annual income for 71% of disabled women was reported as less than $15,000.", "Disabled people are 3 times more likely to receive a government benefit."]}, {"id": "impairment-disability-28", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "structured", "difficulty": "detail", "q": "Explain why the process of accessing disability services can itself be 'disabling'.", "tags": ["barriers", "services", "access", "list"], "points": ["A needs assessment is required to determine the support needed, and funds and services are allocated on the basis of the assessment findings.", "The process involves telling one's story numerous times to various assessors.", "The process is repeated annually, or more frequently if needs or circumstances change.", "Families get used to 'fighting the system'.", "The overall process can be very disabling in itself."]}, {"id": "impairment-disability-29", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "core", "q": "State the vision of the New Zealand Disability Strategy (2023).", "tags": ["nz-disability-strategy", "vision", "pae-ora"], "a": "To achieve pae ora (healthy futures) for disabled people and their whanau in Aotearoa New Zealand, a future in which all disabled people and their whanau live long, fulfilling and more independent lives in good health."}, {"id": "impairment-disability-30", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "structured", "difficulty": "core", "q": "List the five priorities of the New Zealand (Health of Disabled People) Disability Strategy.", "tags": ["nz-disability-strategy", "priorities", "list", "high-yield"], "points": ["Priority 1: Embed self-determination of disabled people and their whanau as the foundation of a person- and whanau-centred health system.", "Priority 2: Ensure the health system is designed by and accessible for disabled people and their whanau, and provides models of care that suit their needs.", "Priority 3: Ensure the health system is part of a coherent cross-government system that addresses broader drivers of poor health and wellbeing.", "Priority 4: Build health workforce capacity and capability to meet the needs of disabled people and their whanau.", "Priority 5: Increase the visibility of disabled people in health data, research and evidence."], "panic": true}, {"id": "impairment-disability-31", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "core", "q": "On which model of disability is the NZ Disability Strategy based, and when was it first developed?", "tags": ["nz-disability-strategy", "social-model", "history"], "a": "It is based on the social model of disability, first developed in 2000/2001.", "panic": true}, {"id": "impairment-disability-32", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "core", "q": "What is Whaikaha, when was it established, who was its Chief Executive, and what approach does it follow?", "tags": ["whaikaha", "history", "egl"], "a": "Whaikaha is the Ministry of Disabled People, established in 2022. Its Chief Executive was Ms Paula Tesoriero (MNZM), a Paralympic racing cyclist. It works in line with the Enabling Good Lives (EGL) approach.", "panic": true}, {"id": "impairment-disability-33", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "What was released in 2023 regarding disabled people's health?", "tags": ["nz-disability-strategy", "history", "2023"], "a": "A new Provisional Health of Disabled People Strategy was released in 2023."}, {"id": "impairment-disability-34", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "What does the whakatauki 'Kia whakatomuri te haere whakamua' mean, and why is it used with the history of disability?", "tags": ["history", "whakatauki", "maori"], "a": "It means 'I walk backwards into the future with my eyes fixed on my past'. It frames the history of disability, reminding us to learn from the past to inform the future."}, {"id": "impairment-disability-35", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "structured", "difficulty": "detail", "q": "Describe how disabled people were treated in New Zealand during the 1800s.", "tags": ["history", "1800s", "institutionalisation", "eugenics", "list"], "points": ["The 1846 Lunatics Ordinance provided for the safe custody (jail) of the 'dangerously insane' and 'persons of unsound mind'.", "In 1854 institutions were established for the mentally ill, and in the 1860s institutions were set up for orphans, unmarried mothers, the destitute and the disabled.", "Support for disabled people was met by families and charities, not public taxes.", "Disabled people were discouraged from settling in NZ via the Imbecile Passengers Act 1882 and the Immigration Restriction Act 1899.", "The eugenics movement applied ideas of biological natural selection to preserve 'good genetic stock' and 'weed out the weak', institutionalising people with ill health or mental deficiencies.", "Institutionalisation was seen as a way of protecting society from people with less desirable traits; the first school for deaf children opened in 1880."]}, {"id": "impairment-disability-36", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "What did the 1911 Mental Defectives Act emphasise?", "tags": ["history", "1900s", "legislation"], "a": "It emphasised classifying and screening children, with children with 'special needs' segregated to services outside of mainstream education and health."}, {"id": "impairment-disability-37", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "structured", "difficulty": "detail", "q": "Identify key legislative and policy changes affecting disabled people in NZ from the 1960s to the 1970s.", "tags": ["history", "1960s", "1970s", "legislation", "list"], "points": ["1960 Disabled Persons Employment Promotion Act created employment opportunities for disabled people.", "The Intellectually Handicapped Children (IHC) organisation set up day care centres and residential homes.", "1972 Royal Commission into Psychopaedic hospitals led to government funds being channelled into smaller residential facilities.", "Accident Compensation Act 1972 meant people whose impairment was through an accident could receive assistance.", "Disabled Persons Community Welfare Act 1975 provided assistance for disabled people who were not covered by ACC, to stay in the community."]}, {"id": "impairment-disability-38", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "structured", "difficulty": "detail", "q": "Describe the key developments for disabled people in the 1980s in New Zealand.", "tags": ["history", "1980s", "deinstitutionalisation", "list"], "points": ["1981 was the International Year of the Disabled, and the Telethon raised awareness.", "Deinstitutionalisation occurred, a movement away from institutionalised care.", "Government policy of 'normalisation' was adopted.", "There was more government support for community-based services.", "An amendment to the Education Act enabled mainstreaming of disabled children."]}, {"id": "impairment-disability-39", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "structured", "difficulty": "detail", "q": "Identify key disability-related developments in NZ from 2000 onwards.", "tags": ["history", "2000s", "nz-disability-strategy", "nzsl", "list"], "points": ["2000/2001 the NZ Disability Strategy was developed, based on the social model.", "2002 the Office for Disability Issues was set up to implement and monitor the strategy.", "2004 the NZ Sign Language Bill proposed recognition of NZSL as the 3rd official language.", "NZ took a leading role at the UN in disability rights.", "A long-term disability support services review was begun."]}, {"id": "impairment-disability-40", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "What did the 2004 NZ Sign Language Bill propose?", "tags": ["history", "nzsl", "legislation"], "a": "It proposed recognition of New Zealand Sign Language (NZSL) as the 3rd official language."}, {"id": "impairment-disability-41", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "What do 'deinstitutionalisation' and 'normalisation' mean in the 1980s disability context?", "tags": ["history", "deinstitutionalisation", "normalisation"], "a": "Deinstitutionalisation is the movement away from institutionalised care towards community-based services. 'Normalisation' was the associated government policy supporting disabled people to live more ordinary lives in the community."}, {"id": "impairment-disability-42", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "core", "q": "How should nurses adjust their attitudes and practice given the social model of disability?", "tags": ["nursing", "attitudes", "social-model", "practice"], "a": "Nurses should look beyond the person's impairment, treat disabled people as full and equal participants with the same rights to self-determination, focus on removing barriers, and reject pity, fear or patronising attitudes; they must build knowledge of disabilities, accessibility, disability rights and how to interact with and care for disabled and d/Deaf people."}, {"id": "impairment-disability-43", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "What did engagement participants say the health workforce should know (Priority 4)?", "tags": ["nursing", "priority-4", "workforce", "cultural-safety"], "a": "All those responsible for providing health services should have a basic knowledge of disabilities, accessibility and disability rights, the Deaf community and d/Deaf rights, and knowledge of how to interact with and provide care that meets the basic requirements of disabled and d/Deaf people; cultural safety and equal opportunity for tangata whaikaha in the workforce were also called for."}, {"id": "impairment-disability-44", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "What is an 'invisible disability', and which two examples does the source give?", "tags": ["invisible-disability", "adhd", "asd"], "a": "An invisible disability is one not outwardly apparent to others. The source gives ADHD (Attention Deficit Hyperactivity Disorder) and ASD (Autism Spectrum Disorder) as examples, and notes participants asked that medical professionals understand and listen to people with invisible disabilities."}, {"id": "impairment-disability-45", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "What did tangata whaikaha Maori say they need from the health system (Priorities 1 and 2)?", "tags": ["maori", "tangata-whaikaha", "mana-motuhake", "priority-1", "priority-2"], "a": "A system that listens to their insights and is shaped by them; mana motuhake with more tangata whaikaha voices in leadership/board positions; support of the people they choose; and access to kaupapa Maori services underpinned by Maori worldviews and principles."}, {"id": "impairment-disability-46", "topicSlug": "impairment-disability", "topic": "Impairment & Disability", "type": "recall", "difficulty": "detail", "q": "According to Priority 3, why must the health system be part of a coherent cross-government system?", "tags": ["priority-3", "cross-government", "barriers"], "a": "Because disabled people are often 'pinged around' between agencies (for example between health and education over issues like ramps), and much of their work is juggling different agencies; a coherent cross-government system is needed to address the broader drivers of poor health and wellbeing."}, {"id": "epi-demography-01", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "Define demography.", "tags": ["demography", "definition"], "a": "Demography is the study of human populations, particularly the size, distribution and characteristics of their members (how many people there are, where they live, their age, gender, jobs, and more)."}, {"id": "epi-demography-02", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "Define epidemiology.", "tags": ["epidemiology", "definition"], "a": "Epidemiology is the study of the patterns, causes and control of disease in groups of people (the who, when and where) - i.e. the study of the distribution and determinants of health-related states or events in specified populations, and the application of this study to the control of health problems.", "panic": true}, {"id": "epi-demography-03", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "What is the Greek origin of the word 'epidemiology'?", "tags": ["epidemiology", "etymology"], "a": "Epi = on or upon; demos = people; logos = the study of. Together: the study of what is upon the people."}, {"id": "epi-demography-04", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "Distinguish demography from epidemiology.", "tags": ["demography", "epidemiology", "contrast"], "a": "Demography studies the size, distribution and characteristics of human populations (who and where people are). Epidemiology studies the patterns, causes and control of disease within groups of people (the who, when and where of disease).", "panic": true}, {"id": "epi-demography-05", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "structured", "difficulty": "core", "q": "Identify the five population backgrounds/characteristics that demography encompasses.", "tags": ["demography", "characteristics"], "points": ["Gender", "Ethnic (ethnicity)", "Economical (economic status)", "Religious", "Geographic (where people live)"]}, {"id": "epi-demography-06", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "How is demographic data mainly collected in New Zealand, and how often (per the source)?", "tags": ["demography", "census", "new-zealand"], "a": "Mainly from the National Census, which the source states takes place every 4 years (plus other data sources)."}, {"id": "epi-demography-07", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "Where can NZ health data and statistics be accessed?", "tags": ["demography", "data-sources", "new-zealand"], "a": "From the Ministry of Health (MOH) website, the NZ Health Survey data explorer, and the Health New Zealand Health Status Report 2023."}, {"id": "epi-demography-08", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "What does the acronym BODE3 stand for in NZ epidemiology?", "tags": ["epidemiology", "new-zealand", "programme"], "a": "The Burden of Disease Epidemiology, Equity and Cost-effectiveness Programme (BODE3)."}, {"id": "epi-demography-09", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "How is epidemiological information used, and by whom?", "tags": ["epidemiology", "prevention", "application"], "a": "Health researchers use it to plan and evaluate prevention strategies, working in conjunction with government advisors, the Ministry of Health (MOH), and esteemed experts in their own fields of clinical practice."}, {"id": "epi-demography-10", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "How has the focus of epidemiological study shifted over time?", "tags": ["epidemiology", "population-health", "shift"], "a": "In the past, studies focused on infectious diseases and their known/causative agents. The focus has now shifted to a 'population health' approach, examining how various factors act together in harmful or healthful ways."}, {"id": "epi-demography-11", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "What is the 'population health' approach to epidemiology?", "tags": ["epidemiology", "population-health", "determinants"], "a": "An approach that identifies how various factors act together in a harmful or healthful way, and how these combinations of factors are shaped by the environments of people's lives to either multiply or diminish their effect (e.g. smoking, alcohol and housing).", "panic": true}, {"id": "epi-demography-12", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "structured", "difficulty": "core", "q": "Describe the main types of epidemiological studies.", "tags": ["study-types", "observational", "experimental"], "points": ["Observational studies allow nature to take its course (no intervention by the researcher).", "A descriptive study describes the occurrence of a disease in a population.", "An analytical study goes further by analysing relationships between health status and other variables.", "Experimental studies involve an active attempt to change a disease determinant, such as a behaviour or the progress of a disease through treatment.", "Descriptive and analytical studies are subtypes of observational studies."], "panic": true}, {"id": "epi-demography-13", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "Contrast observational and experimental epidemiological studies.", "tags": ["study-types", "contrast", "observational", "experimental"], "a": "Observational studies allow nature to take its course, with the researcher only observing. Experimental studies involve an active attempt to change a disease determinant, such as a behaviour or the progress of disease through treatment."}, {"id": "epi-demography-14", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "Contrast descriptive and analytical (observational) studies.", "tags": ["study-types", "contrast", "descriptive", "analytical"], "a": "A descriptive study simply describes the occurrence of a disease in a population. An analytical study goes further by analysing the relationships between health status and other variables."}, {"id": "epi-demography-15", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "structured", "difficulty": "detail", "q": "Identify six epidemiological achievements in New Zealand and a strategy the source associates with each.", "tags": ["achievements", "new-zealand", "prevention"], "points": ["Smallpox - controlled through the vaccine/vaccination.", "Rheumatic fever - throat swabs, advertising and increasing awareness.", "Hip fractures - exercise programmes, home safety assessments, timely treatment and vitamin D.", "Tobacco use, asbestos and lung cancer - smoking cessation, reducing access and awareness.", "HIV/AIDS - awareness, education and effective prevention and treatment.", "Diabetes - education, prevention and management; and cardiovascular disease - screening, prevention and intervention."]}, {"id": "epi-demography-16", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "List the nine epidemiological achievements in New Zealand named in the source.", "tags": ["achievements", "new-zealand", "list"], "a": "Smallpox, rheumatic fever, iodine deficiency diseases, hip fractures, tobacco use/asbestos/lung cancer, HIV/AIDS, SARS, diabetes, and cardiovascular disease."}, {"id": "epi-demography-17", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "Define a communicable (infectious) disease.", "tags": ["communicable-disease", "definition"], "a": "A communicable disease is an infectious disease caused by a pathogen that infects a susceptible host, and which can be spread from one host to another.", "panic": true}, {"id": "epi-demography-18", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "structured", "difficulty": "detail", "q": "Identify examples of communicable diseases named in the source.", "tags": ["communicable-disease", "examples"], "points": ["Measles", "HIV/AIDS", "Hepatitis", "Mumps", "Rubella", "Gastroenteritis and COVID-19"]}, {"id": "epi-demography-19", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "What is the epidemiological triangle and what question does each component answer?", "tags": ["epidemiological-triangle", "model", "definition"], "a": "It is a foundational public health model for understanding how diseases spread and how we can intervene. Its three components are the Agent (WHAT - the cause), the Host (WHO - the organism, usually human, that can get the disease), and the Environment (WHERE - external factors affecting the agent and the host's exposure)."}, {"id": "epi-demography-20", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "structured", "difficulty": "core", "q": "Describe the three components of the epidemiological triangle.", "tags": ["epidemiological-triangle", "agent", "host", "environment"], "points": ["Agent (WHAT) - the cause of the disease, e.g. a virus, bacteria or toxin.", "Host (WHO) - the organism, usually human, that can get the disease; host factors include immunity, age, nutrition and pre-existing conditions.", "Environment (WHERE) - external factors that affect the agent and the host's exposure, e.g. climate, crowding, ventilation and hygiene.", "The three components interact, and disease occurs when the agent, a susceptible host and a favourable environment come together.", "The epidemiological approach is to 'break the triangle' by intervening on any one of the three components to prevent disease."], "panic": true}, {"id": "epi-demography-21", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "In the epidemiological triangle, what does the 'Agent' (WHAT) represent? Give examples.", "tags": ["epidemiological-triangle", "agent"], "a": "The agent is the cause of the disease - for example a virus, bacteria or toxin (e.g. E. coli, the influenza virus)."}, {"id": "epi-demography-22", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "In the epidemiological triangle, what does the 'Host' (WHO) represent, and what are examples of host factors?", "tags": ["epidemiological-triangle", "host"], "a": "The host is the organism (usually human) that can get the disease. Host factors include immunity, age, nutrition and pre-existing conditions; more vulnerable groups include the elderly, young children and immunocompromised individuals."}, {"id": "epi-demography-23", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "In the epidemiological triangle, what does the 'Environment' (WHERE) represent? Give examples.", "tags": ["epidemiological-triangle", "environment"], "a": "The environment is the external factors that affect the agent and the host's exposure - e.g. seasonal/social conditions, colder months, crowded places (schools, hospitals, public transport), poor ventilation and lack of hygiene."}, {"id": "epi-demography-24", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "structured", "difficulty": "core", "q": "Using influenza as an example, explain the three points of the epidemiological triangle and a nursing intervention at each.", "tags": ["epidemiological-triangle", "influenza", "nursing-interventions"], "points": ["Agent (WHAT): the influenza virus, which is highly contagious, mutates frequently and spreads via droplets when infected people cough, sneeze or talk - nursing intervention: administer flu vaccines to reduce virulence and spread.", "Host (WHO): the human population, with the elderly, young children and immunocompromised being most vulnerable - nursing intervention: educate patients on hand hygiene, symptom recognition and self-care.", "Environment (WHERE): seasonal and social conditions, e.g. colder months, crowded places and poor ventilation/hygiene - nursing intervention: promote infection control protocols such as mask use and surface disinfection.", "Understanding the triangle helps nurses break the chain of infection.", "Interventions can target any point: vaccinating the host reduces susceptibility, improving the environment limits exposure, and targeting the agent (e.g. antivirals) reduces its impact."]}, {"id": "epi-demography-25", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "What is the core epidemiological strategy suggested by the epidemiological triangle?", "tags": ["epidemiological-triangle", "strategy", "chain-of-infection"], "a": "To break the triangle by intervening on at least one of its three components (agent, host or environment), thereby breaking the chain of infection - e.g. vaccinating the host, improving the environment, or targeting the agent with medication.", "panic": true}, {"id": "epi-demography-26", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "How can the epidemiological triangle be applied to a chronic condition like Type 2 Diabetes?", "tags": ["epidemiological-triangle", "chronic-disease", "diabetes"], "a": "The model can be adapted beyond infectious disease: the WHAT/agent could be poor diet/lifestyle, the WHO/host might have a genetic predisposition, and the WHERE/environment could include limited access to healthy food."}, {"id": "epi-demography-27", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "structured", "difficulty": "core", "q": "Distinguish endemic, epidemic and pandemic, and define a cluster.", "tags": ["endemic", "epidemic", "pandemic", "cluster", "contrast"], "points": ["Endemic - a stable pattern of a disease, consistently present within a particular region or population.", "Epidemic - an outbreak with a large number of occurrences of a disease, in excess of the normal expected level.", "Pandemic - an epidemic that has spread over several countries or continents, affecting an even larger number of people.", "Cluster - a group of cases situated in a place and time that are suspected to be greater than the expected number, even though that expected number may not be known."], "panic": true}, {"id": "epi-demography-28", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "Define a disease 'cluster'.", "tags": ["cluster", "definition"], "a": "A cluster is a group of cases situated in a place and time that are suspected to be greater than the expected number, even though the expected number may not be known."}, {"id": "epi-demography-29", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "Contrast communicable and non-communicable diseases.", "tags": ["communicable-disease", "non-communicable-disease", "contrast"], "a": "Communicable (infectious) diseases are caused by a pathogen that infects a susceptible host and can spread between hosts (e.g. measles, COVID-19). Non-communicable diseases (NCDs) are not spread by pathogens; they are typically chronic conditions linked to lifestyle and other determinants (e.g. diabetes, cardiovascular disease).", "panic": true}, {"id": "epi-demography-30", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "What commitment did New Zealand make to the UN in 2011 regarding non-communicable diseases?", "tags": ["non-communicable-disease", "policy", "new-zealand", "2011"], "a": "In 2011 New Zealand committed to the UN a range of prevention and treatment targets for Non-Communicable Diseases (NCDs)."}, {"id": "epi-demography-31", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "What global NCD target did the WHO agree on for 2025?", "tags": ["non-communicable-disease", "who", "target", "2025"], "a": "The WHO agreed a global action plan to reduce premature mortality related to non-communicable diseases (NCDs) by 25% by 2025."}, {"id": "epi-demography-32", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "structured", "difficulty": "detail", "q": "Identify the WHO global NCD reduction targets and their target values.", "tags": ["non-communicable-disease", "who", "targets"], "points": ["25% relative reduction in premature mortality from NCDs.", "10% relative reduction in the harmful use of alcohol, and 10% relative reduction in physical inactivity.", "30% relative reduction in salt/sodium intake, and 30% relative reduction in tobacco use.", "25% relative reduction in raised blood pressure.", "0% increase (halt the rise) in diabetes and obesity.", "50% coverage of drug therapy and counselling, and 80% coverage of essential medicines and technologies."]}, {"id": "epi-demography-33", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "What are the WHO relative reduction targets for tobacco use and salt/sodium intake?", "tags": ["non-communicable-disease", "who", "tobacco", "salt"], "a": "A 30% relative reduction in tobacco use and a 30% relative reduction in salt/sodium intake."}, {"id": "epi-demography-34", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "What is the WHO target for diabetes and obesity?", "tags": ["non-communicable-disease", "who", "diabetes", "obesity"], "a": "A 0% increase - i.e. to halt the rise in diabetes and obesity (no further increase)."}, {"id": "epi-demography-35", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "structured", "difficulty": "core", "q": "Identify and describe the four levels of prevention.", "tags": ["prevention", "levels", "framework"], "points": ["Primordial prevention - aims to prevent the emergence of risk factors themselves (e.g. advocating for healthy-environment policies).", "Primary prevention - aims to prevent the onset of disease before it occurs (e.g. immunisations, health education).", "Secondary prevention - aims to detect and treat disease early to halt or slow its progression (e.g. screening).", "Tertiary prevention - aims to reduce complications and improve quality of life for those with established disease (e.g. rehabilitation).", "Primary prevention can be directed at the whole population or at high-risk individuals."], "panic": true}, {"id": "epi-demography-36", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "What is the goal of primordial prevention, and give a nursing strategy.", "tags": ["prevention", "primordial"], "a": "Goal: to prevent the emergence of risk factors themselves. Nursing strategies include advocating for policies that promote healthy environments (e.g. smoke-free zones, walkable communities), educating communities about healthy social norms, and supporting initiatives that reduce socioeconomic disparities."}, {"id": "epi-demography-37", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "What is the goal of primary prevention, and give a nursing strategy.", "tags": ["prevention", "primary"], "a": "Goal: to prevent the onset of disease before it occurs. Nursing strategies include administering immunisations (e.g. flu shots, HPV vaccine), providing education on nutrition, exercise and smoking cessation, and conducting wellness checks and lifestyle counselling."}, {"id": "epi-demography-38", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "What is the goal of secondary prevention, and give a nursing strategy.", "tags": ["prevention", "secondary"], "a": "Goal: to detect and treat disease early to halt or slow progression. Nursing strategies include performing screenings (e.g. blood pressure, cholesterol, mammograms), monitoring at-risk patients (e.g. prediabetes) for early signs, and coordinating follow-up care after abnormal results."}, {"id": "epi-demography-39", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "core", "q": "What is the goal of tertiary prevention, and give a nursing strategy.", "tags": ["prevention", "tertiary"], "a": "Goal: to reduce complications and improve quality of life for those with established disease. Nursing strategies include managing chronic conditions (e.g. diabetes, heart failure) through medication adherence and lifestyle support, providing rehabilitation (e.g. post-stroke physiotherapy, cardiac rehab), and educating patients on self-care to prevent hospital readmissions."}, {"id": "epi-demography-40", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "At what two levels can primary prevention be targeted?", "tags": ["prevention", "primary", "population", "high-risk"], "a": "At the whole population level, and at high-risk individuals."}, {"id": "epi-demography-41", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "Which level of prevention involves screening (e.g. mammograms, blood pressure checks)?", "tags": ["prevention", "secondary", "screening"], "a": "Secondary prevention - screening detects disease early to halt or slow its progression."}, {"id": "epi-demography-42", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "Which level of prevention involves rehabilitation and managing established chronic disease?", "tags": ["prevention", "tertiary", "rehabilitation"], "a": "Tertiary prevention - it reduces complications and improves quality of life for those who already have established disease."}, {"id": "epi-demography-43", "topicSlug": "epi-demography", "topic": "Epidemiology & Demography", "type": "recall", "difficulty": "detail", "q": "Which level of prevention targets the underlying social/environmental risk factors before they even arise?", "tags": ["prevention", "primordial"], "a": "Primordial prevention - it aims to prevent the emergence of risk factors themselves through policy and social/environmental change."}, {"id": "health-illness-01", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "State the World Health Organisation (WHO, 1948) definition of health.", "tags": ["definitions", "WHO"], "a": "Health is a state of complete physical, mental and social well-being and not merely the absence of disease or infirmity.", "panic": true}, {"id": "health-illness-02", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "How did the 1986 Ottawa Charter for Health Promotion describe health?", "tags": ["definitions", "Ottawa-Charter", "WHO"], "a": "As 'a resource for everyday life, not the objective of living' - a positive concept emphasising social and personal resources as well as physical capacities. Health is something you draw on to live your life, not the end goal itself."}, {"id": "health-illness-03", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "How did Huber et al. (2011, British Medical Journal) redefine health?", "tags": ["definitions", "Huber"], "a": "As 'the ability to adapt and to self-manage in the face of social, physical, and emotional challenges.' It shifts the focus from a perfect state of being to a dynamic capacity - you are healthy because you can cope with what is wrong."}, {"id": "health-illness-04", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "How does Britannica (2026) define health?", "tags": ["definitions"], "a": "The extent of an individual's continuing physical, emotional, mental, and social ability to cope with his or her environment."}, {"id": "health-illness-05", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "What does 'wellness' describe, and between what two points does it place health on a continuum?", "tags": ["wellness", "continuum"], "a": "Wellness further describes health status. It places health on a continuum from one's optimal level ('wellness') to a maladaptive state ('illness').", "panic": true}, {"id": "health-illness-06", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "Who proposed the Illness-Wellness Continuum and in what year?", "tags": ["continuum", "Travis", "dates"], "a": "John W. Travis, in 1972."}, {"id": "health-illness-07", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "According to the Illness-Wellness Continuum, why is being free of disease not enough, and what level of health does mere absence of disease achieve?", "tags": ["continuum", "Travis"], "a": "Health is more than a physical state and must take account of emotional and mental wellbeing; it is not sufficient to consider someone well just because there is no disease or symptoms. If you are physically well but have not accounted for holistic aspects you will only achieve 'neutral' health on the continuum."}, {"id": "health-illness-08", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "core", "q": "Identify and explain the core principles of the Illness-Wellness Continuum.", "tags": ["continuum", "Travis", "principles"], "points": ["Health is multidimensional: it includes physical, emotional, mental, spiritual, and social aspects.", "Absence of disease does not equal wellness: not being sick does not mean someone is truly well.", "A holistic approach is essential: true wellness involves conscious choices toward a more fulfilling life.", "Movement matters: people can move toward wellness or illness depending on their lifestyle, mindset, and environment."]}, {"id": "health-illness-09", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "Using the hypertension example, contrast a patient who reaches 'neutral' health with one who reaches a higher level of wellbeing on the continuum.", "tags": ["continuum", "examples"], "a": "A patient with hypertension who takes medication but makes no lifestyle changes reaches only the 'neutral' state. A patient in the same position who also changes diet, exercises, quits smoking, and loses weight can achieve a higher level of wellbeing."}, {"id": "health-illness-10", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "How is health described as 'dynamic and multifaceted', and what does harmony between its dimensions produce?", "tags": ["definitions", "dimensions"], "a": "Health is a dynamic and multifaceted state of wellbeing reflecting the balance between an individual and their environment. It is not merely the absence of disease but a harmonious integration of physical, emotional, mental, spiritual, and social dimensions; harmony in these areas leads to a balanced, healthy lifestyle."}, {"id": "health-illness-11", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "core", "q": "Identify the Seven Dimensions of Wellness (Dr Bill Hettler, 1976).", "tags": ["dimensions", "Hettler", "wellness"], "points": ["Physical dimension.", "Social dimension.", "Emotional dimension.", "Intellectual dimension.", "Spiritual dimension.", "Occupational dimension.", "Environmental dimension (the seventh, later added)."]}, {"id": "health-illness-12", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "Who developed the dimensions of wellness model, in what year, and which dimension was added later?", "tags": ["dimensions", "Hettler", "dates"], "a": "Dr Bill Hettler, in 1976. The environmental dimension was added later, making seven dimensions in total. The dimensions cannot be considered in isolation as they are all interconnected."}, {"id": "health-illness-13", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "What does the Physical dimension of wellness encompass?", "tags": ["dimensions", "physical"], "a": "Healthy behaviours such as adequate exercise, proper nutrition, and abstaining from harmful habits (smoking, alcohol, illicit drugs). It also includes regular health checks, proper use of the medical system (health literacy), and protecting yourself from injury; this improves quality of life and adds years to it."}, {"id": "health-illness-14", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "What does the Social dimension of wellness refer to?", "tags": ["dimensions", "social"], "a": "A person's ability to form satisfying interpersonal relationships and interact effectively with others in their community. It includes support systems, social roles, cultural identity, community engagement, communication skills, intimacy, a support network of family and friends, and respect for self and others; it fosters a sense of belonging."}, {"id": "health-illness-15", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "What does the Emotional dimension of wellness involve?", "tags": ["dimensions", "emotional"], "a": "A person's ability to understand, express, and manage emotions such as joy, sadness, fear, anger, and stress. It influences coping, relationships, and decision-making, and includes optimism, self-esteem, self-acceptance, the ability to share feelings, and to love and be loved."}, {"id": "health-illness-16", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "What characterises the Intellectual dimension of wellness?", "tags": ["dimensions", "intellectual"], "a": "It encourages creative, stimulating mental activities. Our minds need to be exercised like our bodies; intellectually well people have active minds, continue to learn, use available resources to expand knowledge, and are engaged in current affairs."}, {"id": "health-illness-17", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "What characterises the Spiritual dimension of wellness?", "tags": ["dimensions", "spiritual"], "a": "A willingness to seek meaning and purpose in human existence and to question and appreciate things that cannot readily be explained. People derive meaning from areas such as music, art, religion, nature, and good deeds. Spirituality transcends the individual to create a common bond with humanity, and spiritually well people seek harmony between what lies within and outside forces."}, {"id": "health-illness-18", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "What characterises the Occupational dimension of wellness?", "tags": ["dimensions", "occupational"], "a": "Contributing unique skills and talents to work that is meaningful and rewarding, expressing values in activities personally rewarding and beneficial to the community. It means successfully integrating a commitment to your occupation with a satisfying and rewarding lifestyle."}, {"id": "health-illness-19", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "What characterises the Environmental dimension of wellness?", "tags": ["dimensions", "environmental"], "a": "Awareness of the unstable state of the earth and the effects of our actions on it, and maximising harmony through a lifestyle that minimises harm to the environment. Although some concerns are beyond our control, we can all promote a healthier earth by doing what we can."}, {"id": "health-illness-20", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "core", "q": "Identify the eight models of health presented in this teaching.", "tags": ["models", "overview"], "points": ["Biomedical model.", "Te Whare Tapa Whā model.", "Fonofale model.", "Biopsychosocial model.", "Self-actualising model.", "Epidemiological Triad.", "Health-Illness continuum.", "Social model of health."]}, {"id": "health-illness-21", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "core", "q": "Describe the key features of the Biomedical Model of health.", "tags": ["models", "biomedical"], "points": ["It is based on knowledge about biological and physical causes of illness.", "It relies on objective rather than subjective data.", "The focus is on diagnosis, treatment, and cure, often through medical interventions such as medication, surgery, or radiation.", "People are viewed as physiological systems.", "It largely excludes psychological, social, and environmental factors, viewing them as secondary or irrelevant to the disease process."], "panic": true}, {"id": "health-illness-22", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "How does the biomedical model shape the role of the nurse?", "tags": ["models", "biomedical", "nursing-role"], "a": "Nurses prioritise physical symptoms, clinical procedures, and technical skills; care is task-oriented (hygiene, medication administration, monitoring vital signs). The model supports a hierarchical, physician-led system with limited nurse autonomy, tends to view patients as cases or diagnoses (risking impersonal care), but aligns with evidence-based practice emphasising measurable outcomes and standardised procedures."}, {"id": "health-illness-23", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "core", "q": "Identify and describe the four dimensions (walls) of the Te Whare Tapa Whā model of health.", "tags": ["models", "te-whare-tapa-wha", "hauora-maori"], "points": ["Taha tinana (physical health): the body is the shelter that protects us from the external environment and must be cared for; for Māori, concepts of tapu may be central to understanding illness.", "Taha hinengaro (mental health): thoughts, feelings and behaviour, central to wellbeing; Durie (1998) describes it as the ability to communicate, think and feel.", "Taha wairua (spiritual health): the capacity for faith and wider communion, considered one of the most important aspects of wellness; a lack of spirituality can lead to imbalance and ill health.", "Taha whānau (family health): whānau is the primary support system physically, emotionally, spiritually and culturally, extending beyond the nuclear to the wider family.", "The strong foundation and four equal sides demonstrate holistic wellbeing; if there is imbalance in any wall the person becomes unwell."], "panic": true}, {"id": "health-illness-24", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "What do the strong foundation and four equal sides of Te Whare Tapa Whā represent, and what happens with imbalance?", "tags": ["models", "te-whare-tapa-wha", "hauora-maori"], "a": "They demonstrate holistic wellbeing; if there is an imbalance in any of the four sides the person becomes unwell. It is a holistic model of health in which wairua (spiritual), the role of whānau, and hinengaro (mind) are seen as equally important as physical health."}, {"id": "health-illness-25", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "According to Mason Durie (1998), what does Taha hinengaro emphasise about caring for Māori?", "tags": ["models", "te-whare-tapa-wha", "Durie", "hauora-maori"], "a": "Durie describes hinengaro as the ability to communicate, think and feel, and emphasises being holistic and focusing on the bigger picture rather than the individual while still maintaining the essence of the individual. Healthy thinking is linked to relationships, and communicating through emotion rather than words is significant - words are valued but expression is also important."}, {"id": "health-illness-26", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "detail", "q": "What does Durie (1998) emphasise about Taha whānau (family health)?", "tags": ["models", "te-whare-tapa-wha", "Durie", "hauora-maori"], "a": "Whānau is the primary support system physically, emotionally, spiritually and culturally, extending beyond the nuclear family to the wider family, with defined roles and responsibilities and a duty to care for older members. Durie emphasises interdependence rather than independence, and family involvement during illness must be acknowledged and incorporated in care."}, {"id": "health-illness-27", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "recall", "difficulty": "core", "q": "Who created the Fonofale model, and which Pacific peoples' values and beliefs does it incorporate?", "tags": ["models", "fonofale", "pacific"], "a": "It was created by Fuimaono Karl Pulotu-Endemann as a Pacific Island model of health for use in the New Zealand context. It incorporates the values and beliefs of many Samoans, Cook Islanders, Tongans, Niueans, Tokelauans and Fijians."}, {"id": "health-illness-28", "topicSlug": "health-illness", "topic": "Health, Illness, Globalisation, Poverty & Determinants", "type": "structured", "difficulty": "core", "q": "Describe the structure of the Fonofale model, identifying the foundation, roof, four pou, and capsule.", "tags": ["models", "fonofale", "pacific"], "points": ["The foundation/floor is family - the foundation within all Pacific cultures, incorporating nuclear and extended family and those bound by kinship, and tying people through history and genealogy to land, titles, sea and the gods of the Pacific.", "The roof is culture - the cultural values and beli
