 accreditation standards must clinical documentation meet, and where are these expressed?", "tags": ["standards", "ministry-of-health"], "a": "It must meet the Ministry of Health accreditation standards, which are expressed in the procedures, policies and guidelines of each clinical setting."}, {"id": "power-note-17", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "If care is not documented and the notes are presented in a Court of Law, how is that care treated?", "tags": ["legal", "standards", "core"], "a": "It is considered not done, regardless of what you claim to have done verbally."}, {"id": "power-note-18", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Accurate documentation protects whom?", "tags": ["purpose", "legal"], "a": "It not only protects patients but also protects you as a nurse."}, {"id": "power-note-19", "topicSlug": "power-note", "topic": "Documentation", "type": "structured", "difficulty": "core", "q": "State the first set of NZNO (2017) guidelines for how documentation should be written (factual through alterations).", "tags": ["nzno", "guidelines", "core"], "points": ["Be factual, objective, consistent and accurate.", "Be written as soon as possible after an event, providing current information on the care and condition of the patient (including standard and out-of-the-ordinary care).", "Be written clearly and in a way that the text cannot be erased.", "Be written so any alterations or additions are dated, timed and signed, and the original entry can still be read clearly."]}, {"id": "power-note-20", "topicSlug": "power-note", "topic": "Documentation", "type": "structured", "difficulty": "core", "q": "State the NZNO (2017) guidelines relating to signing, legibility, identifiers and client involvement.", "tags": ["nzno", "guidelines", "core"], "points": ["Be accurately dated, timed and signed, with the signature printed alongside the first entry.", "Avoid abbreviations, jargon, meaningless phrases, irrelevant speculation and offensive subjective statements.", "Be readable on any photocopies - ideally written in black ink.", "Have a unique identifier on both sides of every page (NHI, date of birth).", "Be written, wherever possible, with the involvement of the patient/client or their carer.", "Be written in terms that the patient/client can understand."]}, {"id": "power-note-21", "topicSlug": "power-note", "topic": "Documentation", "type": "structured", "difficulty": "core", "q": "State the NZNO (2017) guidelines about page order, recording problems, evidence of care and cross-referencing.", "tags": ["nzno", "guidelines", "core"], "points": ["Be consecutive - numbering pages can be of assistance.", "Identify problems that have arisen and the action taken to rectify them.", "Provide clear evidence of the care planned, the decisions made, the care delivered and the information shared, with rationale for the nursing action and/or inaction.", "Cross-reference vital observations, fluid balance charts etc. rather than repeating information already available in the client's/patient's notes."]}, {"id": "power-note-22", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "According to NZNO (2017), what colour ink is ideal for documentation, and why?", "tags": ["nzno", "guidelines"], "a": "Ideally black ink, so that entries are readable on any photocopies."}, {"id": "power-note-23", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "According to NZNO (2017), what unique identifiers should appear on both sides of every page?", "tags": ["nzno", "identifiers"], "a": "A unique identifier such as the NHI (National Health Index) number and date of birth."}, {"id": "power-note-24", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "How should alterations or additions in the notes be handled according to NZNO (2017)?", "tags": ["error-correction", "nzno", "core"], "a": "Alterations or additions must be dated, timed and signed so the original entry can still be read clearly; the text must be written so it cannot be erased."}, {"id": "power-note-25", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "According to NZNO (2017), what should be done instead of repeating information such as vital observations or fluid balance already in the notes?", "tags": ["nzno", "guidelines"], "a": "Cross-reference the relevant charts (vital observations, fluid balance charts etc.) rather than repeating the information."}, {"id": "power-note-26", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "What is the purpose of communication tools such as ISBARR and SOAPIE(R)?", "tags": ["communication-tools", "purpose"], "a": "They underpin professional practice and ensure accuracy and accountability."}, {"id": "power-note-27", "topicSlug": "power-note", "topic": "Documentation", "type": "structured", "difficulty": "core", "q": "Identify what each letter of the ISBARR communication tool stands for.", "tags": ["isbarr", "communication-tools", "core"], "points": ["I - Identify (who you are, your role, where you are, why you are calling, confirm who you are talking to, confirm attention).", "S - Situation (what is going on with the patient, e.g. chest pain, nausea, shortness of breath).", "B - Background (medical history, presenting complaint).", "A - Assessment (vital signs, clinical impression and severity of the complaint).", "R - Recommendations (advised interventions and timing of these).", "R - Review (of interventions)."], "panic": true}, {"id": "power-note-28", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "In ISBARR, what does the first 'I' (Identify) require you to state?", "tags": ["isbarr", "communication-tools"], "a": "Who you are, your role, where you are, why you are calling, confirmation of who you are talking to, and confirmation of their attention."}, {"id": "power-note-29", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "In ISBARR, what belongs under 'Assessment'?", "tags": ["isbarr", "communication-tools"], "a": "Vital signs, clinical impression, and the severity of the patient's complaint."}, {"id": "power-note-30", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "In ISBARR, what do the two R's stand for?", "tags": ["isbarr", "communication-tools"], "a": "The first R is Recommendations (advised interventions and their timing); the second R is Review (of the interventions)."}, {"id": "power-note-31", "topicSlug": "power-note", "topic": "Documentation", "type": "structured", "difficulty": "core", "q": "Identify what each letter of the SOAPIE(R) documentation format stands for and what it captures.", "tags": ["soapie", "communication-tools", "core"], "points": ["S - Subjective data: how does the patient feel.", "O - Objective data: what are your assessment findings.", "A - Assessment: what is the patient's status.", "P - Plan: current plan, or is a change needed.", "I - Implementation: what occurred and what action was taken.", "E - Evaluation: what was the outcome following the intervention.", "R - Revision: care planning changes."], "panic": true}, {"id": "power-note-32", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Contrast 'Subjective' and 'Objective' data in SOAPIE documentation.", "tags": ["soapie", "contrast", "core"], "a": "Subjective data is how the patient feels (their own report); objective data is your assessment findings (measurable/observable)."}, {"id": "power-note-33", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "In SOAPIE, what does 'Implementation' capture?", "tags": ["soapie", "communication-tools"], "a": "What occurred and what action was taken."}, {"id": "power-note-34", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "In SOAPIE, what does 'Evaluation' capture?", "tags": ["soapie", "communication-tools"], "a": "What was the outcome following the intervention."}, {"id": "power-note-35", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "What does the additional 'R' in SOAPIE(R) stand for?", "tags": ["soapie", "communication-tools"], "a": "Revision - care planning changes."}, {"id": "power-note-36", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "Before using an abbreviation in documentation, what must you consider?", "tags": ["abbreviations", "core"], "a": "Whether it is appropriate to use abbreviations and which abbreviations are appropriate - you must be confident that everyone will understand exactly what you meant."}, {"id": "power-note-37", "topicSlug": "power-note", "topic": "Documentation", "type": "structured", "difficulty": "core", "q": "Identify the meaning of the time abbreviations 1/12, 1/52, 1/7 and Q4H.", "tags": ["abbreviations", "core"], "points": ["1/12 - one month.", "1/52 - one week.", "1/7 - one day.", "Q4H - every four hours."]}, {"id": "power-note-38", "topicSlug": "power-note", "topic": "Documentation", "type": "structured", "difficulty": "core", "q": "Identify the meaning of these clinical abbreviations: ADL, BP, #NOF, MI, AF.", "tags": ["abbreviations", "core"], "points": ["ADL - activity of daily living.", "BP - blood pressure.", "#NOF - fractured neck of femur.", "MI - myocardial infarction.", "AF - atrial fibrillation."], "panic": true}, {"id": "power-note-39", "topicSlug": "power-note", "topic": "Documentation", "type": "structured", "difficulty": "core", "q": "Identify the meaning of these abbreviations: AED, NBM, GA, PT, UTI.", "tags": ["abbreviations", "core"], "points": ["AED - automated electronic defibrillator.", "NBM - nil by mouth.", "GA - general anaesthetic.", "PT - physiotherapy.", "UTI - urinary tract infection."]}, {"id": "power-note-40", "topicSlug": "power-note", "topic": "Documentation", "type": "structured", "difficulty": "core", "q": "Identify the meaning of these abbreviations: IM, IDC, BSL, OT, HX.", "tags": ["abbreviations", "core"], "points": ["IM - intramuscular.", "IDC - indwelling catheter.", "BSL - blood sugar level.", "OT - occupational therapy.", "HX - history."]}, {"id": "power-note-41", "topicSlug": "power-note", "topic": "Documentation", "type": "structured", "difficulty": "core", "q": "Identify the meaning of these abbreviations: BNO, AKA.", "tags": ["abbreviations"], "points": ["BNO - bowels not opened.", "AKA - above knee amputation."]}, {"id": "power-note-42", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "What does the abbreviation '#NOF' mean?", "tags": ["abbreviations"], "a": "Fractured neck of femur."}, {"id": "power-note-43", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "What does the abbreviation 'BNO' mean?", "tags": ["abbreviations"], "a": "Bowels not opened."}, {"id": "power-note-44", "topicSlug": "power-note", "topic": "Documentation", "type": "structured", "difficulty": "core", "q": "Identify six of the most common documentation errors nurses make.", "tags": ["errors", "common-errors", "core"], "points": ["Not dated, timed and signed.", "Not documenting nursing interventions.", "Not documenting medication administered.", "Illegible handwriting.", "Leaving large spaces between documentation.", "Documenting part of a note and not completing it."], "panic": true}, {"id": "power-note-45", "topicSlug": "power-note", "topic": "Documentation", "type": "recall", "difficulty": "detail", "q": "What real consequence can poor or careless documentation have?", "tags": ["errors", "consequences"], "a": "Documentation errors can have serious consequences for both the patient and the nurse."}, {"id": "grief-loss-01", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "According to the lecture, why is death described as inevitable yet an individual and cultural experience?", "tags": ["death-and-dying", "concepts"], "a": "Death is inevitable, but the realisation of death affects people in different ways: some face death calmly and with careful preparation, while others resist the thought of death and dying. Death also means different things to different cultures."}, {"id": "grief-loss-02", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "Who created the model known as the 'Stages of grief' or 'Stages of dying'?", "tags": ["kubler-ross", "grief-theory"], "a": "Dr Elizabeth Kubler-Ross created the model, which is sometimes called the Stages of grief or the Stages of dying.", "panic": true}, {"id": "grief-loss-03", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "structured", "difficulty": "core", "q": "List the five stages of grief/dying in Kubler-Ross's model, in order.", "tags": ["kubler-ross", "grief-theory", "core-list"], "points": ["Denial (or shock) - the person refuses to accept, or cannot take in, the reality of the loss or diagnosis.", "Anger - the person feels frustration, resentment or rage about the loss.", "Bargaining - the person tries to negotiate or make deals (e.g. with a higher power) to delay or avoid the loss.", "Depression - the person experiences sadness, withdrawal and mourning as the reality sets in.", "Acceptance - the person comes to terms with the loss or impending death."], "panic": true}, {"id": "grief-loss-04", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "In Kubler-Ross's model, what characterises the FIRST stage?", "tags": ["kubler-ross", "grief-theory"], "a": "The first stage is denial or shock, in which the person refuses to accept, or cannot yet take in, the reality of the loss or terminal diagnosis."}, {"id": "grief-loss-05", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "In Kubler-Ross's model, what is the 'bargaining' stage?", "tags": ["kubler-ross", "grief-theory"], "a": "Bargaining is the stage in which the person attempts to negotiate or make deals (often with a higher power) in the hope of delaying, avoiding or reversing the loss or death."}, {"id": "grief-loss-06", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "In Kubler-Ross's model, what is the FINAL stage and what does it mean?", "tags": ["kubler-ross", "grief-theory"], "a": "The final stage is acceptance, in which the person comes to terms with the loss or their impending death."}, {"id": "grief-loss-07", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "structured", "difficulty": "core", "q": "List the emotional and spiritual changes that may be seen as a person begins to die.", "tags": ["dying-process", "emotional-spiritual", "core-list"], "points": ["Withdrawal from things they usually like to do.", "Visions or hallucinations.", "Confusing statements and reminiscence (talking about the past).", "Restlessness and agitation.", "A wish to make amends or to discuss/resolve the past."]}, {"id": "grief-loss-08", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "structured", "difficulty": "core", "q": "List the physical changes that occur as a person is dying.", "tags": ["dying-process", "physical-changes", "core-list"], "points": ["The person feels tired/fatigued and eventually loses the ability to swallow.", "Yawning occurs as the body tries to obtain more oxygen.", "Limbs begin to cool down (e.g. cold hands and feet).", "Urine becomes concentrated or stops, and the person loses control of bladder and bowel.", "Purple bruise-like marks appear on the skin as blood pools/coagulates when circulation fails.", "Breathing pattern changes (including gurgling), the person becomes agitated/restless, and ultimately becomes unconscious."]}, {"id": "grief-loss-09", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "As a person is dying, why do they yawn, and why do purple bruise-like marks appear on the skin?", "tags": ["dying-process", "physical-changes"], "a": "Yawning occurs because the body is trying to obtain more oxygen. The purple bruise-like marks are the blood pooling or coagulating as the body shuts down and circulation becomes ineffective."}, {"id": "grief-loss-10", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "structured", "difficulty": "core", "q": "List what happens to the body at the very end of life (the moment of death).", "tags": ["dying-process", "death", "core-list"], "points": ["The breathing pattern changes again, with several outward short breaths as the heart and lungs stop.", "Breathing may stop and then there may be a final breath.", "The heart stops.", "Skin tone changes and the person may look as though they are at peace.", "Sometimes the eyes are open and the jaw may drop.", "Rigor mortis may occur around 2 hours after death."]}, {"id": "grief-loss-11", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "Approximately how long after death may rigor mortis occur?", "tags": ["death", "rigor-mortis"], "a": "Rigor mortis may occur around 2 hours after death."}, {"id": "grief-loss-12", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "Who must certify a person's death, and what is the nurse's role in this?", "tags": ["certification", "death", "legal"], "a": "When a person passes away their death must be certified by a medical practitioner (doctor). The nurse must ensure the death certificate is completed by the doctor."}, {"id": "grief-loss-13", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "structured", "difficulty": "core", "q": "List the nursing responsibilities after a patient's expected death.", "tags": ["care-of-the-dying", "after-death-care", "nursing-role", "core-list"], "points": ["Ensure the death certificate is completed by the doctor.", "Recognise that some public hospitals have a bereavement team who will wash and dress the body.", "Ask the family about the person's wishes.", "Ask the family if they would like to help wash and dress their loved one, and support/guide them if they wish to take part.", "Ensure the family has identified a funeral director, then call the funeral director once the person is ready.", "In a public hospital, call an orderly to take the person to the mortuary."]}, {"id": "grief-loss-14", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "structured", "difficulty": "core", "q": "List the correct actions when a death is unexpected or unexplained.", "tags": ["unexpected-death", "coroner", "legal", "core-list"], "points": ["Recognise there may be grounds for a coroner's inquest, especially if the person recently had a surgical procedure.", "Remove nothing from the body (e.g. IV lines and drains must be left in place).", "Understand the police may be called in to handle the removal of the body.", "Recognise there may be an autopsy (post-mortem examination)."]}, {"id": "grief-loss-15", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "If a death is unexpected or unexplained, why must nothing be removed from the body?", "tags": ["unexpected-death", "coroner", "legal"], "a": "Because there may be grounds for a coroner's inquest and possibly an autopsy; IV lines, drains and other items must be left in place, and the police may be involved in removing the body."}, {"id": "grief-loss-16", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "Contrast an expected death with an unexpected/unexplained death in terms of what happens to the body and who is involved.", "tags": ["expected-vs-unexpected", "coroner", "contrast", "core"], "a": "In an expected death the doctor completes the death certificate, the body can be washed/dressed (often with family or a bereavement team) and released to a funeral director. In an unexpected or unexplained death nothing may be removed from the body (IV lines and drains stay in), the police may be involved, and there may be a coroner's inquest and possibly an autopsy.", "panic": true}, {"id": "grief-loss-17", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "From what Latin word does 'palliative' derive, and what does it mean?", "tags": ["palliative-care", "definitions"], "a": "Palliative comes from the Latin word 'pallium', meaning cloak.", "panic": true}, {"id": "grief-loss-18", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "Define palliative care (MoH, 2001).", "tags": ["palliative-care", "definitions", "core"], "a": "Palliative care is the care of people who are dying from active, progressive diseases or other conditions that are not responsive to curative treatment (MoH, 2001).", "panic": true}, {"id": "grief-loss-19", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "structured", "difficulty": "core", "q": "Explain the aims and scope of palliative care.", "tags": ["palliative-care", "core-list"], "points": ["It cares for people dying from active, progressive diseases or conditions not responsive to curative treatment (MoH, 2001).", "It embraces the holistic elements of wellbeing.", "It enhances the person's quality of life.", "It also supports the bereaved whanau/family, not only the dying person.", "The word derives from the Latin 'pallium' (cloak), reflecting comfort and covering rather than cure."]}, {"id": "grief-loss-20", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "Beyond the dying person, who else does palliative care support?", "tags": ["palliative-care", "bereavement", "family-support"], "a": "Palliative care also supports the bereaved whanau/family."}, {"id": "grief-loss-21", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "What is the name of the New Zealand Act that legalised assisted dying, and in what year was it passed?", "tags": ["end-of-life-choice-act", "legal", "core"], "a": "The End of Life Choice Act 2019, which regulates assisted dying in New Zealand.", "panic": true}, {"id": "grief-loss-22", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "structured", "difficulty": "core", "q": "Outline the legislative journey of the End of Life Choice Act, from its introduction through the referendum to becoming law.", "tags": ["end-of-life-choice-act", "legal", "dates", "core-list"], "points": ["Entered as a private member's bill on 14 October 2015.", "Passed its first reading on 13 December 2017 (76 in favour, 44 opposed).", "Passed its second reading on 26 June 2019 (70 in favour, 50 opposed).", "Passed its third reading on 13 November 2019 (69 in favour, 51 opposed).", "A binding referendum was held with the 17 October 2020 general election; final results (06 November 2020) were 82% turnout, YES 65.1% and NO 33.7%.", "It became law on 7 November 2021."]}, {"id": "grief-loss-23", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "When did the End of Life Choice Act become law, and how was public support decided?", "tags": ["end-of-life-choice-act", "legal", "dates", "referendum"], "a": "It became law on 7 November 2021, following a binding referendum held with the 17 October 2020 general election in which 65.1% voted YES and 33.7% voted NO (82% turnout)."}, {"id": "grief-loss-24", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "Who confirms a person's eligibility for assisted dying under the End of Life Choice Act?", "tags": ["end-of-life-choice-act", "assisted-dying", "eligibility"], "a": "Anyone may request assisted dying, but a person may receive it only if an attending medical practitioner AND an independent medical practitioner confirm the person meets all of the eligibility criteria."}, {"id": "grief-loss-25", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "structured", "difficulty": "core", "q": "List the eligibility criteria a person must meet to receive assisted dying under the End of Life Choice Act 2019.", "tags": ["end-of-life-choice-act", "assisted-dying", "eligibility", "core-list"], "points": ["Be a citizen or permanent resident of New Zealand.", "Be aged 18 years or over.", "Suffer from a terminal illness that is likely to end their life within 6 months.", "Be in an advanced state of irreversible decline in physical capability.", "Experience unbearable suffering that cannot be relieved in a manner they consider tolerable.", "Be able to make an informed decision about assisted dying."], "panic": true}, {"id": "grief-loss-26", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "Under the End of Life Choice Act, what is the minimum age, residency, and terminal-illness timeframe for eligibility?", "tags": ["end-of-life-choice-act", "assisted-dying", "eligibility"], "a": "The person must be aged 18 years or over, be a citizen or permanent resident of New Zealand, and suffer from a terminal illness likely to end their life within 6 months."}, {"id": "grief-loss-27", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "structured", "difficulty": "core", "q": "Explain the provisions for conscientious objection under the End of Life Choice Act.", "tags": ["end-of-life-choice-act", "conscientious-objection", "scenz", "core-list"], "points": ["No health practitioner has to engage with assisted dying if they have a conscientious objection.", "A practitioner with a conscientious objection must inform the patient of that objection.", "They must tell the patient of their right to ask the SCENZ group for a replacement practitioner.", "SCENZ stands for Support and Consultation for End of Life in New Zealand.", "SCENZ provides the name and contact details of a replacement medical practitioner."]}, {"id": "grief-loss-28", "topicSlug": "grief-loss", "topic": "Grief, Loss, Death & Dying", "type": "recall", "difficulty": "detail", "q": "What does the acronym SCENZ stand for, and what is its role?", "tags": ["end-of-life-choice-act", "scenz", "conscientious-objection"], "a": "SCENZ is the Support and Consultation for End of Life in New Zealand group. It provides the name and contact details of a replacement medical practitioner when a practitioner has a conscientious objection to assisted dying.", "panic": true}, {"id": "exam-synthesis-01", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "What is the full title and paper code of the exam this revision covers?", "tags": ["exam-structure"], "a": "Bachelor of Nursing paper 722.553, Foundations of Nursing, Final Examination."}, {"id": "exam-synthesis-02", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "How is the Foundations of Nursing final exam divided into sections, and what is each worth?", "tags": ["exam-structure"], "a": "Section A is 42 multiple-choice questions (1 mark each = 42 marks); Section B is 14 extended short-answer questions (5 marks each = 70 marks).", "panic": true}, {"id": "exam-synthesis-03", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "What is the total number of questions and total possible marks for the Foundations of Nursing final exam?", "tags": ["exam-structure"], "a": "56 questions in total (42 MCQ + 14 extended answers), worth 112 marks in total (42 marks from Section A + 70 marks from Section B)."}, {"id": "exam-synthesis-04", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "detail", "q": "How much time is allowed for the Foundations of Nursing final exam, and how is it delivered?", "tags": ["exam-structure"], "a": "2 hours plus 10 minutes reading time (130 minutes total). It is invigilated on campus via CANVAS with the MIT examination team."}, {"id": "exam-synthesis-05", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "detail", "q": "What proportion of the semester grade does the Foundations of Nursing final exam contribute?", "tags": ["exam-structure"], "a": "The final exam counts for 40% of the total grade for the semester."}, {"id": "exam-synthesis-06", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "In an exam short-answer question, what does the command word 'Identify' require you to do?", "tags": ["command-words"], "a": "'Identify' means simply to name the thing(s) asked for, without further detail."}, {"id": "exam-synthesis-07", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "What do the command words 'Describe' and 'Explain' require compared with 'Identify'?", "tags": ["command-words"], "a": "'Describe' and 'Explain' require detail (a fuller account), whereas 'Identify' only requires you to name the item."}, {"id": "exam-synthesis-08", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "detail", "q": "Why will a single sentence never earn full marks on a 5-mark short-answer question?", "tags": ["command-words", "exam-structure"], "a": "A 5-mark question is worth five discrete marking points, so the answer must contain enough distinct content (roughly one point per mark) to warrant all five marks; one sentence cannot cover five points."}, {"id": "exam-synthesis-09", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "structured", "difficulty": "core", "q": "Identify the topics listed for the Foundations of Nursing exam. (5 marks)", "tags": ["exam-structure", "blueprint"], "points": ["History of nursing; Culture and diversity; Cultural safety.", "Intersectorial collaboration; Caring; Power and empowerment.", "Globalisation; Impairment and disability; Epidemiology and demography.", "Ethical and legal frameworks; Documentation; Grief and loss.", "Hauora Maori; Poverty; Healthcare in New Zealand; Health and illness; Primary care."]}, {"id": "exam-synthesis-10", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "structured", "difficulty": "core", "q": "Discuss the meaning of spirituality in nursing practice and how it influences patient care. (5 marks)", "tags": ["spirituality", "model-answer", "caring"], "points": ["Definition: spirituality is about meaning, purpose, beliefs, and values in life (one definition identified by NZ nurses).", "Expression through relationships: it can be expressed through relationships with people, the environment, heritage, and the transcendent.", "Spiritual pain example: a patient feeling hopelessness or unresolved guilt is an example of spiritual pain.", "Nursing support: nurses can support by being present, listening, and referring to spiritual care experts if needed.", "Self-awareness: awareness of one's own spirituality helps nurses avoid imposing personal beliefs and ensures culturally safe care."]}, {"id": "exam-synthesis-11", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "According to NZ nurses, what is one definition of spirituality?", "tags": ["spirituality"], "a": "Spirituality is about meaning, purpose, beliefs, and values in life."}, {"id": "exam-synthesis-12", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "Through what relationships can spirituality be expressed?", "tags": ["spirituality"], "a": "Through relationships with people, the environment, heritage, and the transcendent."}, {"id": "exam-synthesis-13", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "Give one example of 'spiritual pain' that may affect a patient.", "tags": ["spirituality"], "a": "A patient feeling hopelessness or unresolved guilt."}, {"id": "exam-synthesis-14", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "How can nurses support patients experiencing spiritual pain?", "tags": ["spirituality"], "a": "By being present, listening, and referring to spiritual care experts if needed."}, {"id": "exam-synthesis-15", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "Why is awareness of one's own spirituality important for nurses?", "tags": ["spirituality", "cultural-safety"], "a": "It helps nurses avoid imposing personal beliefs on patients and ensures culturally safe care."}, {"id": "exam-synthesis-16", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "detail", "q": "Which expressions of care are listed under holistic care, and where does 'spiritual' fit?", "tags": ["spirituality", "holistic-care", "caring"], "a": "The listed expressions of care are spiritual, presence, touch, knowing, and listening; 'spiritual' is one of these expressions of holistic care."}, {"id": "exam-synthesis-17", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "What is culture, in terms of what it gives communities?", "tags": ["culture-diversity"], "a": "Culture gives communities a common framework of meaning: it shapes how we communicate, make decisions and structure families, and expresses our values (about land, time, work, play, good/evil, reward/punishment) through language, symbols and customs, as a collective heritage handed down generations."}, {"id": "exam-synthesis-18", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "detail", "q": "What are the two components of culture?", "tags": ["culture-diversity"], "a": "Material and non-material components."}, {"id": "exam-synthesis-19", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "detail", "q": "What does the 'iceberg concept of culture' illustrate?", "tags": ["culture-diversity"], "a": "That what we see is only a small aspect of culture, with much of it hidden beneath the surface."}, {"id": "exam-synthesis-20", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "Contrast norms and mores.", "tags": ["culture-diversity", "contrast"], "a": "Norms are shared rules and guidelines; mores are major rules of conduct that are morally significant and can be areas of contention between cultures."}, {"id": "exam-synthesis-21", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "detail", "q": "What does it mean that culture is 'learned' and 'dynamic'?", "tags": ["culture-diversity"], "a": "Culture is learned through interaction, expression and involvement, and it is dynamic (it changes over time rather than being fixed)."}, {"id": "exam-synthesis-22", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "What is cultural safety fundamentally about (and not about)?", "tags": ["cultural-safety"], "a": "It is about not pushing one's own beliefs onto others and being respectful of individual beliefs, values and customs; it is not about treating everyone the same, but caring in accordance with individuals' needs."}, {"id": "exam-synthesis-23", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "What is power, and what forms can it take?", "tags": ["power-empowerment"], "a": "Power is the ability to exert control over another; it can be domination but can also be positive, expressed as power to, power with, and power within.", "panic": true}, {"id": "exam-synthesis-24", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "structured", "difficulty": "detail", "q": "Describe the three levels of power in the family. (5 marks)", "tags": ["power-empowerment"], "points": ["Public power: visible power in employment and public life.", "Private power: power within family, friends and relationships.", "Intimate power: relates to self-esteem.", "These levels move from the most visible/public sphere through to the most personal/internal sphere.", "Nurses should recognise how power operates at each level when it affects a patient."]}, {"id": "exam-synthesis-25", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "structured", "difficulty": "detail", "q": "Describe the three types of power in practice (visible, hidden, invisible). (5 marks)", "tags": ["power-empowerment"], "points": ["Visible power: observable power with clear winners and losers.", "Hidden power: biases, exclusion, and agendas operating behind the scenes.", "Invisible power: social conditioning and ideology that influence people's needs.", "Power in practice can also be political, economical and social.", "Recognising these forms helps nurses understand how power affects patients and how they can help."]}, {"id": "exam-synthesis-26", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "What three areas does empowerment focus on for patients?", "tags": ["power-empowerment"], "a": "Health literacy, health-promoting decision making, and self-management of chronic illness."}, {"id": "exam-synthesis-27", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "detail", "q": "What are the qualities of effective empowerment?", "tags": ["power-empowerment"], "a": "Being engaged, knowledgeable, collaborative, committed, and tolerant of uncertainty, so the person is active and self-determining rather than a passive recipient."}, {"id": "exam-synthesis-28", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "What is globalisation, as defined in the source?", "tags": ["globalisation"], "a": "The integration of the world economy over the past ~25 years, involving easier travel and communication, mixing of customs and cultures, technological advances, and integration of national economies (removal of barriers to international trade and finance, i.e. 'liberalisation' or 'openness')."}, {"id": "exam-synthesis-29", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "structured", "difficulty": "detail", "q": "Identify factors of globalisation that may affect health. (5 marks)", "tags": ["globalisation"], "points": ["Economic growth, reflecting the link between 'health and wealth'.", "Environmental degradation (e.g. air and water pollution) and workplace hazards.", "Improved access to knowledge and technology.", "Marketing of harmful products and unhealthy behaviours.", "Conflict and security issues, and migration.", "Cross-border transmission of disease."]}, {"id": "exam-synthesis-30", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "core", "q": "Contrast the medical model and the social model of disability.", "tags": ["disability", "contrast"], "a": "The medical model focuses on the impairment, treats disabled people as passive receivers of services, emphasises dependence, has decisions made by professionals, expects the person to adapt to the world as it is, and carries pity/fear/patronising attitudes. The social model recognises that people have impairments that hinder their abilities but have the same wants, needs and aspirations, and focuses on the physical and societal barriers that impair ability.", "panic": true}, {"id": "exam-synthesis-31", "topicSlug": "exam-synthesis", "topic": "Exam Blueprint, History of Nursing & Model 5-Mark Answers", "type": "recall", "difficulty": "detail", "q": "How does society contribute to disability, according to the sourc /* ============================================================

   ============================================================ */
const LS_KEY = "bn1_722553_recall_v1";
const MASTER_BOX = 3;               // box>=3 => mastered
const REQUEUE = {miss:3, hard:6, learn:12}; // ticks until a card returns
let save = load();
function load(){
  try{ const s=JSON.parse(localStorage.getItem(LS_KEY)); if(s&&s.p) return s; }catch(e){}
  return { p:{}, mode:"smart", topics:null, theme:"dark", started:Date.now?0:0 };
}
function persist(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(save)); }catch(e){} }

// runtime
let tick=0, cur=null, revealed=false, recalledPts=new Set();
const rt = {}; // id -> {box,seen,correct,due}

// init per-card runtime from saved progress
CARDS.forEach((c,i)=>{
  const sp = save.p[c.id] || {};
  rt[c.id] = {
    box: sp.box || 1,
    seen: sp.seen || 0,
    correct: sp.correct || 0,
    due: (sp.box? (sp.box-1)*0.5 : 0) + i*0.001   // stable interleave order
  };
});
if(!save.topics){ save.topics = BUILD.topics.map(t=>t.slug); }

const PANIC_CARDS = CARDS.filter(c=>c.panic);
const PANIC_N = PANIC_CARDS.length;

/* ============================================================
   FILTERING / SELECTION
   ============================================================ */
function inScope(c){ return save.topics.includes(c.topicSlug); }
function modeMatch(c){
  const st = rt[c.id];
  if(save.mode==="core") return c.difficulty==="core";
  if(save.mode==="fivemark") return c.type==="structured";
  if(save.mode==="weak") return st.seen>0 && st.box<MASTER_BOX;
  return true; // smart
}
function activePool(){
  if(save.mode==="panic"){ return PANIC_CARDS.length? PANIC_CARDS : CARDS.filter(c=>c.difficulty==="core"); }
  return CARDS.filter(c=> inScope(c) && modeMatch(c));
}
function isMastered(c){ return rt[c.id].box>=MASTER_BOX; }

function pickNext(){
  const pool = activePool().filter(c=> !isMastered(c));
  if(!pool.length) return null;
  // due cards first (smallest due). New cards (seen 0) have small due already.
  pool.sort((a,b)=> rt[a.id].due - rt[b.id].due);
  // interleave: avoid repeating same topic back-to-back if possible
  if(cur && pool.length>1 && pool[0].topicSlug===cur.topicSlug){
    const alt = pool.find(c=>c.topicSlug!==cur.topicSlug && rt[c.id].due<=rt[pool[0].id].due+4);
    if(alt) return alt;
  }
  return pool[0];
}

/* ============================================================
   GRADING
   ============================================================ */
function grade(g){ // g: 1 miss, 2 hard, 3 got it
  if(!cur) return;
  const st = rt[cur.id];
  st.seen++;
  if(g===3){ st.correct++; st.box = Math.min(MASTER_BOX, st.box+1); st.due = tick + REQUEUE.learn; }
  else if(g===2){ st.box = Math.max(1, st.box); st.due = tick + REQUEUE.hard; }
  else { st.box = 1; st.due = tick + REQUEUE.miss; }
  save.p[cur.id] = {box:st.box, seen:st.seen, correct:st.correct};
  persist();
  tick++;
  next();
}

const stage = document.getElementById('stage');
function next(){ revealed=false; recalledPts.clear(); cur=pickNext(); render(); updateProgress(); }

  if(c.type==="structured"){
    const n=(c.points||[]).length;

      h += '<ul class="points">';
      (c.points||[]).forEach((p,i)=>{

      h += '<div class="recall-hint">You marked <b id="ptCount">'+recalledPts.size+'</b> / '+n+' recalled.</div>';
    } else {

    }
    h += '</div>';
    h += '<div class="actions"><div class="grades">'+
         '<button class="grade g1" data-g="1"><b>Missed</b><small>see soon</small><span class="gk">1</span></button>'+
         '<button class="grade g2" data-g="2"><b>Hard</b><small>again later</small><span class="gk">2</span></button>'+
         '<button class="grade g3" data-g="3"><b>Got it</b><small>'+(st.box>=2?'master':'promote')+'</small><span class="gk">3</span></button>'+
         '</div></div>';
  }
  h += '</div>';
  stage.innerHTML=h;

  if(!revealed){
    document.getElementById('revealBtn').onclick=doReveal;
  } else {
    stage.querySelectorAll('.points li').forEach(li=>{
      li.onclick=()=>{ const i=+li.dataset.pt; if(recalledPts.has(i))recalledPts.delete(i); else recalledPts.add(i); render(); };
    });
    stage.querySelectorAll('.grade').forEach(b=> b.onclick=()=>grade(+b.dataset.g));
  }
}

function renderDone(){

/* ============================================================
   PROGRESS
   ============================================================ */
function updateProgress(){
  const panic = save.mode==="panic";
  const scope = panic ? PANIC_CARDS : CARDS.filter(inScope);
  let m=0,l=0,n=0;
  scope.forEach(c=>{ const st=rt[c.id]; if(st.box>=MASTER_BOX)m++; else if(st.seen>0)l++; else n++; });
  const tot=scope.length||1;
  document.getElementById('pMaster').textContent=m;
  document.getElementById('pLearn').textContent=l;
  document.getElementById('pNew').textContent=n;
  document.getElementById('pTotal').textContent=scope.length;
  document.getElementById('pPct').textContent=Math.round(m/tot*100)+'%';
  document.getElementById('barM').style.width=(m/tot*100)+'%';
  document.getElementById('barL').style.width=(l/tot*100)+'%';
  const bs=document.getElementById('panicBarStat'); if(bs) bs.textContent=m+'/'+scope.length+' locked in';
}

/* ============================================================
   MODES + TOPICS UI
   ============================================================ */
function setMode(mode){
  save.mode=mode; persist();
  document.querySelectorAll('#modeSeg button').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));
  refreshPanicUI();
  next();
}
document.querySelectorAll('#modeSeg button').forEach(b=> b.onclick=()=>setMode(b.dataset.mode));

function openTopics(){
  const counts={};
  BUILD.topics.forEach(t=>counts[t.slug]={tot:0,m:0});
  CARDS.forEach(c=>{ const k=counts[c.topicSlug]; if(k){k.tot++; if(rt[c.id].box>=MASTER_BOX)k.m++;} });
  let chips=BUILD.topics.map(t=>{
    const on=save.topics.includes(t.slug), c=counts[t.slug]||{tot:0,m:0};
    const pct=c.tot?Math.round(c.m/c.tot*100):0;
    return '<button class="tchip '+(on?'on':'')+'" data-slug="'+t.slug+'">'+
      '<span class="cb">'+(on?'✓':'')+'</span>'+
      '<span class="nm">'+esc(t.topic)+'<div class="mini"><i style="width:'+pct+'%"></i></div></span>'+
      '<span class="ct">'+c.m+'/'+c.tot+'</span></button>';
  }).join('');
  const html='<div class="sheet"><button class="closex" onclick="closeModal()">×</button>'+
    '<h3>Topics &amp; scope</h3><div class="sub">Choose what to include in your session. '+CARDS.length+' cards across '+BUILD.topics.length+' topics.</div>'+
    '<div class="rowbtns"><button class="linkbtn" onclick="allTopics(true)">Select all</button><button class="linkbtn" onclick="allTopics(false)">Clear all</button></div>'+
    '<div class="topicgrid" id="tgrid">'+chips+'</div>'+
    '<h4>Danger zone</h4>'+
    '<div class="rowbtns"><button class="linkbtn danger" onclick="resetProgress()">Reset ALL progress</button></div>'+
    '</div>';
  showModal(html);
  document.querySelectorAll('#tgrid .tchip').forEach(ch=> ch.onclick=()=>{
    const s=ch.dataset.slug;
    if(save.topics.includes(s)) save.topics=save.topics.filter(x=>x!==s);
    else save.topics=[...save.topics,s];
    if(save.topics.length===0) save.topics=[s]; // keep at least 1
    persist(); openTopics(); updateProgress();
  });
}
function allTopics(on){ save.topics = on? BUILD.topics.map(t=>t.slug) : [BUILD.topics[0].slug]; persist(); openTopics(); updateProgress(); }
function resetProgress(){
  if(!confirm("Reset all mastery progress? This can't be undone.")) return;
  save.p={}; Object.keys(rt).forEach((id,i)=>{ rt[id]={box:1,seen:0,correct:0,due:i*0.001}; });
  persist(); closeModal(); next(); toast("Progress reset");
}

/* ============================================================
   PLAN / HOW-TO MODAL
   ============================================================ */
function openPlan(){
  const html='<div class="sheet"><button class="closex" onclick="closeModal()">×</button>'+
    '<h3>The one method: Active Recall</h3>'+
    '<div class="sub">Retrieval practice — the single highest-yield way to memorise for an exam.</div>'+
    '<div class="explain">'+
    '<p>Every card forces you to <b>pull the answer out of memory</b> before you see it. That struggle is what builds durable recall — re-reading notes feels productive but barely moves the needle. Cards you miss come back fast; cards you nail leave rotation once you\'ve recalled them twice.</p>'+
    '<b>How to use it (do this exactly):</b>'+
    '<ul>'+
    '<li><b>Answer out loud or on paper first.</b> No peeking. For 5-mark cards, try to name every marking point.</li>'+
    '<li>Then <b>Reveal</b> and grade yourself <b>honestly</b>: Missed / Hard / Got it.</li>'+
    '<li>Trust the queue — interleaving topics is deliberate, not random.</li>'+
    '</ul>'+
    '<b>Suggested 12-hour split ('+BUILD.totalCards+' cards):</b>'+
    '<div class="plan">'+
    '<div><span>0–1h</span> Read every card once in <b>Core blitz</b>, all topics — grade honestly, don\'t linger.</div>'+
    '<div><span>1–6h</span> <b>Smart mix</b>, all topics. Let the engine drive. Target the mastered bar past 60%.</div>'+
    '<div><span>6–8h</span> <b>5-mark drill</b> — Section B is 70 of 112 marks. Recall the discrete points.</div>'+
    '<div><span>8–11h</span> <b>Weak spots</b> until the bar clears. Sleep matters — bank a few hours.</div>'+
    '<div><span>Final</span> <b>Core blitz</b> speed pass the morning of. Confidence lap.</div>'+
    '</div>'+
    '<p style="margin-top:14px;color:var(--tx3);font-size:12px">Exam: 42 MCQ (1 mark) + 14 short-answer (5 marks). Progress saves automatically on this device.</p>'+
    '</div></div>';
  showModal(html);
}

/* ============================================================
   PANIC MODE
   ============================================================ */
function openPanic(){
  const locked = PANIC_CARDS.filter(isMastered).length;
  const html='<div class="sheet panic"><button class="closex" onclick="closeModal()">×</button>'+
    '<h3>🚨 3-Hour Pass Blitz</h3>'+
    '<div class="sub">The '+PANIC_N+' highest-yield cards across all '+BUILD.topics.length+' topics — hand-picked as the bare minimum to scrape a pass. No detail, no rabbit holes. Just this.</div>'+
    '<div class="explain">'+
    '<b>One rule:</b> say the answer <b>out loud</b>, then grade yourself honestly. Speed beats perfection — you\'re covering ground, not mastering it.'+
    '<div class="plan" style="margin-top:12px">'+
    '<div><span>0:00</span> Breathe. The goal isn\'t an A — it\'s to not leave any topic blank. This set covers all of them.</div>'+
    '<div><span>0:05</span> Blitz every card once. Blanked? Hit <b>Missed</b> and move on — it comes back on its own.</div>'+
    '<div><span>2:00</span> Keep cycling. The engine re-serves whatever you\'re failing. Drive the green bar up.</div>'+
    '<div><span>2:40</span> The <b>5-mark</b> cards are worth the most — make sure you can name their marking points.</div>'+
    '</div>'+
    (locked? '<p style="margin-top:12px;color:var(--tx3);font-size:12px">You\'ve already locked in '+locked+' / '+PANIC_N+'.</p>':'')+
    '</div>'+
    '<button class="bigstart" onclick="startPanic()">START THE BLITZ →</button>'+
    '</div>';
  showModal(html);
}
function startPanic(){ closeModal(); setMode('panic'); toast('🚨 Panic blitz — go!'); }
function exitPanic(){ setMode('smart'); }
function refreshPanicUI(){
  const on = save.mode==='panic';
  const hero=document.getElementById('panicHero'), bar=document.getElementById('panicBar');
  if(hero) hero.classList.toggle('hidden', on);
  if(bar) bar.classList.toggle('hidden', !on);
  const lbl=document.getElementById('methodLbl'); if(lbl) lbl.textContent = on ? '🚨 PANIC BLITZ — pass-critical only' : 'Active Recall Engine';
}

/* ============================================================
   MODAL PLUMBING + MISC
   ============================================================ */
let modalEl=null;
function showModal(html){ closeModal(); modalEl=document.createElement('div'); modalEl.className='modal'; modalEl.innerHTML=html; modalEl.onclick=e=>{if(e.target===modalEl)closeModal();}; document.body.appendChild(modalEl); }
function closeModal(){ if(modalEl){modalEl.remove();modalEl=null;} }
function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),1600); }
function esc(s){ return (s==null?'':(''+s)).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

document.getElementById('topicBtn').onclick=openTopics;
document.getElementById('planBtn').onclick=openPlan;
document.getElementById('panicHero').onclick=openPanic;
document.getElementById('panicExit').onclick=exitPanic;
document.getElementById('themeBtn').onclick=()=>{ save.theme = save.theme==='light'?'dark':'light'; applyTheme(); persist(); };
function applyTheme(){ document.documentElement.setAttribute('data-theme', save.theme==='light'?'light':'dark'); document.querySelector('meta[name=theme-color]').setAttribute('content', save.theme==='light'?'#eef2f8':'#0e1420'); }

/* keyboard */
document.addEventListener('keydown',e=>{
  if(modalEl){ if(e.key==='Escape')closeModal(); return; }
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key===' '||e.key==='Enter'){ if(cur&&!revealed){ e.preventDefault(); doReveal(); } }
  else if((e.key==='1'||e.key==='2'||e.key==='3') && revealed && cur){ e.preventDefault(); grade(+e.key); }
  else if(e.key.toLowerCase()==='t'){ e.preventDefault(); openTopics(); }
  else if(e.key.toLowerCase()==='p'){ e.preventDefault(); openPlan(); }
});

/* boot */
applyTheme();
document.querySelectorAll('#modeSeg button').forEach(b=>b.classList.toggle('on',b.dataset.mode===save.mode));
document.getElementById('panicN').textContent=PANIC_N;
refreshPanicUI();
next();
</script>
</body>
</html>
